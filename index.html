<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#002C5F">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<title>Knowledge DB — 내 지식 문서함</title>
<script>/* FOUC 방지: 스타일 적용 전 테마 확정 */(function(){try{var t=localStorage.getItem('kdb-theme')||'system';if(t==='dark'||(t==='system'&&matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
<link rel="stylesheet" href="assets/fonts.css">
<link rel="stylesheet" href="assets/dark.css">
<script src="assets/app.js" defer></script>
<style>
:root {
  --bg-primary: #F2EDE4;
  --bg-secondary: #FFFFFF;
  --navy-900: #002C5F;
  --navy-700: #003F8A;
  --navy-500: #1A5CB5;
  --navy-100: #E8EEF7;
  --text-primary: #1A1A1A;
  --text-secondary: #555555;
  --text-muted: #8A8A8A;
  --border: #D5CFBF;
  --green: #00AA6C;
  --amber: #E8962A;
  --purple: #6B21A8;
  --radius-md: 14px;
  --shadow-sm: 0 1px 4px rgba(0,0,0,.08);
  --shadow-md: 0 4px 16px rgba(0,0,0,.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
  -webkit-tap-highlight-color: transparent;
}

header {
  background: linear-gradient(135deg, var(--navy-900), var(--navy-700));
  color: #fff;
  padding: 44px 22px 36px;
  border-radius: 0 0 24px 24px;
  position: relative;
  overflow: hidden;
}
header .eyebrow { font-size: 12px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,.55); margin-bottom: 6px; }
header h1 { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
header p { font-size: 13.5px; color: rgba(255,255,255,.72); max-width: 560px; }
header .wave { position: absolute; right: -40px; bottom: -50px; opacity: .15; pointer-events: none; }

main { max-width: 760px; margin: 0 auto; padding: 24px 16px 60px; }

.group-label {
  font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  color: var(--text-muted); margin: 26px 4px 10px;
}
.group-label:first-child { margin-top: 4px; }

a.doc-card {
  display: flex; align-items: center; gap: 14px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 18px;
  margin-bottom: 12px;
  text-decoration: none;
  color: inherit;
  box-shadow: var(--shadow-sm);
  transition: transform .18s, box-shadow .18s;
}
a.doc-card:active { transform: scale(.985); }
@media (hover:hover) {
  a.doc-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
}
.doc-icon {
  width: 52px; height: 52px; border-radius: 14px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: #fff;
}
.doc-body { flex: 1; min-width: 0; }
.doc-body h2 { font-size: 15.5px; font-weight: 700; color: var(--navy-900); margin-bottom: 3px; }
.doc-body p { font-size: 12.5px; color: var(--text-secondary); }
.doc-meta { display: flex; gap: 6px; margin-top: 7px; flex-wrap: wrap; }
.chip {
  font-size: 10.5px; font-weight: 600; padding: 2px 9px; border-radius: 100px;
  background: var(--navy-100); color: var(--navy-900);
  font-family: 'JetBrains Mono', monospace;
}
.arrow { color: var(--text-muted); flex-shrink: 0; }

footer { text-align: center; font-size: 11.5px; color: var(--text-muted); padding: 10px 16px 40px; }
</style>
</head>
<body>

<header>
  <svg class="wave" width="360" height="280" viewBox="0 0 360 280"><path d="M0,140 C70,90 140,190 210,140 C280,90 320,120 360,110 L360,280 L0,280 Z" fill="#fff"/><path d="M0,185 C85,130 155,230 240,175 C300,135 330,160 360,152 L360,280 L0,280 Z" fill="#fff" opacity=".5"/></svg>
  <div class="eyebrow">Knowledge DB</div>
  <h1>내 지식 문서함</h1>
  <p>공부한 내용을 인터랙티브 HTML 문서로 정리하는 개인 지식 베이스.
  폰에서는 브라우저 메뉴의 "홈 화면에 추가"로 앱처럼 쓸 수 있다.</p>
</header>

<main id="doc-list">
  <noscript>
    <!-- JS 실패 시 폴백: 정적 링크 목록 (새 문서 추가 시 docs.json과 함께 여기도 갱신) -->
    <div class="group-label">문서 목록</div>
    <p style="padding:0 4px 10px;font-size:13px;color:var(--text-secondary)">
      스크립트를 사용할 수 없어 기본 목록으로 표시합니다.</p>
    <a class="doc-card" href="docs/database-systems.html"><div class="doc-body"><h2>데이터베이스 완전 정리</h2></div></a>
    <a class="doc-card" href="docs/git-github.html"><div class="doc-body"><h2>Git &amp; GitHub 정리</h2></div></a>
    <a class="doc-card" href="docs/network-comm.html"><div class="doc-body"><h2>네트워크 통신 정리</h2></div></a>
    <a class="doc-card" href="docs/local-llm-agent.html"><div class="doc-body"><h2>로컬 LLM 에이전트</h2></div></a>
    <a class="doc-card" href="docs/ai-hw-processors.html"><div class="doc-body"><h2>AI 하드웨어 — 프로세서</h2></div></a>
    <a class="doc-card" href="docs/ai-hw-memory.html"><div class="doc-body"><h2>AI 하드웨어 — 메모리</h2></div></a>
    <a class="doc-card" href="docs/design-system.html"><div class="doc-body"><h2>디자인 시스템 v1.0</h2></div></a>
  </noscript>
</main>

<script>
(async function () {
  const main = document.getElementById('doc-list');
  try {
    const res = await fetch('docs.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const { docs } = await res.json();

    const frag = document.createDocumentFragment();
    let currentGroup = null;

    for (const d of docs) {
      if (d.group !== currentGroup) {
        currentGroup = d.group;
        const label = document.createElement('div');
        label.className = 'group-label';
        label.textContent = d.group;
        frag.appendChild(label);
      }

      const card = document.createElement('a');
      card.className = 'doc-card';
      card.href = d.file;

      const icon = document.createElement('div');
      icon.className = 'doc-icon';
      icon.style.background = `linear-gradient(135deg,${d.gradient[0]},${d.gradient[1]})`;
      icon.textContent = d.icon;

      const body = document.createElement('div');
      body.className = 'doc-body';
      const h2 = document.createElement('h2');
      h2.textContent = d.title;
      const p = document.createElement('p');
      p.textContent = d.desc;
      const meta = document.createElement('div');
      meta.className = 'doc-meta';
      for (const t of d.tags) {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.textContent = t;
        meta.appendChild(chip);
      }
      body.append(h2, p, meta);

      card.insertAdjacentHTML('beforeend',
        '<svg class="arrow" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="7,4 12,9 7,14"/></svg>');
      card.prepend(icon, body);
      frag.appendChild(card);
    }
    main.appendChild(frag);
  } catch (e) {
    // fetch 실패 (오프라인 첫 방문, file:// 로컬 열기 등) — 안내만 표시
    main.insertAdjacentHTML('beforeend',
      '<p style="padding:20px 4px;font-size:13.5px;color:var(--text-secondary)">' +
      '문서 목록을 불러오지 못했습니다. 네트워크 연결을 확인한 뒤 새로고침해 주세요.<br>' +
      '<span style="font-size:12px;color:var(--text-muted)">(PC에서 파일로 직접 열었다면: 로컬 서버로 열어야 합니다 — 예: npx serve)</span></p>');
    console.error('docs.json load failed:', e);
  }
})();
</script>

<footer>Knowledge DB · Hyundai-Inspired Design System v1.0</footer>

</body>
</html>
