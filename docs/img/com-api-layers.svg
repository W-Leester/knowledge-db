<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
  <rect width="900" height="540" fill="#FAF7F2"/>
  <text x="450" y="34" font-size="20" font-weight="800" fill="#002C5F" text-anchor="middle">API와 COM은 같은 게 아니다 — "탈것"과 "자동차"의 관계</text>
  <text x="450" y="58" font-size="13" fill="#8A8A8A" text-anchor="middle">API = 넓은 개념(기능을 노출하는 약속) · COM = 그 개념을 윈도우에서 구현한 하나의 방식</text>

  <!-- 큰 우산: API -->
  <rect x="40" y="82" width="820" height="330" rx="18" fill="#E8EEF7" stroke="#1A5CB5" stroke-width="2.5"/>
  <text x="450" y="114" font-size="17" font-weight="800" fill="#002C5F" text-anchor="middle">☂️ API — "기능을 외부에서 쓰라고 노출한 약속·창구" (추상 개념)</text>
  <text x="450" y="136" font-size="12" fill="#8A8A8A" text-anchor="middle">형태를 가리지 않는다 — 아래는 전부 "API"이지만 구현 기술·사는 곳이 다르다</text>

  <!-- 5개 형태 카드 -->
  <rect x="62" y="156" width="150" height="230" rx="12" fill="#FFFFFF" stroke="#B5AFA5" stroke-width="1.5"/>
  <text x="137" y="182" font-size="12.5" font-weight="800" fill="#002C5F" text-anchor="middle">함수 라이브러리</text>
  <text x="137" y="210" font-size="10.5" fill="#555555" text-anchor="middle">C 표준 라이브러리</text>
  <text x="137" y="228" font-size="10.5" fill="#555555" text-anchor="middle">Win32 API</text>
  <text x="137" y="246" font-size="9.5" fill="#8A8A8A" text-anchor="middle" font-family="'JetBrains Mono', monospace">CreateFile()</text>
  <rect x="80" y="330" width="114" height="40" rx="8" fill="#E8EEF7"/>
  <text x="137" y="349" font-size="10" fill="#002C5F" text-anchor="middle" font-weight="700">사는 곳</text>
  <text x="137" y="364" font-size="10" fill="#555555" text-anchor="middle">한 프로그램 안</text>

  <rect x="228" y="156" width="150" height="230" rx="12" fill="#FEF3E2" stroke="#E8962A" stroke-width="2.5"/>
  <text x="303" y="182" font-size="12.5" font-weight="800" fill="#B45309" text-anchor="middle">COM 인터페이스</text>
  <text x="303" y="210" font-size="10.5" fill="#555555" text-anchor="middle">Excel.Application</text>
  <text x="303" y="228" font-size="10.5" fill="#555555" text-anchor="middle">DirectX</text>
  <text x="303" y="246" font-size="9.5" fill="#8A8A8A" text-anchor="middle">(이 문서의 주제)</text>
  <rect x="246" y="330" width="114" height="40" rx="8" fill="#FEF3E2"/>
  <text x="303" y="349" font-size="10" fill="#B45309" text-anchor="middle" font-weight="700">사는 곳</text>
  <text x="303" y="364" font-size="10" fill="#555555" text-anchor="middle">한 PC 안 (프로세스 간)</text>

  <rect x="394" y="156" width="150" height="230" rx="12" fill="#E6F7F1" stroke="#00AA6C" stroke-width="1.5"/>
  <text x="469" y="182" font-size="12.5" font-weight="800" fill="#065F46" text-anchor="middle">REST API</text>
  <text x="469" y="210" font-size="10.5" fill="#555555" text-anchor="middle">GitHub API</text>
  <text x="469" y="228" font-size="10.5" fill="#555555" text-anchor="middle" font-family="'JetBrains Mono', monospace">fetch('docs.json')</text>
  <text x="469" y="246" font-size="9.5" fill="#8A8A8A" text-anchor="middle">(네트워크 문서)</text>
  <rect x="412" y="330" width="114" height="40" rx="8" fill="#E6F7F1"/>
  <text x="469" y="349" font-size="10" fill="#065F46" text-anchor="middle" font-weight="700">사는 곳</text>
  <text x="469" y="364" font-size="10" fill="#555555" text-anchor="middle">네트워크 너머</text>

  <rect x="560" y="156" width="150" height="230" rx="12" fill="#F3E8FF" stroke="#6B21A8" stroke-width="1.5"/>
  <text x="635" y="182" font-size="12.5" font-weight="800" fill="#6B21A8" text-anchor="middle">OS 시스템 콜</text>
  <text x="635" y="210" font-size="10.5" fill="#555555" text-anchor="middle" font-family="'JetBrains Mono', monospace">read()</text>
  <text x="635" y="228" font-size="10.5" fill="#555555" text-anchor="middle" font-family="'JetBrains Mono', monospace">write()</text>
  <text x="635" y="246" font-size="9.5" fill="#8A8A8A" text-anchor="middle">커널의 문</text>
  <rect x="578" y="330" width="114" height="40" rx="8" fill="#F3E8FF"/>
  <text x="635" y="349" font-size="10" fill="#6B21A8" text-anchor="middle" font-weight="700">사는 곳</text>
  <text x="635" y="364" font-size="10" fill="#555555" text-anchor="middle">앱 ↔ 커널</text>

  <rect x="726" y="156" width="150" height="230" rx="12" fill="#FFFFFF" stroke="#B5AFA5" stroke-width="1.5"/>
  <text x="801" y="182" font-size="12.5" font-weight="800" fill="#002C5F" text-anchor="middle">언어 SDK</text>
  <text x="801" y="210" font-size="10.5" fill="#555555" text-anchor="middle" font-family="'JetBrains Mono', monospace">openai</text>
  <text x="801" y="228" font-size="10.5" fill="#555555" text-anchor="middle">파이썬 패키지</text>
  <text x="801" y="246" font-size="9.5" fill="#8A8A8A" text-anchor="middle">import 해서 호출</text>
  <rect x="744" y="330" width="114" height="40" rx="8" fill="#E8EEF7"/>
  <text x="801" y="349" font-size="10" fill="#002C5F" text-anchor="middle" font-weight="700">사는 곳</text>
  <text x="801" y="364" font-size="10" fill="#555555" text-anchor="middle">코드 안</text>

  <!-- 하단 문장 -->
  <rect x="40" y="432" width="820" height="46" rx="12" fill="#0D1B2E"/>
  <text x="450" y="461" font-size="14" font-weight="800" fill="#FFF" text-anchor="middle">✅ "COM은 API를 노출하는 하나의 방식" · ❌ "COM = API" — COM은 API의 한 종류이지 동의어가 아니다</text>

  <text x="450" y="502" font-size="12.5" fill="#555555" text-anchor="middle">그래서 정확한 문장: "엑셀은 <tspan font-weight="800" fill="#B45309">COM이라는 형태로 API를 제공</tspan>한다" — 우리가 부린 그 함수들이 엑셀의 COM API다</text>
  <text x="450" y="524" font-size="11.5" fill="#8A8A8A" text-anchor="middle">REST·MCP·COM은 같은 정신(약속만 지키면 내부는 자유)을 서로 다른 층위에서 구현한 것</text>
</svg>
