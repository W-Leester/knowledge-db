<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="lca" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#00AA6C"/>
    </marker>
  </defs>
  <rect width="900" height="620" fill="#FAF7F2"/>
  <text x="450" y="34" font-size="20" font-weight="800" fill="#002C5F" text-anchor="middle">llama.cpp 연동 — 하네스 요소를 서버 기능에 직접 매핑</text>
  <text x="450" y="58" font-size="13" fill="#8A8A8A" text-anchor="middle">서비스 계층의 "API 호출"만 llama-server로 바꾸면, 오케스트레이션은 그대로 재사용된다</text>

  <!-- 왼쪽: 하네스 요소 -->
  <rect x="30" y="80" width="240" height="500" rx="14" fill="#FEF3E2" stroke="#E8962A" stroke-width="2.5"/>
  <text x="150" y="108" font-size="14.5" font-weight="800" fill="#B45309" text-anchor="middle">하네스 요소 (이 문서)</text>
  <g font-size="12" fill="#555555">
    <rect x="48" y="124" width="204" height="52" rx="8" fill="#FFFFFF"/>
    <text x="150" y="146" text-anchor="middle" font-weight="700" fill="#B45309">에이전트 루프 (§2)</text>
    <text x="150" y="164" text-anchor="middle" font-size="10.5">API 호출 · 스트리밍 · tool_use</text>
    <rect x="48" y="184" width="204" height="52" rx="8" fill="#FFFFFF"/>
    <text x="150" y="206" text-anchor="middle" font-weight="700" fill="#B45309">도구 입력 검증 (§3)</text>
    <text x="150" y="224" text-anchor="middle" font-size="10.5">유효한 tool_call JSON 강제</text>
    <rect x="48" y="244" width="204" height="52" rx="8" fill="#FFFFFF"/>
    <text x="150" y="266" text-anchor="middle" font-weight="700" fill="#B45309">병렬 도구 실행 (§2)</text>
    <text x="150" y="284" text-anchor="middle" font-size="10.5">읽기전용 도구 동시 호출</text>
    <rect x="48" y="304" width="204" height="52" rx="8" fill="#FFFFFF"/>
    <text x="150" y="326" text-anchor="middle" font-weight="700" fill="#B45309">토큰 회계·압축 (§5)</text>
    <text x="150" y="344" text-anchor="middle" font-size="10.5">임계치 = 창 − 예약 − 버퍼</text>
    <rect x="48" y="364" width="204" height="52" rx="8" fill="#FFFFFF"/>
    <text x="150" y="386" text-anchor="middle" font-weight="700" fill="#B45309">컨텍스트 조립 (§8)</text>
    <text x="150" y="404" text-anchor="middle" font-size="10.5">"변동성 낮은 것 앞"</text>
    <rect x="48" y="424" width="204" height="52" rx="8" fill="#FFFFFF"/>
    <text x="150" y="446" text-anchor="middle" font-weight="700" fill="#B45309">컨텍스트 창 크기 (§5)</text>
    <text x="150" y="464" text-anchor="middle" font-size="10.5">유효창 계산의 기준값</text>
    <rect x="48" y="484" width="204" height="76" rx="8" fill="#FEE2E2"/>
    <text x="150" y="508" text-anchor="middle" font-weight="800" fill="#DC2626">약한 로컬 모델 보완 (§10)</text>
    <text x="150" y="528" text-anchor="middle" font-size="10.5">형식 안 지키는 문제를</text>
    <text x="150" y="544" text-anchor="middle" font-size="10.5">"파서 레벨 가드"로</text>
  </g>

  <!-- 오른쪽: llama-server 기능 -->
  <rect x="400" y="80" width="470" height="500" rx="14" fill="#E6F7F1" stroke="#00AA6C" stroke-width="2.5"/>
  <text x="635" y="108" font-size="14.5" font-weight="800" fill="#065F46" text-anchor="middle">llama-server 기능</text>
  <g font-size="11.5">
    <rect x="418" y="124" width="434" height="52" rx="8" fill="#FFFFFF"/>
    <text x="434" y="145" font-weight="800" fill="#065F46" font-family="'JetBrains Mono', monospace">POST /v1/messages (Anthropic)</text>
    <text x="434" y="164" fill="#555555" font-size="10.5">2026.1~ 지원 — Claude식 하네스가 거의 그대로 붙는다 (또는 /v1/chat/completions)</text>

    <rect x="418" y="184" width="434" height="52" rx="8" fill="#FFFFFF"/>
    <text x="434" y="205" font-weight="800" fill="#065F46" font-family="'JetBrains Mono', monospace">response_format: json_schema / grammar(GBNF)</text>
    <text x="434" y="224" fill="#555555" font-size="10.5">샘플러가 문법을 강제 → 깨진 JSON이 원천 불가능 (약한 모델의 구원)</text>

    <rect x="418" y="244" width="434" height="52" rx="8" fill="#FFFFFF"/>
    <text x="434" y="265" font-weight="800" fill="#065F46" font-family="'JetBrains Mono', monospace">parallel_tool_calls: true</text>
    <text x="434" y="284" fill="#555555" font-size="10.5">기본 꺼짐 — 켜면 한 응답에 여러 tool_use (§2 병렬 실행)</text>

    <rect x="418" y="304" width="434" height="52" rx="8" fill="#FFFFFF"/>
    <text x="434" y="325" font-weight="800" fill="#065F46" font-family="'JetBrains Mono', monospace">POST /tokenize · /detokenize</text>
    <text x="434" y="344" fill="#555555" font-size="10.5">정확한 토큰 수를 로컬에서 무료로 → Claude의 countTokens API 대체</text>

    <rect x="418" y="364" width="434" height="52" rx="8" fill="#FFFFFF"/>
    <text x="434" y="385" font-weight="800" fill="#065F46" font-family="'JetBrains Mono', monospace">cache_prompt: true (기본) + slots</text>
    <text x="434" y="404" fill="#555555" font-size="10.5">앞 요청의 KV 캐시 재사용 → "안정적 프리픽스"가 로컬에서도 속도 이득</text>

    <rect x="418" y="424" width="434" height="52" rx="8" fill="#FFFFFF"/>
    <text x="434" y="445" font-weight="800" fill="#065F46" font-family="'JetBrains Mono', monospace">GET /props → n_ctx · n_keep</text>
    <text x="434" y="464" fill="#555555" font-size="10.5">실행 중 컨텍스트 창 크기 조회 → 압축 임계치의 기준값</text>

    <rect x="418" y="484" width="434" height="76" rx="8" fill="#E8EEF7"/>
    <text x="434" y="508" font-weight="800" fill="#002C5F" font-family="'JetBrains Mono', monospace">--jinja  --chat-template-file  -c N</text>
    <text x="434" y="528" fill="#555555" font-size="10.5">기동 플래그: --jinja(툴콜 활성) · 툴 템플릿 지정 · -c로 컨텍스트 크기</text>
    <text x="434" y="546" fill="#555555" font-size="10.5">stream:true → SSE로 delta.content (§2 스트리밍 파서)</text>
  </g>

  <!-- 매핑 화살표 -->
  <g stroke="#00AA6C" stroke-width="2.2">
    <line x1="270" y1="150" x2="414" y2="150" marker-end="url(#lca)"/>
    <line x1="270" y1="210" x2="414" y2="210" marker-end="url(#lca)"/>
    <line x1="270" y1="270" x2="414" y2="270" marker-end="url(#lca)"/>
    <line x1="270" y1="330" x2="414" y2="330" marker-end="url(#lca)"/>
    <line x1="270" y1="390" x2="414" y2="390" marker-end="url(#lca)"/>
    <line x1="270" y1="450" x2="414" y2="450" marker-end="url(#lca)"/>
    <line x1="270" y1="520" x2="414" y2="510" stroke="#DC2626" marker-end="url(#lca)"/>
  </g>
</svg>
