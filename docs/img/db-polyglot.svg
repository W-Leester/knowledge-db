<svg width="800" height="480" viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <style>
    .title { font-size: 15px; font-weight: 700; fill: #002C5F; }
    .box-title { font-size: 11.5px; font-weight: 700; fill: #FFFFFF; }
    .box-sub { font-size: 9px; fill: rgba(255,255,255,0.85); }
    .use-label { font-size: 9.5px; fill: #555555; }
    .small { font-size: 10px; fill: #555555; }
  </style>

  <rect width="800" height="480" fill="#F2EDE4"/>
  <text x="400" y="28" text-anchor="middle" class="title">Polyglot Persistence — 대규모 이커머스 서비스의 실제 DB 조합 예시</text>

  <!-- Client -->
  <rect x="330" y="48" width="140" height="44" fill="#1A1A1A" rx="8"/>
  <text x="400" y="67" text-anchor="middle" class="box-title">사용자 (웹/앱)</text>
  <text x="400" y="82" text-anchor="middle" class="box-sub">검색 → 조회 → 주문 → 추천</text>

  <!-- API server -->
  <rect x="300" y="122" width="200" height="50" fill="#002C5F" rx="8"/>
  <text x="400" y="143" text-anchor="middle" class="box-title">API 서버 (백엔드)</text>
  <text x="400" y="160" text-anchor="middle" class="box-sub">요청 유형에 따라 적합한 DB로 라우팅</text>

  <line x1="400" y1="92" x2="400" y2="120" stroke="#1A1A1A" stroke-width="2"/>
  <polygon points="400,120 395,111 405,111" fill="#1A1A1A"/>

  <!-- Six DB boxes in 2 rows of 3 -->
  <!-- connections -->
  <line x1="330" y1="172" x2="135" y2="235" stroke="#8A8A8A" stroke-width="1.5"/>
  <line x1="380" y1="172" x2="400" y2="235" stroke="#8A8A8A" stroke-width="1.5"/>
  <line x1="470" y1="172" x2="665" y2="235" stroke="#8A8A8A" stroke-width="1.5"/>
  <line x1="320" y1="172" x2="135" y2="355" stroke="#8A8A8A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="400" y1="172" x2="400" y2="355" stroke="#8A8A8A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="480" y1="172" x2="665" y2="355" stroke="#8A8A8A" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Row 1 -->
  <!-- MySQL -->
  <rect x="45" y="237" width="180" height="78" fill="#003F8A" rx="8"/>
  <text x="135" y="259" text-anchor="middle" class="box-title">MySQL / PostgreSQL</text>
  <text x="135" y="276" text-anchor="middle" class="box-sub">주문 · 결제 · 회원 · 재고</text>
  <rect x="60" y="286" width="150" height="20" fill="#FFFFFF" opacity="0.92" rx="10"/>
  <text x="135" y="300" text-anchor="middle" font-size="9" fill="#003F8A" font-weight="700">틀리면 안 되는 돈 = ACID</text>

  <!-- Redis -->
  <rect x="310" y="237" width="180" height="78" fill="#DC2626" rx="8"/>
  <text x="400" y="259" text-anchor="middle" class="box-title">Redis</text>
  <text x="400" y="276" text-anchor="middle" class="box-sub">캐시 · 세션 · 실시간 랭킹</text>
  <rect x="325" y="286" width="150" height="20" fill="#FFFFFF" opacity="0.92" rx="10"/>
  <text x="400" y="300" text-anchor="middle" font-size="9" fill="#DC2626" font-weight="700">0.1ms 응답 = 인메모리</text>

  <!-- Elasticsearch -->
  <rect x="575" y="237" width="180" height="78" fill="#E8962A" rx="8"/>
  <text x="665" y="259" text-anchor="middle" class="box-title">Elasticsearch</text>
  <text x="665" y="276" text-anchor="middle" class="box-sub">상품 검색 · 자동완성 · 로그 분석</text>
  <rect x="590" y="286" width="150" height="20" fill="#FFFFFF" opacity="0.92" rx="10"/>
  <text x="665" y="300" text-anchor="middle" font-size="9" fill="#B45309" font-weight="700">전문(全文) 검색 특화</text>

  <!-- Row 2 -->
  <!-- MongoDB -->
  <rect x="45" y="357" width="180" height="78" fill="#00AA6C" rx="8"/>
  <text x="135" y="379" text-anchor="middle" class="box-title">MongoDB</text>
  <text x="135" y="396" text-anchor="middle" class="box-sub">상품 카탈로그 · 리뷰 · CMS</text>
  <rect x="60" y="406" width="150" height="20" fill="#FFFFFF" opacity="0.92" rx="10"/>
  <text x="135" y="420" text-anchor="middle" font-size="9" fill="#065F46" font-weight="700">상품마다 다른 속성 = 유연 스키마</text>

  <!-- Cassandra -->
  <rect x="310" y="357" width="180" height="78" fill="#1A5CB5" rx="8"/>
  <text x="400" y="379" text-anchor="middle" class="box-title">Cassandra</text>
  <text x="400" y="396" text-anchor="middle" class="box-sub">클릭 로그 · 행동 이력 · 알림</text>
  <rect x="325" y="406" width="150" height="20" fill="#FFFFFF" opacity="0.92" rx="10"/>
  <text x="400" y="420" text-anchor="middle" font-size="9" fill="#1A5CB5" font-weight="700">초당 수십만 쓰기 = 무한 확장</text>

  <!-- Vector DB -->
  <rect x="575" y="357" width="180" height="78" fill="#6B21A8" rx="8"/>
  <text x="665" y="379" text-anchor="middle" class="box-title">Vector DB (pgvector 등)</text>
  <text x="665" y="396" text-anchor="middle" class="box-sub">유사 상품 추천 · AI 챗봇(RAG)</text>
  <rect x="590" y="406" width="150" height="20" fill="#FFFFFF" opacity="0.92" rx="10"/>
  <text x="665" y="420" text-anchor="middle" font-size="9" fill="#6B21A8" font-weight="700">임베딩 유사도 검색</text>

  <!-- Sync arrows between MySQL and others (CDC) -->
  <path d="M 228 276 Q 268 276 308 276" fill="none" stroke="#8A8A8A" stroke-width="1.2" stroke-dasharray="3,3"/>
  <path d="M 228 396 Q 268 396 308 396" fill="none" stroke="#8A8A8A" stroke-width="1.2" stroke-dasharray="3,3"/>
  <path d="M 493 276 Q 533 276 573 276" fill="none" stroke="#8A8A8A" stroke-width="1.2" stroke-dasharray="3,3"/>

  <!-- Bottom note -->
  <rect x="45" y="450" width="710" height="1" fill="none"/>
  <text x="400" y="463" text-anchor="middle" font-size="11" fill="#002C5F" font-weight="700">핵심 철학: "만능 DB는 없다" — 데이터의 성격(정합성·속도·규모·형태)에 따라 최적의 저장소를 조합한다</text>
  <text x="400" y="477" text-anchor="middle" font-size="9.5" fill="#8A8A8A">점선 = CDC(Change Data Capture)·Kafka 등으로 원본(MySQL) 변경사항을 다른 저장소에 동기화</text>
</svg>
