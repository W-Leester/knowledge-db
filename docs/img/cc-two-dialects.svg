<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 660" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="dla" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#DC2626"/>
    </marker>
    <marker id="dlg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#00AA6C"/>
    </marker>
  </defs>
  <rect width="900" height="660" fill="#FAF7F2"/>
  <text x="450" y="34" font-size="20" font-weight="800" fill="#002C5F" text-anchor="middle">두 방언과 어댑터 — 왜 "엔드포인트만 바꾸면" 되는가</text>
  <text x="450" y="58" font-size="13" fill="#8A8A8A" text-anchor="middle">LLM API 메시지 형식엔 두 방언이 있다 — 같은 일을 하지만 JSON 생김새가 다르다</text>

  <!-- 두 방언 비교 -->
  <rect x="30" y="78" width="410" height="230" rx="14" fill="#FFFFFF" stroke="#8A8A8A" stroke-width="2"/>
  <text x="235" y="104" font-size="14" font-weight="800" fill="#555555" text-anchor="middle">OpenAI 방언 (/v1/chat/completions)</text>
  <rect x="48" y="118" width="374" height="80" rx="8" fill="#F2EDE4"/>
  <text x="60" y="138" font-size="10" fill="#555555" font-family="'JetBrains Mono', monospace">assistant: { tool_calls: [{ id, function:</text>
  <text x="60" y="154" font-size="10" fill="#555555" font-family="'JetBrains Mono', monospace">  { name, arguments:"{...}" } }] }</text>
  <text x="60" y="176" font-size="10" fill="#555555" font-family="'JetBrains Mono', monospace">tool: { tool_call_id, content:"결과" }</text>
  <text x="60" y="192" font-size="10" fill="#8A8A8A" font-family="'JetBrains Mono', monospace">system: messages 배열 안의 한 role</text>
  <text x="235" y="222" font-size="11.5" fill="#555555" text-anchor="middle" font-weight="700">· content = 보통 문자열</text>
  <text x="235" y="244" font-size="11.5" fill="#555555" text-anchor="middle">· 도구 결과 = role: "tool"</text>
  <text x="235" y="266" font-size="11.5" fill="#555555" text-anchor="middle">· system = messages 안에</text>
  <text x="235" y="290" font-size="11" fill="#8A8A8A" text-anchor="middle">thinking 블록에 대응물 없음</text>

  <rect x="460" y="78" width="410" height="230" rx="14" fill="#FFFFFF" stroke="#6B21A8" stroke-width="2.5"/>
  <text x="665" y="104" font-size="14" font-weight="800" fill="#6B21A8" text-anchor="middle">Anthropic 방언 (/v1/messages)</text>
  <rect x="478" y="118" width="374" height="80" rx="8" fill="#F3E8FF"/>
  <text x="490" y="138" font-size="10" fill="#555555" font-family="'JetBrains Mono', monospace">assistant: { content: [{ type:"tool_use",</text>
  <text x="490" y="154" font-size="10" fill="#555555" font-family="'JetBrains Mono', monospace">  id, name, input:{...} }] }</text>
  <text x="490" y="176" font-size="10" fill="#555555" font-family="'JetBrains Mono', monospace">user: { content: [{ type:"tool_result",</text>
  <text x="490" y="192" font-size="10" fill="#555555" font-family="'JetBrains Mono', monospace">  tool_use_id, content }] }</text>
  <text x="665" y="222" font-size="11.5" fill="#6B21A8" text-anchor="middle" font-weight="700">· content = 블록의 배열</text>
  <text x="665" y="244" font-size="11.5" fill="#6B21A8" text-anchor="middle">· 도구 결과 = role:"user" 안 블록</text>
  <text x="665" y="266" font-size="11.5" fill="#6B21A8" text-anchor="middle">· system = 별도 최상위 필드</text>
  <text x="665" y="290" font-size="11" fill="#8A8A8A" text-anchor="middle">thinking 블록 별도 관리(서명까지)</text>

  <text x="450" y="300" font-size="16" font-weight="800" fill="#8A8A8A" text-anchor="middle">vs</text>

  <!-- 핵심 문장 -->
  <rect x="30" y="322" width="840" height="34" rx="8" fill="#FEF3E2"/>
  <text x="450" y="344" font-size="12.5" font-weight="700" fill="#B45309" text-anchor="middle">Claude Code식 하네스는 오른쪽(Anthropic 방언)에 깊이 묶여 있다 — tool_use·tool_result·system 필드·블록 배열·thinking 전부</text>

  <!-- 길 A: 어댑터 필요 -->
  <rect x="30" y="372" width="410" height="256" rx="14" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
  <text x="235" y="398" font-size="13.5" font-weight="800" fill="#DC2626" text-anchor="middle">길 A — 서버가 OpenAI만 알 때 (이전)</text>

  <rect x="52" y="414" width="150" height="44" rx="8" fill="#F3E8FF" stroke="#6B21A8" stroke-width="1.5"/>
  <text x="127" y="432" font-size="11" font-weight="700" fill="#6B21A8" text-anchor="middle">하네스</text>
  <text x="127" y="448" font-size="9.5" fill="#8A8A8A" text-anchor="middle">Anthropic어</text>

  <rect x="222" y="410" width="86" height="52" rx="8" fill="#FEF3E2" stroke="#E8962A" stroke-width="2"/>
  <text x="265" y="430" font-size="11" font-weight="800" fill="#B45309" text-anchor="middle">🔄 어댑터</text>
  <text x="265" y="446" font-size="9" fill="#555555" text-anchor="middle">양방향 번역</text>

  <rect x="328" y="414" width="90" height="44" rx="8" fill="#F2EDE4" stroke="#8A8A8A" stroke-width="1.5"/>
  <text x="373" y="432" font-size="11" font-weight="700" fill="#555555" text-anchor="middle">서버</text>
  <text x="373" y="448" font-size="9.5" fill="#8A8A8A" text-anchor="middle">OpenAI어</text>

  <line x1="202" y1="436" x2="220" y2="436" stroke="#DC2626" stroke-width="2" marker-end="url(#dla)"/>
  <line x1="308" y1="436" x2="326" y2="436" stroke="#DC2626" stroke-width="2" marker-end="url(#dla)"/>

  <text x="52" y="486" font-size="11" fill="#555555">어댑터가 매번 변환해야:</text>
  <text x="60" y="506" font-size="10.5" fill="#555555">· system 필드 → messages 안으로</text>
  <text x="60" y="524" font-size="10.5" fill="#555555">· tool_use 블록 → tool_calls</text>
  <text x="60" y="542" font-size="10.5" fill="#555555">· tool_result 블록 → role:"tool"</text>
  <text x="60" y="560" font-size="10.5" fill="#555555">· content 배열 → 문자열 평탄화</text>
  <text x="60" y="578" font-size="10.5" fill="#DC2626" font-weight="700">· thinking 블록 → 대응 없음(별도 처리)</text>
  <text x="235" y="606" font-size="11.5" font-weight="800" fill="#DC2626" text-anchor="middle">짝 맞추기·스트리밍 재조립에서</text>
  <text x="235" y="622" font-size="11.5" font-weight="800" fill="#DC2626" text-anchor="middle">버그 나기 쉬운 중간 계층</text>

  <!-- 길 B: 어댑터 불필요 -->
  <rect x="460" y="372" width="410" height="256" rx="14" fill="#E6F7F1" stroke="#00AA6C" stroke-width="2.5"/>
  <text x="665" y="398" font-size="13.5" font-weight="800" fill="#065F46" text-anchor="middle">길 B — 서버가 Anthropic도 알 때 (2026.1~)</text>

  <rect x="500" y="414" width="150" height="44" rx="8" fill="#F3E8FF" stroke="#6B21A8" stroke-width="1.5"/>
  <text x="575" y="432" font-size="11" font-weight="700" fill="#6B21A8" text-anchor="middle">하네스</text>
  <text x="575" y="448" font-size="9.5" fill="#8A8A8A" text-anchor="middle">Anthropic어</text>

  <rect x="690" y="414" width="150" height="44" rx="8" fill="#E6F7F1" stroke="#00AA6C" stroke-width="1.5"/>
  <text x="765" y="432" font-size="11" font-weight="700" fill="#065F46" text-anchor="middle">llama-server</text>
  <text x="765" y="448" font-size="9.5" fill="#8A8A8A" text-anchor="middle">Anthropic어도 함</text>

  <line x1="650" y1="436" x2="686" y2="436" stroke="#00AA6C" stroke-width="3" marker-end="url(#dlg)"/>
  <text x="668" y="426" font-size="10" fill="#065F46" font-weight="700" text-anchor="middle">직결</text>

  <text x="665" y="486" font-size="11.5" fill="#065F46" text-anchor="middle" font-weight="700">번역 계층이 통째로 사라진다</text>
  <rect x="500" y="500" width="340" height="48" rx="8" fill="#0D1B2E"/>
  <text x="515" y="520" font-size="10.5" fill="#8A9BB5" font-family="'JetBrains Mono', monospace"># 클라우드</text>
  <text x="515" y="536" font-size="10.5" fill="#C7D5EA" font-family="'JetBrains Mono', monospace">base_url = api.anthropic.com</text>
  <rect x="500" y="552" width="340" height="30" rx="8" fill="#065F46"/>
  <text x="515" y="572" font-size="10.5" fill="#7FD1A8" font-family="'JetBrains Mono', monospace">base_url = localhost:8080  ← 이 한 줄만</text>

  <text x="665" y="606" font-size="11.5" font-weight="800" fill="#065F46" text-anchor="middle">tool_use·tool_result·system·블록·</text>
  <text x="665" y="622" font-size="11.5" font-weight="800" fill="#065F46" text-anchor="middle">스트리밍이 양쪽 다 같은 언어 → 그대로</text>
</svg>
