<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 660" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="wa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#003F8A"/>
    </marker>
  </defs>
  <rect width="900" height="660" fill="#FAF7F2"/>

  <!-- 상단: Windows NT 정체 -->
  <text x="450" y="34" font-size="19" font-weight="800" fill="#002C5F" text-anchor="middle">Windows NT의 정체 — 지금 쓰는 모든 윈도우의 뼈대(커널)</text>

  <rect x="30" y="54" width="840" height="188" rx="14" fill="#FFFFFF" stroke="#B5AFA5" stroke-width="2"/>

  <!-- DOS 계보 -->
  <rect x="55" y="76" width="230" height="60" rx="10" fill="#EDEAE4" stroke="#B5AFA5" stroke-width="1.5"/>
  <text x="170" y="100" font-size="13.5" font-weight="800" fill="#8A8A8A" text-anchor="middle">소비자용 계보 (DOS 기반)</text>
  <text x="170" y="122" font-size="11.5" fill="#8A8A8A" text-anchor="middle">Windows 95·98·ME — 불안정·보안 허술</text>

  <!-- NT 계보 -->
  <rect x="55" y="156" width="230" height="66" rx="10" fill="#E8EEF7" stroke="#1A5CB5" stroke-width="2"/>
  <text x="170" y="180" font-size="13.5" font-weight="800" fill="#002C5F" text-anchor="middle">NT 계보 (1993, 새 설계)</text>
  <text x="170" y="200" font-size="11" fill="#555555" text-anchor="middle">VMS 출신 팀 설계 · 보호 메모리</text>
  <text x="170" y="216" font-size="11" fill="#555555" text-anchor="middle">멀티유저 권한 · NTFS</text>

  <!-- XP 통합 -->
  <rect x="380" y="116" width="170" height="66" rx="10" fill="#003F8A"/>
  <text x="465" y="144" font-size="14" font-weight="800" fill="#FFF" text-anchor="middle">Windows XP (2001)</text>
  <text x="465" y="166" font-size="11.5" fill="#C7D5EA" text-anchor="middle">두 계보가 NT로 통합</text>

  <line x1="285" y1="106" x2="376" y2="140" stroke="#8A8A8A" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#wa)"/>
  <line x1="285" y1="189" x2="376" y2="158" stroke="#003F8A" stroke-width="2.5" marker-end="url(#wa)"/>

  <!-- 현재 -->
  <rect x="640" y="106" width="220" height="86" rx="10" fill="#002C5F"/>
  <text x="750" y="132" font-size="13.5" font-weight="800" fill="#FFF" text-anchor="middle">현재의 모든 윈도우</text>
  <text x="750" y="154" font-size="11.5" fill="#C7D5EA" text-anchor="middle">Windows 7 · 10 · 11 · Server 전부</text>
  <text x="750" y="176" font-size="11.5" font-weight="700" fill="#7FD1A8" text-anchor="middle">Windows 11 내부 버전 = "NT 10.0"</text>

  <line x1="550" y1="149" x2="636" y2="149" stroke="#003F8A" stroke-width="2.5" marker-end="url(#wa)"/>

  <!-- 하단: 6가지 이유 -->
  <text x="450" y="282" font-size="19" font-weight="800" fill="#002C5F" text-anchor="middle">그런데 클라우드 서버는 왜 리눅스인가 — 6가지 이유</text>

  <rect x="30" y="302" width="272" height="94" rx="12" fill="#FFFFFF" stroke="#00AA6C" stroke-width="2"/>
  <text x="52" y="330" font-size="14" font-weight="800" fill="#065F46">💰 ① 라이선스 무료</text>
  <text x="52" y="352" font-size="11.5" fill="#555555">서버 수백만 대 규모에서는 코어당</text>
  <text x="52" y="369" font-size="11.5" fill="#555555">라이선스 비용이 사업 구조를 바꾼다</text>
  <text x="52" y="388" font-size="11" fill="#8A8A8A">(윈도우 인스턴스가 더 비싼 이유)</text>

  <rect x="314" y="302" width="272" height="94" rx="12" fill="#FFFFFF" stroke="#00AA6C" stroke-width="2"/>
  <text x="336" y="330" font-size="14" font-weight="800" fill="#065F46">🔧 ② 소스를 고칠 수 있다</text>
  <text x="336" y="352" font-size="11.5" fill="#555555">AWS는 자체 배포판, 구글은 커널 직접</text>
  <text x="336" y="369" font-size="11.5" fill="#555555">수정 — 자사 칩·네트워크에 맞춤 최적화</text>
  <text x="336" y="388" font-size="11" fill="#8A8A8A">닫힌 OS는 벤더를 기다려야 한다</text>

  <rect x="598" y="302" width="272" height="94" rx="12" fill="#FFFFFF" stroke="#00AA6C" stroke-width="2"/>
  <text x="620" y="330" font-size="14" font-weight="800" fill="#065F46">🖥 ③ GUI 없음이 기본값</text>
  <text x="620" y="352" font-size="11.5" fill="#555555">화면 없이 SSH로만 관리(headless) —</text>
  <text x="620" y="369" font-size="11.5" fill="#555555">가볍고 부팅이 빠르다</text>
  <text x="620" y="388" font-size="11" fill="#8A8A8A">수백 대를 켜고 끄는 오토스케일링에 유리</text>

  <rect x="30" y="410" width="272" height="94" rx="12" fill="#FFFFFF" stroke="#1A5CB5" stroke-width="2"/>
  <text x="52" y="438" font-size="14" font-weight="800" fill="#003F8A">📜 ④ 자동화 친화</text>
  <text x="52" y="460" font-size="11.5" fill="#555555">설정 = 텍스트 파일, 작업 = 명령어 →</text>
  <text x="52" y="477" font-size="11.5" fill="#555555">1,000대를 스크립트로 동일하게 구성</text>
  <text x="52" y="496" font-size="11" fill="#8A8A8A">git으로 인프라를 버전 관리 (IaC)</text>

  <rect x="314" y="410" width="272" height="94" rx="12" fill="#FFFFFF" stroke="#1A5CB5" stroke-width="2"/>
  <text x="336" y="438" font-size="14" font-weight="800" fill="#003F8A">📦 ⑤ 컨테이너 = 리눅스 기술</text>
  <text x="336" y="460" font-size="11.5" fill="#555555">Docker·쿠버네티스의 격리 기능은</text>
  <text x="336" y="477" font-size="11.5" fill="#555555">리눅스 커널 기능 그 자체다</text>
  <text x="336" y="496" font-size="11" fill="#8A8A8A">현대 배포 표준이 리눅스를 전제로 성립</text>

  <rect x="598" y="410" width="272" height="94" rx="12" fill="#FFFFFF" stroke="#1A5CB5" stroke-width="2"/>
  <text x="620" y="438" font-size="14" font-weight="800" fill="#003F8A">🕰 ⑥ 역사적 관성</text>
  <text x="620" y="460" font-size="11.5" fill="#555555">인터넷 자체가 Unix에서 자랐다 —</text>
  <text x="620" y="477" font-size="11.5" fill="#555555">TCP/IP도 BSD에서 구현됨</text>
  <text x="620" y="496" font-size="11" fill="#8A8A8A">서버 SW·문서·인력이 전부 이쪽 기준</text>

  <!-- 결론 밴드 -->
  <rect x="30" y="524" width="840" height="112" rx="14" fill="#002C5F"/>
  <text x="450" y="556" font-size="15" font-weight="800" fill="#FFF" text-anchor="middle">"성능이 좋아서"가 아니다 — 비용 · 통제 · 자동화 · 생태계의 승리다</text>
  <text x="450" y="584" font-size="12.5" fill="#C7D5EA" text-anchor="middle">단, 윈도우 서버도 클라우드에서 정식 지원된다 (.NET·SQL Server·AD 워크로드) — 리눅스는 "기본값이자 다수"일 뿐</text>
  <text x="450" y="612" font-size="12.5" font-weight="700" fill="#7FD1A8" text-anchor="middle">마이크로소프트의 Azure조차 구동 VM의 절반 이상이 리눅스 — MS가 WSL을 만든 배경이기도 하다</text>
</svg>
