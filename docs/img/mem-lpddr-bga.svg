<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <style>
    .title { font-size: 15px; font-weight: 700; fill: #002C5F; }
    .section-title { font-size: 13px; font-weight: 700; fill: #002C5F; }
    .label { font-size: 11px; fill: #1A1A1A; }
    .label-small { font-size: 10px; fill: #555555; }
    .label-green { font-size: 10.5px; fill: #00AA6C; font-weight: 600; }
    .label-red { font-size: 10.5px; fill: #DC2626; font-weight: 600; }
    .label-amber { font-size: 10.5px; fill: #E8962A; font-weight: 600; }
  </style>

  <!-- Background -->
  <rect width="800" height="450" fill="#F2EDE4"/>

  <!-- Title -->
  <text x="400" y="24" text-anchor="middle" class="title">LPDDR BGA vs DIMM 슬롯 패키징 비교</text>

  <!-- ===== LEFT: Standard DDR DIMM ===== -->
  <rect x="20" y="35" width="360" height="280" fill="#FFFFFF" stroke="#D5CFBF" stroke-width="1" rx="6"/>
  <text x="200" y="53" text-anchor="middle" class="section-title">표준 DDR DIMM (탈착식)</text>

  <!-- Motherboard PCB -->
  <rect x="35" y="200" width="330" height="40" fill="#2D5A1B" rx="4"/>
  <text x="50" y="218" font-size="10" fill="#90EE90">마더보드 PCB</text>

  <!-- DIMM Slot on PCB -->
  <rect x="110" y="188" width="180" height="16" fill="#8B6914" rx="2"/>
  <!-- Slot pins -->
  <rect x="112" y="190" width="176" height="12" fill="#F5D76E" rx="1"/>
  <!-- Individual pins in slot -->
  <rect x="115" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="120" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="125" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="130" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="135" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="140" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="145" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="150" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="155" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="160" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="165" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="170" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="175" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="180" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="185" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="190" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="195" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="200" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="205" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="210" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="215" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="220" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="225" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="230" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="235" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="240" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="245" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="250" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="255" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="260" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="265" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="270" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="275" y="191" width="3" height="10" fill="#8B6914"/>
  <rect x="280" y="191" width="3" height="10" fill="#8B6914"/>

  <!-- DIMM stick -->
  <rect x="100" y="95" width="200" height="92" fill="#1A5C38" rx="4" stroke="#0D3D25" stroke-width="1.5"/>
  <!-- DRAM chips on DIMM -->
  <rect x="110" y="105" width="28" height="22" fill="#2D9D6B" rx="2"/>
  <rect x="143" y="105" width="28" height="22" fill="#2D9D6B" rx="2"/>
  <rect x="176" y="105" width="28" height="22" fill="#2D9D6B" rx="2"/>
  <rect x="209" y="105" width="28" height="22" fill="#2D9D6B" rx="2"/>
  <rect x="242" y="105" width="28" height="22" fill="#2D9D6B" rx="2"/>
  <rect x="110" y="152" width="28" height="22" fill="#2D9D6B" rx="2"/>
  <rect x="143" y="152" width="28" height="22" fill="#2D9D6B" rx="2"/>
  <rect x="176" y="152" width="28" height="22" fill="#2D9D6B" rx="2"/>
  <rect x="209" y="152" width="28" height="22" fill="#2D9D6B" rx="2"/>
  <rect x="242" y="152" width="28" height="22" fill="#2D9D6B" rx="2"/>
  <!-- DIMM notch -->
  <rect x="193" y="183" width="15" height="9" fill="#2D5A1B"/>
  <!-- DIMM label -->
  <text x="200" y="140" text-anchor="middle" font-size="9" fill="#90EE90">DDR5 DIMM</text>

  <!-- Signal path annotation with animation -->
  <line x1="200" y1="187" x2="200" y2="200" stroke="#E8962A" stroke-width="2">
    <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <!-- Signal path length bracket -->
  <line x1="305" y1="95" x2="305" y2="200" stroke="#E8962A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="300" y1="95" x2="310" y2="95" stroke="#E8962A" stroke-width="1.5"/>
  <line x1="300" y1="200" x2="310" y2="200" stroke="#E8962A" stroke-width="1.5"/>
  <text x="315" y="152" font-size="10" fill="#E8962A" font-weight="600">신호 경로</text>
  <text x="315" y="165" font-size="10" fill="#E8962A" font-weight="600">길이: 수 cm</text>

  <!-- Labels -->
  <text x="200" y="73" text-anchor="middle" class="label-amber">탈착 가능 DIMM 슬롯</text>
  <rect x="35" y="253" width="330" height="56" fill="#FFF0F0" stroke="#D5CFBF" stroke-width="1" rx="4"/>
  <text x="50" y="268" class="label-red">✗ 핀 커넥터 저항 → 추가 레이턴시</text>
  <text x="50" y="283" class="label-green">✓ 교체 / 업그레이드 가능</text>
  <text x="50" y="298" class="label-small">전압: 1.1V (DDR5), 1.2V (DDR4)</text>

  <!-- ===== RIGHT: LPDDR BGA ===== -->
  <rect x="400" y="35" width="380" height="280" fill="#FFFFFF" stroke="#D5CFBF" stroke-width="1" rx="6"/>
  <text x="590" y="53" text-anchor="middle" class="section-title">LPDDR BGA (직접 납땜)</text>

  <!-- SoC Die -->
  <rect x="430" y="80" width="140" height="130" fill="#002C5F" rx="8" stroke="#003F8A" stroke-width="2"/>
  <text x="500" y="120" text-anchor="middle" font-size="11" fill="#FFFFFF" font-weight="700">SoC</text>
  <text x="500" y="136" text-anchor="middle" font-size="10" fill="#A0B8D8">(CPU + GPU</text>
  <text x="500" y="150" text-anchor="middle" font-size="10" fill="#A0B8D8">+ NPU)</text>
  <text x="500" y="168" text-anchor="middle" font-size="9" fill="#E8EEF7">Apple M4 / Snapdragon X</text>
  <text x="500" y="182" text-anchor="middle" font-size="9" fill="#E8EEF7">Kirin / MediaTek 등</text>

  <!-- BGA solder balls between SoC and board -->
  <!-- Row of solder balls -->
  <circle cx="445" cy="215" r="3" fill="#C0C0C0" stroke="#888" stroke-width="0.5"/>
  <circle cx="458" cy="215" r="3" fill="#C0C0C0" stroke="#888" stroke-width="0.5"/>
  <circle cx="471" cy="215" r="3" fill="#C0C0C0" stroke="#888" stroke-width="0.5"/>
  <circle cx="484" cy="215" r="3" fill="#C0C0C0" stroke="#888" stroke-width="0.5"/>
  <circle cx="497" cy="215" r="3" fill="#C0C0C0" stroke="#888" stroke-width="0.5"/>
  <circle cx="510" cy="215" r="3" fill="#C0C0C0" stroke="#888" stroke-width="0.5"/>
  <circle cx="523" cy="215" r="3" fill="#C0C0C0" stroke="#888" stroke-width="0.5"/>
  <circle cx="536" cy="215" r="3" fill="#C0C0C0" stroke="#888" stroke-width="0.5"/>
  <circle cx="549" cy="215" r="3" fill="#C0C0C0" stroke="#888" stroke-width="0.5"/>
  <circle cx="562" cy="215" r="3" fill="#C0C0C0" stroke="#888" stroke-width="0.5"/>

  <!-- LPDDR chips (directly soldered next to SoC) -->
  <rect x="595" y="85" width="80" height="55" fill="#E8EEF7" stroke="#003F8A" stroke-width="2" rx="4"/>
  <text x="635" y="105" text-anchor="middle" font-size="10" fill="#003F8A" font-weight="600">LPDDR5X</text>
  <text x="635" y="119" text-anchor="middle" font-size="9" fill="#555555">8 GB</text>
  <text x="635" y="132" text-anchor="middle" font-size="9" fill="#555555">Chip A</text>

  <rect x="595" y="150" width="80" height="55" fill="#E8EEF7" stroke="#003F8A" stroke-width="2" rx="4"/>
  <text x="635" y="170" text-anchor="middle" font-size="10" fill="#003F8A" font-weight="600">LPDDR5X</text>
  <text x="635" y="184" text-anchor="middle" font-size="9" fill="#555555">8 GB</text>
  <text x="635" y="197" text-anchor="middle" font-size="9" fill="#555555">Chip B</text>

  <!-- Connection lines from SoC to LPDDR (short) -->
  <line x1="572" y1="112" x2="593" y2="112" stroke="#00AA6C" stroke-width="2">
    <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite"/>
  </line>
  <line x1="572" y1="177" x2="593" y2="177" stroke="#00AA6C" stroke-width="2">
    <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="1s" begin="0.5s" repeatCount="indefinite"/>
  </line>

  <!-- Signal path bracket (short!) -->
  <line x1="688" y1="85" x2="688" y2="205" stroke="#E8962A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="683" y1="85" x2="693" y2="85" stroke="#E8962A" stroke-width="1.5"/>
  <line x1="683" y1="205" x2="693" y2="205" stroke="#E8962A" stroke-width="1.5"/>
  <text x="698" y="145" font-size="10" fill="#E8962A" font-weight="600">신호 경로</text>
  <text x="698" y="158" font-size="10" fill="#E8962A" font-weight="600">길이: 수 mm</text>

  <!-- BGA label -->
  <text x="490" y="232" text-anchor="middle" font-size="9" fill="#555555">BGA 솔더볼 (수백~수천 개)</text>

  <!-- PCB board underneath -->
  <rect x="410" y="225" width="340" height="20" fill="#2D5A1B" rx="3"/>
  <text x="580" y="239" text-anchor="middle" font-size="9" fill="#90EE90">PCB 기판 (메인보드)</text>

  <!-- LPDDR labels -->
  <rect x="415" y="253" width="355" height="56" fill="#F0FFF8" stroke="#D5CFBF" stroke-width="1" rx="4"/>
  <text x="430" y="268" class="label-green">✓ SoC에 직접 납땜 (BGA) — 커넥터 없음 → 최소 레이턴시</text>
  <text x="430" y="283" class="label-red">✗ 교체 불가 (납땜 고정)</text>
  <text x="430" y="298" class="label-green">✓ 저전압 동작 (1.05V vs DIMM 1.1V)</text>

  <!-- ===== Bottom comparison ===== -->
  <rect x="20" y="328" width="760" height="108" fill="#FFFFFF" stroke="#D5CFBF" stroke-width="1" rx="6"/>
  <text x="400" y="346" text-anchor="middle" font-size="12" fill="#002C5F" font-weight="700">LPDDR5X 성능 하이라이트</text>

  <!-- Three info boxes -->
  <rect x="30" y="354" width="230" height="72" fill="#E8EEF7" rx="4"/>
  <text x="145" y="372" text-anchor="middle" font-size="11" fill="#002C5F" font-weight="700">LPDDR5X 사양</text>
  <text x="145" y="388" text-anchor="middle" font-size="11" fill="#003F8A">최대 9600 MT/s</text>
  <text x="145" y="403" text-anchor="middle" font-size="10" fill="#555555">64-bit 버스 → 68.3 GB/s</text>
  <text x="145" y="418" text-anchor="middle" font-size="10" fill="#555555">전압: 1.05V</text>

  <rect x="274" y="354" width="252" height="72" fill="#002C5F" rx="4"/>
  <text x="400" y="372" text-anchor="middle" font-size="11" fill="#FFFFFF" font-weight="700">Apple M4 실제 사례</text>
  <text x="400" y="388" text-anchor="middle" font-size="11" fill="#E8EEF7">LPDDR5X → CPU/GPU/NPU 공유</text>
  <text x="400" y="403" text-anchor="middle" font-size="11" fill="#00AA6C" font-weight="700">410 GB/s 메모리 대역폭</text>
  <text x="400" y="418" text-anchor="middle" font-size="10" fill="#A0B8D8">통합 메모리 아키텍처 (UMA)</text>

  <rect x="540" y="354" width="230" height="72" fill="#F8F0E0" stroke="#E8962A" stroke-width="1" rx="4"/>
  <text x="655" y="372" text-anchor="middle" font-size="11" fill="#E8962A" font-weight="700">BGA 장점 핵심</text>
  <text x="655" y="388" text-anchor="middle" font-size="10" fill="#555555">핀 커넥터 임피던스 제거</text>
  <text x="655" y="403" text-anchor="middle" font-size="10" fill="#555555">신호 경로 최소화 → 레이턴시 ↓</text>
  <text x="655" y="418" text-anchor="middle" font-size="10" fill="#555555">PCIe/DIMM 대비 ~20% 레이턴시 절감</text>
</svg>
