<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
  <rect width="900" height="560" fill="#FAF7F2"/>
  <text x="450" y="34" font-size="20" font-weight="800" fill="#002C5F" text-anchor="middle">COM은 느린가? — 메커니즘만 보면 오히려 제일 빠르다</text>
  <text x="450" y="58" font-size="13" fill="#8A8A8A" text-anchor="middle">"사는 곳"이 가까울수록 호출이 싸다 — 로그 스케일(막대 1칸 ≈ ×1000)</text>

  <!-- 축 라벨 -->
  <text x="70" y="92" font-size="12" font-weight="700" fill="#555555">방식 (호출 1회 대략 오버헤드)</text>
  <text x="640" y="92" font-size="11.5" fill="#8A8A8A">ns = 나노초 · µs = 마이크로초 · ms = 밀리초</text>

  <!-- 눈금 -->
  <g stroke="#E4E0D5" stroke-width="1.5">
    <line x1="300" y1="108" x2="300" y2="440"/>
    <line x1="440" y1="108" x2="440" y2="440"/>
    <line x1="580" y1="108" x2="580" y2="440"/>
    <line x1="720" y1="108" x2="720" y2="440"/>
  </g>
  <g font-size="10.5" fill="#8A8A8A" text-anchor="middle">
    <text x="300" y="458">~1 ns</text>
    <text x="440" y="458">~1 µs</text>
    <text x="580" y="458">~1 ms</text>
    <text x="720" y="458">~수백 ms</text>
  </g>

  <!-- 막대들 -->
  <!-- 함수 라이브러리 -->
  <text x="60" y="132" font-size="12.5" font-weight="700" fill="#002C5F">함수 라이브러리</text>
  <text x="60" y="148" font-size="10" fill="#8A8A8A">같은 프로세스 메모리</text>
  <rect x="150" y="120" width="150" height="30" rx="6" fill="#8A8A8A"/>
  <text x="310" y="140" font-size="11" fill="#555555" font-weight="700">~ns (거의 공짜)</text>

  <!-- COM in-proc -->
  <text x="60" y="184" font-size="12.5" font-weight="800" fill="#B45309">COM (in-proc DLL)</text>
  <text x="60" y="200" font-size="10" fill="#8A8A8A">같은 프로세스, 포인터 호출</text>
  <rect x="150" y="172" width="160" height="30" rx="6" fill="#E8962A"/>
  <text x="320" y="192" font-size="11" fill="#B45309" font-weight="700">~ns</text>

  <!-- COM out-proc -->
  <text x="60" y="236" font-size="12.5" font-weight="800" fill="#B45309">COM (out-proc EXE)</text>
  <text x="60" y="252" font-size="10" fill="#8A8A8A">프로세스 간 + 마샬링</text>
  <rect x="150" y="224" width="300" height="30" rx="6" fill="#E8962A" opacity=".75"/>
  <text x="460" y="244" font-size="11" fill="#B45309" font-weight="700">~µs (엑셀 자동화가 이것)</text>

  <!-- MCP -->
  <text x="60" y="288" font-size="12.5" font-weight="700" fill="#065F46">MCP (stdio)</text>
  <text x="60" y="304" font-size="10" fill="#8A8A8A">로컬 파이프 + JSON-RPC</text>
  <rect x="150" y="276" width="380" height="30" rx="6" fill="#00AA6C" opacity=".8"/>
  <text x="540" y="296" font-size="11" fill="#065F46" font-weight="700">수십 µs~ (직렬화 비용)</text>

  <!-- REST local -->
  <text x="60" y="340" font-size="12.5" font-weight="700" fill="#1A5CB5">REST (로컬)</text>
  <text x="60" y="356" font-size="10" fill="#8A8A8A">TCP + HTTP + JSON</text>
  <rect x="150" y="328" width="470" height="30" rx="6" fill="#1A5CB5" opacity=".75"/>
  <text x="630" y="348" font-size="11" fill="#1A5CB5" font-weight="700">수백 µs~</text>

  <!-- REST net -->
  <text x="60" y="392" font-size="12.5" font-weight="700" fill="#6B21A8">REST (네트워크)</text>
  <text x="60" y="408" font-size="10" fill="#8A8A8A">DNS+TCP+TLS+인터넷</text>
  <rect x="150" y="380" width="700" height="30" rx="6" fill="#6B21A8" opacity=".75"/>
  <text x="500" y="400" font-size="11" fill="#FFF" font-weight="700">수 ms ~ 수백 ms</text>

  <!-- 화살표 방향 -->
  <text x="450" y="486" font-size="12.5" font-weight="700" fill="#8A8A8A" text-anchor="middle">← 가깝고 빠름 (프로세스 내부) · · · 멀고 느림 (네트워크 너머) →</text>

  <!-- 하단 결론 -->
  <rect x="30" y="502" width="840" height="46" rx="12" fill="#0D1B2E"/>
  <text x="450" y="524" font-size="13.5" font-weight="800" fill="#FFF" text-anchor="middle">순수 호출 비용: COM ≪ MCP &lt; REST — COM은 느린 게 아니라, 무거운 앱을 깨우거나 왕복을 너무 자주 할 뿐</text>
  <text x="450" y="542" font-size="11" fill="#8A9BB5" text-anchor="middle">※ 수치는 자릿수 감각을 위한 개략치 — 환경·구현에 따라 크게 달라진다</text>
</svg>
