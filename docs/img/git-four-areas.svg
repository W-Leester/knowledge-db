<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#003F8A"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#00AA6C"/>
    </marker>
  </defs>

  <rect width="900" height="430" fill="#FAF7F2"/>

  <!-- 로컬 컨테이너 -->
  <rect x="18" y="52" width="580" height="308" rx="16" fill="#FFFFFF" stroke="#B5AFA5" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="40" y="86" font-size="19" font-weight="800" fill="#002C5F">💻 내 컴퓨터 (로컬)</text>
  <text x="40" y="110" font-size="14" fill="#8A8A8A">add · commit은 전부 이 안에서 끝난다 — 인터넷 불필요</text>

  <!-- 작업 폴더 -->
  <rect x="42" y="150" width="156" height="130" rx="12" fill="#E8EEF7" stroke="#1A5CB5" stroke-width="2"/>
  <text x="120" y="185" font-size="17" font-weight="800" fill="#002C5F" text-anchor="middle">작업 폴더</text>
  <text x="120" y="212" font-size="13.5" fill="#555555" text-anchor="middle">지금 편집 중인</text>
  <text x="120" y="232" font-size="13.5" fill="#555555" text-anchor="middle">실제 파일들</text>
  <text x="120" y="262" font-size="13" fill="#8A8A8A" text-anchor="middle" font-family="'JetBrains Mono', monospace">*.html, *.css …</text>

  <!-- 스테이징 -->
  <rect x="232" y="150" width="156" height="130" rx="12" fill="#FEF3E2" stroke="#E8962A" stroke-width="2"/>
  <text x="310" y="185" font-size="17" font-weight="800" fill="#002C5F" text-anchor="middle">스테이징</text>
  <text x="310" y="212" font-size="13.5" fill="#555555" text-anchor="middle">"다음 커밋에 넣을</text>
  <text x="310" y="232" font-size="13.5" fill="#555555" text-anchor="middle">변경분" 대기석</text>
  <text x="310" y="262" font-size="13" fill="#8A8A8A" text-anchor="middle" font-family="'JetBrains Mono', monospace">index</text>

  <!-- 로컬 저장소 -->
  <rect x="422" y="150" width="156" height="130" rx="12" fill="#E6F7F1" stroke="#00AA6C" stroke-width="2"/>
  <text x="500" y="185" font-size="17" font-weight="800" fill="#002C5F" text-anchor="middle">로컬 저장소</text>
  <text x="500" y="212" font-size="13.5" fill="#555555" text-anchor="middle">커밋 이력 전체가</text>
  <text x="500" y="232" font-size="13.5" fill="#555555" text-anchor="middle">여기 저장된다</text>
  <text x="500" y="262" font-size="13" fill="#8A8A8A" text-anchor="middle" font-family="'JetBrains Mono', monospace">.git/</text>

  <!-- add / commit 화살표 -->
  <line x1="198" y1="205" x2="228" y2="205" stroke="#003F8A" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="213" y="146" font-size="14.5" font-weight="700" fill="#003F8A" text-anchor="middle" font-family="'JetBrains Mono', monospace">git add</text>

  <line x1="388" y1="205" x2="418" y2="205" stroke="#003F8A" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="403" y="146" font-size="14.5" font-weight="700" fill="#003F8A" text-anchor="middle" font-family="'JetBrains Mono', monospace">git commit</text>

  <!-- 인터넷 경계 -->
  <line x1="632" y1="60" x2="632" y2="370" stroke="#B5AFA5" stroke-width="2" stroke-dasharray="4 6"/>
  <text x="632" y="42" font-size="14" font-weight="700" fill="#8A8A8A" text-anchor="middle">🌐 인터넷</text>

  <!-- GitHub -->
  <rect x="666" y="140" width="212" height="150" rx="14" fill="#002C5F"/>
  <text x="772" y="182" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle">GitHub</text>
  <text x="772" y="210" font-size="14" fill="#C7D5EA" text-anchor="middle">원격 저장소 (remote)</text>
  <text x="772" y="234" font-size="14" font-weight="700" fill="#7FD1A8" text-anchor="middle" font-family="'JetBrains Mono', monospace">"origin"</text>
  <text x="772" y="266" font-size="13" fill="#8A9BB5" text-anchor="middle">= .git/config에 적힌 주소</text>

  <!-- push / pull 화살표 -->
  <line x1="582" y1="188" x2="662" y2="188" stroke="#00AA6C" stroke-width="3" marker-end="url(#arrowG)"/>
  <text x="622" y="176" font-size="15" font-weight="800" fill="#00AA6C" text-anchor="middle" font-family="'JetBrains Mono', monospace">push</text>

  <line x1="662" y1="242" x2="582" y2="242" stroke="#1A5CB5" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="622" y="268" font-size="15" font-weight="800" fill="#1A5CB5" text-anchor="middle" font-family="'JetBrains Mono', monospace">pull</text>

  <!-- 하단 요약 -->
  <rect x="18" y="382" width="860" height="34" rx="10" fill="#E8EEF7"/>
  <text x="448" y="404" font-size="15" font-weight="700" fill="#002C5F" text-anchor="middle">커밋해도 GitHub엔 아무 일도 없다 — 원격과 통신하는 건 push · pull · fetch 딱 세 명령뿐</text>
</svg>
