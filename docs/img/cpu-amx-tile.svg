  <text x="400" y="370" text-anchor="middle" font-size="10" fill="#555555">C[i,j] += Σ A[i,k] × B[k,j]  for k=0..63  →  16×16 = 256 FP32 결과를 한 번에 계산</text>

  <!-- AMX vs FMA comparison -->
