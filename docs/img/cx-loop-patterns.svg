<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="la2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#003F8A"/>
    </marker>
    <marker id="lg2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#00AA6C"/>
    </marker>
    <marker id="lr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#DC2626"/>
    </marker>
  </defs>
  <rect width="900" height="600" fill="#FAF7F2"/>
  <text x="450" y="34" font-size="20" font-weight="800" fill="#002C5F" text-anchor="middle">루프 엔지니어링 — "몇 바퀴 돌 것인가"를 설계하는 기술</text>

  <!-- 좌: 기본 루프 -->
  <rect x="30" y="64" width="380" height="330" rx="14" fill="#FFFFFF" stroke="#1A5CB5" stroke-width="2.5"/>
  <text x="220" y="94" font-size="15" font-weight="800" fill="#002C5F" text-anchor="middle">기본 골격: 계획 → 실행 → 검증 → 수정</text>

  <rect x="140" y="112" width="160" height="46" rx="10" fill="#E8EEF7" stroke="#1A5CB5" stroke-width="2"/>
  <text x="220" y="141" font-size="13.5" font-weight="800" fill="#002C5F" text-anchor="middle">📋 계획</text>

  <rect x="140" y="180" width="160" height="46" rx="10" fill="#FEF3E2" stroke="#E8962A" stroke-width="2"/>
  <text x="220" y="209" font-size="13.5" font-weight="800" fill="#B45309" text-anchor="middle">⚙️ 실행 (도구)</text>

  <rect x="140" y="248" width="160" height="46" rx="10" fill="#E6F7F1" stroke="#00AA6C" stroke-width="2"/>
  <text x="220" y="277" font-size="13.5" font-weight="800" fill="#065F46" text-anchor="middle">🔍 검증 ★핵심</text>

  <line x1="220" y1="158" x2="220" y2="176" stroke="#003F8A" stroke-width="2.5" marker-end="url(#la2)"/>
  <line x1="220" y1="226" x2="220" y2="244" stroke="#003F8A" stroke-width="2.5" marker-end="url(#la2)"/>

  <!-- 검증 분기 -->
  <line x1="300" y1="271" x2="360" y2="271" stroke="#00AA6C" stroke-width="2.5" marker-end="url(#lg2)"/>
  <rect x="318" y="300" width="84" height="36" rx="18" fill="#00AA6C"/>
  <text x="360" y="323" font-size="12.5" font-weight="800" fill="#FFF" text-anchor="middle">✅ 완료</text>
  <text x="360" y="258" font-size="11" fill="#065F46" text-anchor="middle">통과</text>

  <path d="M 140 271 C 80 271 80 141 136 138" fill="none" stroke="#DC2626" stroke-width="2.5" marker-end="url(#lr2)"/>
  <text x="72" y="210" font-size="11.5" font-weight="700" fill="#DC2626" text-anchor="middle" transform="rotate(-90 72 210)">실패 → 수정 재계획</text>

  <rect x="52" y="348" width="336" height="34" rx="9" fill="#FEE2E2"/>
  <text x="220" y="370" font-size="12" font-weight="700" fill="#DC2626" text-anchor="middle">⏱ 정지 조건: 반복 상한 · 예산 · 진전 없음 감지</text>

  <!-- 우: 패턴 3종 -->
  <rect x="440" y="64" width="430" height="330" rx="14" fill="#FFFFFF" stroke="#6B21A8" stroke-width="2.5"/>
  <text x="655" y="94" font-size="15" font-weight="800" fill="#6B21A8" text-anchor="middle">루프를 강화하는 3가지 패턴</text>

  <!-- 패턴1: 오류 재주입 -->
  <rect x="462" y="110" width="386" height="80" rx="10" fill="#FEF3E2"/>
  <text x="478" y="136" font-size="13" font-weight="800" fill="#B45309">① 오류 재주입 — 실패를 숨기지 않는다</text>
  <text x="478" y="158" font-size="11.5" fill="#555555">도구 오류·테스트 실패 메시지를 그대로 모델에게 →</text>
  <text x="478" y="176" font-size="11.5" fill="#555555">스스로 원인을 보고 고친다. 에이전트다움의 절반이 여기서 나온다.</text>

  <!-- 패턴2: 평가자 게이트 -->
  <rect x="462" y="200" width="386" height="80" rx="10" fill="#E6F7F1"/>
  <text x="478" y="226" font-size="13" font-weight="800" fill="#065F46">② 평가자 게이트 — 만든 자와 심판을 분리</text>
  <text x="478" y="248" font-size="11.5" fill="#555555">생성 → 별도 평가(테스트·린터·다른 LLM·사람) → 통과해야 다음 단계.</text>
  <text x="478" y="266" font-size="11.5" fill="#555555">자기 결과물에 관대해지는 자기 채점 편향을 구조로 차단.</text>

  <!-- 패턴3: 병렬 탐색 -->
  <rect x="462" y="290" width="386" height="80" rx="10" fill="#F3E8FF"/>
  <text x="478" y="316" font-size="13" font-weight="800" fill="#6B21A8">③ 병렬 탐색 후 수렴 — 한 방에 걸지 않는다</text>
  <text x="478" y="338" font-size="11.5" fill="#555555">막막한 문제는 서브에이전트 N개로 서로 다른 접근을 동시에 →</text>
  <text x="478" y="356" font-size="11.5" fill="#555555">결과를 비교해 최선을 채택. (탐색은 병렬로, 결정은 한 곳에서)</text>

  <!-- 하단: 사람의 위치 -->
  <rect x="30" y="418" width="840" height="164" rx="14" fill="#0D1B2E"/>
  <text x="62" y="450" font-size="14.5" font-weight="800" fill="#FFF">🚦 사람은 어디에 서는가 — 게이트 배치가 루프 설계의 마지막 조각</text>
  <rect x="62" y="468" width="240" height="88" rx="10" fill="rgba(255,255,255,.08)"/>
  <text x="182" y="494" font-size="12.5" font-weight="800" fill="#7FD1A8" text-anchor="middle">자동 진행</text>
  <text x="182" y="516" font-size="11" fill="#C7D5EA" text-anchor="middle">되돌리기 쉬운 것: 파일 수정,</text>
  <text x="182" y="534" font-size="11" fill="#C7D5EA" text-anchor="middle">로컬 테스트, 브랜치 커밋</text>
  <rect x="330" y="468" width="240" height="88" rx="10" fill="rgba(255,255,255,.08)"/>
  <text x="450" y="494" font-size="12.5" font-weight="800" fill="#E8962A" text-anchor="middle">확인 후 진행 (사람 게이트)</text>
  <text x="450" y="516" font-size="11" fill="#C7D5EA" text-anchor="middle">외부에 드러나는 것: push·배포,</text>
  <text x="450" y="534" font-size="11" fill="#C7D5EA" text-anchor="middle">메시지 발송, 데이터 삭제</text>
  <rect x="598" y="468" width="240" height="88" rx="10" fill="rgba(255,255,255,.08)"/>
  <text x="718" y="494" font-size="12.5" font-weight="800" fill="#DC2626" text-anchor="middle">훅으로 원천 차단</text>
  <text x="718" y="516" font-size="11" fill="#C7D5EA" text-anchor="middle">절대 일어나면 안 되는 것:</text>
  <text x="718" y="534" font-size="11" fill="#C7D5EA" text-anchor="middle">rm -rf, 시크릿 노출, main 직push</text>
</svg>
