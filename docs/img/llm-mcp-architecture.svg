<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="ma" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#003F8A"/>
    </marker>
  </defs>
  <rect width="900" height="500" fill="#FAF7F2"/>
  <text x="450" y="38" font-size="20" font-weight="800" fill="#002C5F" text-anchor="middle">MCP — 도구를 표준 플러그처럼 꽂는 구조 ("AI계의 USB-C")</text>

  <!-- 호스트 -->
  <rect x="40" y="70" width="330" height="390" rx="16" fill="#FFFFFF" stroke="#1A5CB5" stroke-width="2.5"/>
  <text x="205" y="102" font-size="17" font-weight="800" fill="#002C5F" text-anchor="middle">🏠 MCP 호스트</text>
  <text x="205" y="126" font-size="13.5" fill="#555555" text-anchor="middle">Cline · Open WebUI · LM Studio · 자작 루프</text>

  <rect x="70" y="146" width="270" height="80" rx="12" fill="#002C5F"/>
  <text x="205" y="180" font-size="16" font-weight="800" fill="#FFF" text-anchor="middle">🧠 로컬 LLM (Qwen3)</text>
  <text x="205" y="206" font-size="12.5" fill="#8A9BB5" text-anchor="middle">"어떤 도구를 쓸까"만 판단</text>

  <rect x="70" y="246" width="270" height="80" rx="12" fill="#E8EEF7" stroke="#1A5CB5" stroke-width="2"/>
  <text x="205" y="280" font-size="15.5" font-weight="800" fill="#002C5F" text-anchor="middle">🔌 MCP 클라이언트</text>
  <text x="205" y="306" font-size="12.5" fill="#555555" text-anchor="middle">서버들의 도구 목록을 모아 모델에 제공</text>

  <rect x="70" y="346" width="270" height="90" rx="12" fill="#FAF7F2" stroke="#B5AFA5" stroke-width="1.5"/>
  <text x="205" y="376" font-size="14" font-weight="800" fill="#555555" text-anchor="middle">📄 mcp.json 설정 파일</text>
  <text x="205" y="400" font-size="12.5" fill="#8A8A8A" text-anchor="middle">"어떤 서버를 어떻게 띄울지" 등록</text>
  <text x="205" y="422" font-size="12.5" fill="#8A8A8A" text-anchor="middle">→ 서버 추가 = 설정 몇 줄</text>

  <!-- 서버들 -->
  <text x="640" y="92" font-size="16" font-weight="800" fill="#002C5F" text-anchor="middle">🧰 MCP 서버들 (이미 만들어져 있음)</text>

  <rect x="450" y="108" width="180" height="76" rx="12" fill="#E6F7F1" stroke="#00AA6C" stroke-width="2"/>
  <text x="540" y="138" font-size="14.5" font-weight="800" fill="#065F46" text-anchor="middle">📁 filesystem</text>
  <text x="540" y="162" font-size="12.5" fill="#555555" text-anchor="middle">파일 읽기·쓰기·검색</text>

  <rect x="660" y="108" width="180" height="76" rx="12" fill="#E6F7F1" stroke="#00AA6C" stroke-width="2"/>
  <text x="750" y="138" font-size="14.5" font-weight="800" fill="#065F46" text-anchor="middle">🌐 playwright</text>
  <text x="750" y="162" font-size="12.5" fill="#555555" text-anchor="middle">실제 브라우저 조작</text>

  <rect x="450" y="204" width="180" height="76" rx="12" fill="#FEF3E2" stroke="#E8962A" stroke-width="2"/>
  <text x="540" y="234" font-size="14.5" font-weight="800" fill="#B45309" text-anchor="middle">🐙 github</text>
  <text x="540" y="258" font-size="12.5" fill="#555555" text-anchor="middle">이슈·PR·저장소</text>

  <rect x="660" y="204" width="180" height="76" rx="12" fill="#FEF3E2" stroke="#E8962A" stroke-width="2"/>
  <text x="750" y="234" font-size="14.5" font-weight="800" fill="#B45309" text-anchor="middle">🗄 sqlite · postgres</text>
  <text x="750" y="258" font-size="12.5" fill="#555555" text-anchor="middle">DB 질의</text>

  <rect x="450" y="300" width="180" height="76" rx="12" fill="#F3E8FF" stroke="#6B21A8" stroke-width="2"/>
  <text x="540" y="330" font-size="14.5" font-weight="800" fill="#6B21A8" text-anchor="middle">🔎 fetch · search</text>
  <text x="540" y="354" font-size="12.5" fill="#555555" text-anchor="middle">웹페이지·검색</text>

  <rect x="660" y="300" width="180" height="76" rx="12" fill="#F3E8FF" stroke="#6B21A8" stroke-width="2"/>
  <text x="750" y="330" font-size="14.5" font-weight="800" fill="#6B21A8" text-anchor="middle">🛠 자작 서버</text>
  <text x="750" y="354" font-size="12.5" fill="#555555" text-anchor="middle">FastMCP로 수십 줄</text>

  <!-- 연결선 -->
  <line x1="340" y1="286" x2="446" y2="150" stroke="#003F8A" stroke-width="2" marker-end="url(#ma)"/>
  <line x1="340" y1="286" x2="446" y2="242" stroke="#003F8A" stroke-width="2" marker-end="url(#ma)"/>
  <line x1="340" y1="286" x2="446" y2="334" stroke="#003F8A" stroke-width="2" marker-end="url(#ma)"/>
  <line x1="630" y1="146" x2="656" y2="146" stroke="#003F8A" stroke-width="2" marker-end="url(#ma)"/>
  <line x1="630" y1="242" x2="656" y2="242" stroke="#003F8A" stroke-width="2" marker-end="url(#ma)"/>
  <line x1="630" y1="338" x2="656" y2="338" stroke="#003F8A" stroke-width="2" marker-end="url(#ma)"/>

  <!-- 하단 -->
  <rect x="450" y="404" width="390" height="56" rx="12" fill="#E8EEF7"/>
  <text x="645" y="428" font-size="14" font-weight="800" fill="#002C5F" text-anchor="middle">핵심: 도구를 직접 구현하는 대신 "수집"한다</text>
  <text x="645" y="450" font-size="12.5" fill="#555555" text-anchor="middle">같은 서버가 Cline·Open WebUI·자작 루프 어디서든 동작 (표준이므로)</text>
</svg>
