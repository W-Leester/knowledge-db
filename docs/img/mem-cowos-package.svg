<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <style>
    .title { font-size: 15px; font-weight: 700; fill: #002C5F; }
    .section-title { font-size: 12px; font-weight: 700; fill: #002C5F; }
    .label { font-size: 10.5px; fill: #1A1A1A; }
    .label-small { font-size: 9.5px; fill: #555555; }
    .label-white { font-size: 10px; fill: #FFFFFF; font-weight: 600; }
    .hbm-label { font-size: 9px; fill: #FFFFFF; font-weight: 600; }
  </style>

  <!-- Background -->
  <rect width="800" height="450" fill="#F2EDE4"/>

  <!-- Title -->
  <text x="400" y="22" text-anchor="middle" class="title">CoWoS 패키지 레이아웃 — 상면도 (Top-Down View)</text>

  <!-- ===== Main CoWoS package top-down view ===== -->
  <!-- Package substrate (outermost, BGA underneath) -->
  <rect x="20" y="33" width="540" height="400" fill="#8B6914" rx="8" stroke="#5A4510" stroke-width="2"/>
  <text x="290" y="48" text-anchor="middle" font-size="10" fill="#FFD0A0" font-weight="600">패키지 기판 (Package Substrate) — 하부에 BGA 솔더볼</text>

  <!-- Silicon Interposer -->
  <rect x="35" y="55" width="510" height="368" fill="#4A1080" rx="6" stroke="#6B2DA8" stroke-width="1.5"/>
  <text x="290" y="68" text-anchor="middle" font-size="10" fill="#D0A0FF" font-weight="600">실리콘 인터포저 (Silicon Interposer)</text>

  <!-- Center: GPU Die -->
  <rect x="170" y="80" width="240" height="230" fill="#002C5F" rx="6" stroke="#003F8A" stroke-width="2"/>
  <!-- GPU internal detail -->
  <text x="290" y="108" text-anchor="middle" font-size="11" fill="#FFFFFF" font-weight="700">GPU 다이</text>
  <text x="290" y="123" text-anchor="middle" font-size="9" fill="#A0B8D8">(GPC · SM · Tensor Core)</text>
  <!-- GPC blocks inside GPU -->
  <rect x="178" y="132" width="52" height="40" fill="#003F8A" rx="3"/>
  <text x="204" y="152" text-anchor="middle" font-size="8" fill="#FFFFFF">GPC 0</text>
  <rect x="236" y="132" width="52" height="40" fill="#003F8A" rx="3"/>
  <text x="262" y="152" text-anchor="middle" font-size="8" fill="#FFFFFF">GPC 1</text>
  <rect x="294" y="132" width="52" height="40" fill="#003F8A" rx="3"/>
  <text x="320" y="152" text-anchor="middle" font-size="8" fill="#FFFFFF">GPC 2</text>
  <rect x="352" y="132" width="50" height="40" fill="#003F8A" rx="3"/>
  <text x="377" y="152" text-anchor="middle" font-size="8" fill="#FFFFFF">GPC 3</text>
  <rect x="178" y="178" width="52" height="40" fill="#003F8A" rx="3"/>
  <text x="204" y="198" text-anchor="middle" font-size="8" fill="#FFFFFF">GPC 4</text>
  <rect x="236" y="178" width="52" height="40" fill="#003F8A" rx="3"/>
  <text x="262" y="198" text-anchor="middle" font-size="8" fill="#FFFFFF">GPC 5</text>
  <rect x="294" y="178" width="52" height="40" fill="#003F8A" rx="3"/>
  <text x="320" y="198" text-anchor="middle" font-size="8" fill="#FFFFFF">GPC 6</text>
  <rect x="352" y="178" width="50" height="40" fill="#003F8A" rx="3"/>
  <text x="377" y="198" text-anchor="middle" font-size="8" fill="#FFFFFF">GPC 7</text>
  <!-- L2 Cache bar -->
  <rect x="178" y="224" width="224" height="18" fill="#005090" rx="2"/>
  <text x="290" y="236" text-anchor="middle" font-size="8" fill="#FFFFFF">L2 Cache / ROPs / Memory Interface</text>
  <!-- Tensor Core blocks -->
  <rect x="178" y="248" width="108" height="30" fill="#006080" rx="2"/>
  <text x="232" y="267" text-anchor="middle" font-size="8" fill="#FFFFFF">Tensor Core Array</text>
  <rect x="294" y="248" width="108" height="30" fill="#006080" rx="2"/>
  <text x="348" y="267" text-anchor="middle" font-size="8" fill="#FFFFFF">Tensor Core Array</text>
  <!-- GPU size annotation -->
  <text x="290" y="298" text-anchor="middle" font-size="9" fill="#E8EEF7" font-weight="600">814mm² (H100/H200)</text>

  <!-- HBM3 stacks: 6 stacks, 3 on left, 3 on right -->
  <!-- Left HBM stacks (3) -->
  <!-- HBM L1 -->
  <rect x="52" y="88" width="100" height="75" fill="#00AA6C" rx="5" stroke="#007A4E" stroke-width="1.5"/>
  <text x="102" y="115" text-anchor="middle" class="hbm-label">HBM3</text>
  <text x="102" y="129" text-anchor="middle" class="hbm-label">스택 1</text>
  <text x="102" y="143" text-anchor="middle" font-size="8" fill="#D0FFE8">13.3 GB</text>
  <text x="102" y="157" text-anchor="middle" font-size="8" fill="#D0FFE8">819 GB/s</text>

  <!-- HBM L2 -->
  <rect x="52" y="178" width="100" height="75" fill="#00AA6C" rx="5" stroke="#007A4E" stroke-width="1.5"/>
  <text x="102" y="205" text-anchor="middle" class="hbm-label">HBM3</text>
  <text x="102" y="219" text-anchor="middle" class="hbm-label">스택 2</text>
  <text x="102" y="233" text-anchor="middle" font-size="8" fill="#D0FFE8">13.3 GB</text>
  <text x="102" y="247" text-anchor="middle" font-size="8" fill="#D0FFE8">819 GB/s</text>

  <!-- HBM L3 -->
  <rect x="52" y="268" width="100" height="75" fill="#00AA6C" rx="5" stroke="#007A4E" stroke-width="1.5"/>
  <text x="102" y="295" text-anchor="middle" class="hbm-label">HBM3</text>
  <text x="102" y="309" text-anchor="middle" class="hbm-label">스택 3</text>
  <text x="102" y="323" text-anchor="middle" font-size="8" fill="#D0FFE8">13.3 GB</text>
  <text x="102" y="337" text-anchor="middle" font-size="8" fill="#D0FFE8">819 GB/s</text>

  <!-- Right HBM stacks (3) -->
  <!-- HBM R1 -->
  <rect x="428" y="88" width="100" height="75" fill="#00AA6C" rx="5" stroke="#007A4E" stroke-width="1.5"/>
  <text x="478" y="115" text-anchor="middle" class="hbm-label">HBM3</text>
  <text x="478" y="129" text-anchor="middle" class="hbm-label">스택 4</text>
  <text x="478" y="143" text-anchor="middle" font-size="8" fill="#D0FFE8">13.3 GB</text>
  <text x="478" y="157" text-anchor="middle" font-size="8" fill="#D0FFE8">819 GB/s</text>

  <!-- HBM R2 -->
  <rect x="428" y="178" width="100" height="75" fill="#00AA6C" rx="5" stroke="#007A4E" stroke-width="1.5"/>
  <text x="478" y="205" text-anchor="middle" class="hbm-label">HBM3</text>
  <text x="478" y="219" text-anchor="middle" class="hbm-label">스택 5</text>
  <text x="478" y="233" text-anchor="middle" font-size="8" fill="#D0FFE8">13.3 GB</text>
  <text x="478" y="247" text-anchor="middle" font-size="8" fill="#D0FFE8">819 GB/s</text>

  <!-- HBM R3 -->
  <rect x="428" y="268" width="100" height="75" fill="#00AA6C" rx="5" stroke="#007A4E" stroke-width="1.5"/>
  <text x="478" y="295" text-anchor="middle" class="hbm-label">HBM3</text>
  <text x="478" y="309" text-anchor="middle" class="hbm-label">스택 6</text>
  <text x="478" y="323" text-anchor="middle" font-size="8" fill="#D0FFE8">13.3 GB</text>
  <text x="478" y="337" text-anchor="middle" font-size="8" fill="#D0FFE8">819 GB/s</text>

  <!-- Connection lines: GPU to each HBM through interposer -->
  <!-- Left connections (animated bandwidth arrows) -->
  <line x1="154" y1="125" x2="170" y2="155" stroke="#E8962A" stroke-width="2.5">
    <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="0.7s" repeatCount="indefinite"/>
  </line>
  <line x1="154" y1="215" x2="170" y2="195" stroke="#E8962A" stroke-width="2.5">
    <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="0.7s" begin="0.2s" repeatCount="indefinite"/>
  </line>
  <line x1="154" y1="305" x2="170" y2="270" stroke="#E8962A" stroke-width="2.5">
    <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="0.7s" begin="0.4s" repeatCount="indefinite"/>
  </line>

  <!-- Right connections (animated) -->
  <line x1="426" y1="155" x2="428" y2="125" stroke="#E8962A" stroke-width="2.5">
    <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="0.7s" begin="0.1s" repeatCount="indefinite"/>
  </line>
  <line x1="426" y1="195" x2="428" y2="215" stroke="#E8962A" stroke-width="2.5">
    <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="0.7s" begin="0.3s" repeatCount="indefinite"/>
  </line>
  <line x1="426" y1="270" x2="428" y2="305" stroke="#E8962A" stroke-width="2.5">
    <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="0.7s" begin="0.5s" repeatCount="indefinite"/>
  </line>

  <!-- Interposer label -->
  <text x="290" y="370" text-anchor="middle" font-size="10" fill="#D0A0FF">인터포저: GPU ↔ HBM 초광폭 연결 (수천 TSV)</text>

  <!-- Total label at bottom of package -->
  <rect x="52" y="378" width="476" height="42" fill="#002C5F" opacity="0.85" rx="4"/>
  <text x="290" y="393" text-anchor="middle" font-size="10.5" fill="#FFFFFF" font-weight="700">H100 SXM: 6× HBM3 = 80 GB | 3.35 TB/s 합산 대역폭</text>
  <text x="290" y="410" text-anchor="middle" font-size="10" fill="#E8EEF7">H200 SXM: 6× HBM3e = 141 GB | 4.8 TB/s — 더 긴 컨텍스트 처리 가능</text>

  <!-- ===== Right panel: annotations ===== -->
  <rect x="572" y="33" width="220" height="400" fill="#FFFFFF" stroke="#D5CFBF" stroke-width="1" rx="6"/>
  <text x="682" y="52" text-anchor="middle" class="section-title">CoWoS 핵심 정보</text>

  <!-- TSMC note -->
  <rect x="583" y="60" width="198" height="60" fill="#E8EEF7" rx="4"/>
  <text x="682" y="77" text-anchor="middle" font-size="11" fill="#002C5F" font-weight="700">TSMC CoWoS 기술</text>
  <text x="682" y="93" text-anchor="middle" font-size="10" fill="#555555">Chip on Wafer on Substrate</text>
  <text x="682" y="108" text-anchor="middle" font-size="10" fill="#555555">인터포저 = 수동 실리콘 배선층</text>

  <!-- Product comparison -->
  <rect x="583" y="128" width="198" height="110" fill="#F8F8F8" stroke="#D5CFBF" stroke-width="1" rx="4"/>
  <text x="682" y="145" text-anchor="middle" font-size="11" fill="#002C5F" font-weight="700">제품 비교</text>

  <text x="592" y="162" font-size="10" fill="#003F8A" font-weight="600">A100 SXM:</text>
  <text x="592" y="175" font-size="9" fill="#555555">5× HBM2e = 80 GB, 2 TB/s</text>

  <text x="592" y="192" font-size="10" fill="#003F8A" font-weight="600">H100 SXM5:</text>
  <text x="592" y="205" font-size="9" fill="#555555">6× HBM3 = 80 GB, 3.35 TB/s</text>

  <text x="592" y="222" font-size="10" fill="#00AA6C" font-weight="600">H200 SXM5:</text>
  <text x="592" y="235" font-size="9" fill="#555555">6× HBM3e = 141 GB, 4.8 TB/s</text>

  <!-- Supply bottleneck warning -->
  <rect x="583" y="248" width="198" height="78" fill="#FFF0F0" stroke="#DC2626" stroke-width="1.5" rx="4"/>
  <text x="682" y="265" text-anchor="middle" font-size="11" fill="#DC2626" font-weight="700">공급 병목 문제</text>
  <text x="592" y="282" font-size="9" fill="#555555">CoWoS 생산 능력 제한</text>
  <text x="592" y="296" font-size="9" fill="#555555">→ H100/H200 공급 제한의</text>
  <text x="592" y="310" font-size="9" fill="#555555">   주요 원인</text>
  <text x="592" y="322" font-size="9" fill="#DC2626" font-weight="600">TSMC CoWoS 수요 &gt;&gt; 공급</text>

  <!-- MI300X note -->
  <rect x="583" y="335" width="198" height="78" fill="#002C5F" rx="4"/>
  <text x="682" y="352" text-anchor="middle" font-size="10" fill="#FFFFFF" font-weight="700">AMD MI300X 비교</text>
  <text x="592" y="368" font-size="9" fill="#E8EEF7">8× HBM3 = 192 GB</text>
  <text x="592" y="382" font-size="9" fill="#E8EEF7">5.3 TB/s 대역폭</text>
  <text x="592" y="396" font-size="9" fill="#00AA6C" font-weight="600">→ LLM 추론 대용량 배치 유리</text>
  <text x="592" y="410" font-size="9" fill="#A0B8D8">인터포저 대신 3D V-Cache 방식</text>
</svg>
