<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="tl-arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#002C5F"/>
    </marker>
    <!-- Timeline draw animation clipPath -->
    <clipPath id="timeline-clip">
      <rect x="0" y="0" width="0" height="450">
        <animate attributeName="width" from="0" to="800" dur="2s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#F2EDE4"/>

  <!-- Title -->
  <text x="400" y="25" text-anchor="middle" font-size="15" font-weight="700" fill="#002C5F">GPU Tensor Core 세대별 발전</text>
  <text x="400" y="43" text-anchor="middle" font-size="10" fill="#555555">FP8 (Hopper)부터 학습에 저정밀도 사용 가능 → 메모리 2× 절약, 처리량 2× 향상</text>

  <!-- Timeline axis (drawn with animation) -->
  <g clip-path="url(#timeline-clip)">
    <line x1="60" y1="130" x2="760" y2="130" stroke="#002C5F" stroke-width="3" marker-end="url(#tl-arrow)"/>
  </g>

  <!-- ===== VOLTA (2017) ===== -->
  <!-- Node dot -->
  <circle cx="100" cy="130" r="8" fill="#002C5F" stroke="#FFFFFF" stroke-width="2">
    <animate attributeName="r" values="8;11;8" dur="3s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <!-- Connector line up -->
  <line x1="100" y1="122" x2="100" y2="65" stroke="#002C5F" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Card -->
  <rect x="30" y="50" width="145" height="72" rx="6" fill="#002C5F" stroke="#001A3A" stroke-width="1.5"/>
  <text x="103" y="67" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Volta</text>
  <text x="103" y="80" text-anchor="middle" font-size="9" fill="#AACCFF">GV100 · 2017</text>
  <text x="103" y="93" text-anchor="middle" font-size="9" fill="#CCDDFF">125 TFLOPS (FP16)</text>
  <text x="103" y="106" text-anchor="middle" font-size="8" fill="#AACCFF">V100 — AI 학습 혁명</text>
  <!-- Year label -->
  <text x="100" y="148" text-anchor="middle" font-size="9" fill="#555555">2017</text>

  <!-- Precision pills for Volta -->
  <rect x="32" y="170" width="30" height="14" rx="7" fill="#1E3A8A"/>
  <text x="47" y="181" text-anchor="middle" font-size="7" fill="#FFFFFF">FP32</text>
  <rect x="65" y="170" width="30" height="14" rx="7" fill="#1D4ED8"/>
  <text x="80" y="181" text-anchor="middle" font-size="7" fill="#FFFFFF">FP16</text>
  <rect x="98" y="170" width="30" height="14" rx="7" fill="#047857"/>
  <text x="113" y="181" text-anchor="middle" font-size="7" fill="#FFFFFF">INT8</text>
  <rect x="131" y="170" width="30" height="14" rx="7" fill="#6B21A8"/>
  <text x="146" y="181" text-anchor="middle" font-size="7" fill="#FFFFFF">INT4</text>

  <!-- ===== TURING (2018) ===== -->
  <circle cx="240" cy="130" r="8" fill="#003F8A" stroke="#FFFFFF" stroke-width="2">
    <animate attributeName="r" values="8;11;8" dur="3s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <line x1="240" y1="138" x2="240" y2="215" stroke="#003F8A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Card below -->
  <rect x="168" y="215" width="148" height="78" rx="6" fill="#003F8A" stroke="#001A3A" stroke-width="1.5"/>
  <text x="242" y="232" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Turing</text>
  <text x="242" y="245" text-anchor="middle" font-size="9" fill="#AACCFF">TU102 · 2018</text>
  <text x="242" y="258" text-anchor="middle" font-size="9" fill="#CCDDFF">130 TFLOPS (FP16)</text>
  <text x="242" y="271" text-anchor="middle" font-size="8" fill="#AACCFF">RTX 20 Series</text>
  <text x="242" y="284" text-anchor="middle" font-size="8" fill="#88BBFF">+ RT Core 추가</text>
  <text x="240" y="148" text-anchor="middle" font-size="9" fill="#555555">2018</text>

  <!-- Precision pills for Turing -->
  <rect x="170" y="170" width="30" height="14" rx="7" fill="#1E3A8A"/>
  <text x="185" y="181" text-anchor="middle" font-size="7" fill="#FFFFFF">FP32</text>
  <rect x="203" y="170" width="30" height="14" rx="7" fill="#1D4ED8"/>
  <text x="218" y="181" text-anchor="middle" font-size="7" fill="#FFFFFF">FP16</text>
  <rect x="236" y="170" width="30" height="14" rx="7" fill="#047857"/>
  <text x="251" y="181" text-anchor="middle" font-size="7" fill="#FFFFFF">INT8</text>
  <rect x="269" y="170" width="30" height="14" rx="7" fill="#6B21A8"/>
  <text x="284" y="181" text-anchor="middle" font-size="7" fill="#FFFFFF">INT4</text>

  <!-- ===== AMPERE (2020) ===== -->
  <circle cx="390" cy="130" r="9" fill="#1A6BB5" stroke="#FFFFFF" stroke-width="2">
    <animate attributeName="r" values="9;12;9" dur="3s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
  <line x1="390" y1="121" x2="390" y2="55" stroke="#1A6BB5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Card above -->
  <rect x="314" y="50" width="155" height="72" rx="6" fill="#1A6BB5" stroke="#0D3A6A" stroke-width="1.5"/>
  <text x="392" y="67" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Ampere</text>
  <text x="392" y="80" text-anchor="middle" font-size="9" fill="#CCDDFF">GA102 · 2020</text>
  <text x="392" y="93" text-anchor="middle" font-size="9" fill="#DDEEFF">312 TFLOPS (TF32)</text>
  <text x="392" y="106" text-anchor="middle" font-size="8" fill="#AACCFF">A100 · RTX 30 Series</text>
  <text x="390" y="148" text-anchor="middle" font-size="9" fill="#555555">2020</text>

  <!-- New: BF16 + TF32 added -->
  <rect x="314" y="170" width="30" height="14" rx="7" fill="#1E3A8A"/>
  <text x="329" y="181" text-anchor="middle" font-size="7" fill="#FFFFFF">FP32</text>
  <rect x="347" y="170" width="30" height="14" rx="7" fill="#1D4ED8"/>
  <text x="362" y="181" text-anchor="middle" font-size="7" fill="#FFFFFF">FP16</text>
  <rect x="380" y="170" width="28" height="14" rx="7" fill="#0D9488"/>
  <text x="394" y="181" text-anchor="middle" font-size="7" fill="#FFFFFF">BF16</text>
  <rect x="411" y="170" width="28" height="14" rx="7" fill="#047857"/>
  <text x="425" y="181" text-anchor="middle" font-size="7" fill="#FFFFFF">INT8</text>
  <rect x="442" y="170" width="24" height="14" rx="7" fill="#6B21A8"/>
  <text x="454" y="181" text-anchor="middle" font-size="7" fill="#FFFFFF">INT4</text>

  <!-- NEW badge for BF16 -->
  <rect x="380" y="158" width="24" height="10" rx="4" fill="#E8962A"/>
  <text x="392" y="166" text-anchor="middle" font-size="6" fill="#FFFFFF" font-weight="700">NEW</text>

  <!-- ===== HOPPER (2022) ===== -->
  <circle cx="560" cy="130" r="10" fill="#00AA6C" stroke="#FFFFFF" stroke-width="2.5">
    <animate attributeName="r" values="10;14;10" dur="3s" begin="1.2s" repeatCount="indefinite"/>
  </circle>
  <line x1="560" y1="140" x2="560" y2="215" stroke="#00AA6C" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Card below -->
  <rect x="480" y="215" width="162" height="88" rx="6" fill="#00AA6C" stroke="#005533" stroke-width="1.5"/>
  <text x="561" y="232" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Hopper</text>
  <text x="561" y="245" text-anchor="middle" font-size="9" fill="#CCFFE8">GH100 · 2022</text>
  <text x="561" y="258" text-anchor="middle" font-size="9" fill="#FFFFFF">989 TFLOPS (FP8)</text>
  <text x="561" y="271" text-anchor="middle" font-size="8" fill="#CCFFE8">H100 SXM — AI 표준</text>
  <text x="561" y="284" text-anchor="middle" font-size="8" fill="#CCFFE8">NVLink 4 · HBM3</text>
  <text x="561" y="297" text-anchor="middle" font-size="8" fill="#CCFFE8">Transformer Engine</text>
  <text x="560" y="148" text-anchor="middle" font-size="9" fill="#555555">2022</text>

  <!-- Precision pills for Hopper -->
  <rect x="480" y="170" width="30" height="14" rx="7" fill="#1E3A8A"/>
  <text x="495" y="181" text-anchor="middle" font-size="7" fill="#FFFFFF">FP32</text>
  <rect x="513" y="170" width="30" height="14" rx="7" fill="#1D4ED8"/>
  <text x="528" y="181" text-anchor="middle" font-size="7" fill="#FFFFFF">FP16</text>
  <rect x="546" y="170" width="28" height="14" rx="7" fill="#0D9488"/>
  <text x="560" y="181" text-anchor="middle" font-size="7" fill="#FFFFFF">BF16</text>
  <rect x="577" y="170" width="28" height="14" rx="7" fill="#EA580C"/>
  <text x="591" y="181" text-anchor="middle" font-size="7" fill="#FFFFFF">FP8</text>
  <rect x="608" y="170" width="28" height="14" rx="7" fill="#047857"/>
  <text x="622" y="181" text-anchor="middle" font-size="7" fill="#FFFFFF">INT8</text>
  <!-- FP8 NEW badge -->
  <rect x="577" y="158" width="24" height="10" rx="4" fill="#DC2626"/>
  <text x="589" y="166" text-anchor="middle" font-size="6" fill="#FFFFFF" font-weight="700">NEW</text>

  <!-- ===== BLACKWELL (2024) ===== -->
  <circle cx="720" cy="130" r="11" fill="#E8962A" stroke="#FFFFFF" stroke-width="2.5">
    <animate attributeName="r" values="11;15;11" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <line x1="720" y1="121" x2="720" y2="50" stroke="#E8962A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Card above -->
  <rect x="638" y="50" width="155" height="72" rx="6" fill="#E8962A" stroke="#CC7700" stroke-width="1.5"/>
  <text x="716" y="67" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Blackwell</text>
  <text x="716" y="80" text-anchor="middle" font-size="9" fill="#FFF0CC">GB100 · 2024</text>
  <text x="716" y="93" text-anchor="middle" font-size="9" fill="#FFFFFF">4,500 TFLOPS (FP8)</text>
  <text x="716" y="106" text-anchor="middle" font-size="8" fill="#FFF0CC">B200 · GB200 NVL</text>
  <text x="720" y="148" text-anchor="middle" font-size="9" fill="#555555">2024</text>

  <!-- Precision pills for Blackwell -->
  <rect x="638" y="170" width="30" height="14" rx="7" fill="#1E3A8A"/>
  <text x="653" y="181" text-anchor="middle" font-size="7" fill="#FFFFFF">FP32</text>
  <rect x="671" y="170" width="30" height="14" rx="7" fill="#1D4ED8"/>
  <text x="686" y="181" text-anchor="middle" font-size="7" fill="#FFFFFF">FP16</text>
  <rect x="704" y="170" width="28" height="14" rx="7" fill="#0D9488"/>
  <text x="718" y="181" text-anchor="middle" font-size="7" fill="#FFFFFF">BF16</text>
  <rect x="735" y="170" width="28" height="14" rx="7" fill="#EA580C"/>
  <text x="749" y="181" text-anchor="middle" font-size="7" fill="#FFFFFF">FP8</text>

  <!-- NEW FP4 badge -->
  <rect x="638" y="188" width="28" height="14" rx="7" fill="#DC2626"/>
  <text x="652" y="199" text-anchor="middle" font-size="7" fill="#FFFFFF">FP4</text>
  <rect x="638" y="176" width="24" height="10" rx="4" fill="#DC2626"/>
  <text x="650" y="184" text-anchor="middle" font-size="6" fill="#FFFFFF" font-weight="700">NEW</text>
  <rect x="669" y="188" width="28" height="14" rx="7" fill="#047857"/>
  <text x="683" y="199" text-anchor="middle" font-size="7" fill="#FFFFFF">INT8</text>

  <!-- ===== TFLOPS GROWTH BAR CHART at bottom ===== -->
  <text x="400" y="322" text-anchor="middle" font-size="9" font-weight="700" fill="#555555">TFLOPS (FP8/FP16 최고 정밀도 기준)</text>

  <!-- Bar chart labels and bars -->
  <!-- Scale: max 4500 → height 60px; y base = 390 -->
  <!-- Volta: 125 → 1.67px -->
  <rect x="75" y="388" width="30" height="2" rx="1" fill="#002C5F"/>
  <text x="90" y="403" text-anchor="middle" font-size="8" fill="#002C5F">125</text>
  <text x="90" y="413" text-anchor="middle" font-size="7" fill="#555555">Volta</text>

  <!-- Turing: 130 → 1.73px -->
  <rect x="215" y="388" width="30" height="2" rx="1" fill="#003F8A"/>
  <text x="230" y="403" text-anchor="middle" font-size="8" fill="#003F8A">130</text>
  <text x="230" y="413" text-anchor="middle" font-size="7" fill="#555555">Turing</text>

  <!-- Ampere: 312 → 4.2px -->
  <rect x="362" y="385" width="30" height="5" rx="1" fill="#1A6BB5"/>
  <text x="377" y="403" text-anchor="middle" font-size="8" fill="#1A6BB5">312</text>
  <text x="377" y="413" text-anchor="middle" font-size="7" fill="#555555">Ampere</text>

  <!-- Hopper: 989 → 13.2px -->
  <rect x="530" y="377" width="30" height="13" rx="1" fill="#00AA6C"/>
  <text x="545" y="403" text-anchor="middle" font-size="8" fill="#00AA6C">989</text>
  <text x="545" y="413" text-anchor="middle" font-size="7" fill="#555555">Hopper</text>

  <!-- Blackwell: 4500 → 60px -->
  <rect x="695" y="330" width="30" height="60" rx="2" fill="#E8962A">
    <animate attributeName="height" from="0" to="60" dur="1.5s" fill="freeze" begin="1.5s"/>
    <animate attributeName="y" from="390" to="330" dur="1.5s" fill="freeze" begin="1.5s"/>
  </rect>
  <text x="710" y="403" text-anchor="middle" font-size="8" fill="#E8962A" font-weight="700">4,500</text>
  <text x="710" y="413" text-anchor="middle" font-size="7" fill="#555555">Blackwell</text>

  <!-- Bar base line -->
  <line x1="60" y1="390" x2="760" y2="390" stroke="#D5CFBF" stroke-width="1"/>

  <!-- Precision legend -->
  <rect x="60" y="425" width="16" height="10" rx="5" fill="#1E3A8A"/>
  <text x="80" y="434" font-size="8" fill="#555555">FP32</text>
  <rect x="115" y="425" width="16" height="10" rx="5" fill="#1D4ED8"/>
  <text x="135" y="434" font-size="8" fill="#555555">FP16</text>
  <rect x="170" y="425" width="16" height="10" rx="5" fill="#0D9488"/>
  <text x="190" y="434" font-size="8" fill="#555555">BF16</text>
  <rect x="225" y="425" width="16" height="10" rx="5" fill="#EA580C"/>
  <text x="245" y="434" font-size="8" fill="#555555">FP8</text>
  <rect x="278" y="425" width="16" height="10" rx="5" fill="#DC2626"/>
  <text x="298" y="434" font-size="8" fill="#555555">FP4</text>
  <rect x="327" y="425" width="16" height="10" rx="5" fill="#047857"/>
  <text x="347" y="434" font-size="8" fill="#555555">INT8</text>
  <rect x="381" y="425" width="16" height="10" rx="5" fill="#6B21A8"/>
  <text x="401" y="434" font-size="8" fill="#555555">INT4</text>

  <text x="500" y="435" text-anchor="middle" font-size="8" fill="#888888">* Tensor Core 스파스 처리(2:4) 포함 수치</text>
</svg>
