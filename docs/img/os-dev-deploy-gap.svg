<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="da" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#00AA6C"/>
    </marker>
    <marker id="dr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#DC2626"/>
    </marker>
  </defs>
  <rect width="900" height="560" fill="#FAF7F2"/>
  <text x="450" y="36" font-size="20" font-weight="800" fill="#002C5F" text-anchor="middle">"내 컴퓨터에선 되는데요" — 환경 불일치가 만드는 비용</text>

  <!-- 위: macOS 경로 -->
  <rect x="30" y="60" width="840" height="200" rx="14" fill="#FFFFFF" stroke="#00AA6C" stroke-width="2.5"/>
  <text x="52" y="90" font-size="16" font-weight="800" fill="#065F46">✅ macOS / Linux — 같은 혈통이라 마찰이 거의 없다</text>

  <rect x="55" y="106" width="180" height="72" rx="10" fill="#E8EEF7" stroke="#1A5CB5" stroke-width="2"/>
  <text x="145" y="134" font-size="14" font-weight="800" fill="#002C5F" text-anchor="middle">💻 개발 (macOS)</text>
  <text x="145" y="156" font-size="11.5" fill="#555555" text-anchor="middle">zsh · /경로 · LF</text>
  <text x="145" y="172" font-size="11.5" fill="#555555" text-anchor="middle">brew로 도구 설치</text>

  <rect x="290" y="106" width="180" height="72" rx="10" fill="#E6F7F1" stroke="#00AA6C" stroke-width="2"/>
  <text x="380" y="134" font-size="14" font-weight="800" fill="#065F46" text-anchor="middle">🐳 Docker 이미지</text>
  <text x="380" y="156" font-size="11.5" fill="#555555" text-anchor="middle">Linux 기반</text>
  <text x="380" y="172" font-size="11.5" fill="#555555" text-anchor="middle">그대로 빌드됨</text>

  <rect x="525" y="106" width="180" height="72" rx="10" fill="#065F46"/>
  <text x="615" y="134" font-size="14" font-weight="800" fill="#FFF" text-anchor="middle">🖥 배포 (Linux)</text>
  <text x="615" y="156" font-size="11.5" fill="#A7E3CC" text-anchor="middle">bash · /경로 · LF</text>
  <text x="615" y="172" font-size="11.5" fill="#A7E3CC" text-anchor="middle">동일하게 동작</text>

  <line x1="235" y1="142" x2="286" y2="142" stroke="#00AA6C" stroke-width="2.5" marker-end="url(#da)"/>
  <line x1="470" y1="142" x2="521" y2="142" stroke="#00AA6C" stroke-width="2.5" marker-end="url(#da)"/>

  <rect x="740" y="106" width="105" height="72" rx="10" fill="#E6F7F1" stroke="#00AA6C" stroke-width="2"/>
  <text x="792" y="140" font-size="20" font-weight="800" fill="#065F46" text-anchor="middle">👍</text>
  <text x="792" y="164" font-size="12" font-weight="700" fill="#065F46" text-anchor="middle">번역 0회</text>

  <text x="55" y="208" font-size="13" fill="#555555">· README의 설치 명령을 그대로 복사·붙여넣기하면 된다 (대부분 macOS/Linux 기준으로 쓰여 있음)</text>
  <text x="55" y="230" font-size="13" fill="#555555">· 팀원의 스크립트·CI 설정(GitHub Actions는 Linux 러너)이 내 컴퓨터에서도 그대로 실행된다</text>
  <text x="55" y="250" font-size="13" fill="#555555">· 서버에서 쓰는 명령(ssh·grep·tail)을 로컬에서 연습한 그대로 사용</text>

  <!-- 아래: Windows 경로 -->
  <rect x="30" y="280" width="840" height="240" rx="14" fill="#FFFFFF" stroke="#DC2626" stroke-width="2.5"/>
  <text x="52" y="310" font-size="16" font-weight="800" fill="#DC2626">⚠️ Windows(네이티브) — 곳곳에 "번역"이 필요하다</text>

  <rect x="55" y="326" width="180" height="72" rx="10" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
  <text x="145" y="354" font-size="14" font-weight="800" fill="#DC2626" text-anchor="middle">💻 개발 (Windows)</text>
  <text x="145" y="376" font-size="11.5" fill="#555555" text-anchor="middle">PowerShell · C:\경로</text>
  <text x="145" y="392" font-size="11.5" fill="#555555" text-anchor="middle">CRLF 줄바꿈</text>

  <rect x="290" y="326" width="180" height="72" rx="10" fill="#FEF3E2" stroke="#E8962A" stroke-width="2"/>
  <text x="380" y="350" font-size="13.5" font-weight="800" fill="#B45309" text-anchor="middle">🔄 변환 계층</text>
  <text x="380" y="371" font-size="11.5" fill="#555555" text-anchor="middle">WSL2 · Git Bash</text>
  <text x="380" y="388" font-size="11.5" fill="#555555" text-anchor="middle">경로·개행 변환 설정</text>

  <rect x="525" y="326" width="180" height="72" rx="10" fill="#065F46"/>
  <text x="615" y="354" font-size="14" font-weight="800" fill="#FFF" text-anchor="middle">🖥 배포 (Linux)</text>
  <text x="615" y="376" font-size="11.5" fill="#A7E3CC" text-anchor="middle">여기서 처음 드러나는</text>
  <text x="615" y="392" font-size="11.5" fill="#A7E3CC" text-anchor="middle">차이들…</text>

  <line x1="235" y1="362" x2="286" y2="362" stroke="#DC2626" stroke-width="2.5" marker-end="url(#dr)"/>
  <line x1="470" y1="362" x2="521" y2="362" stroke="#DC2626" stroke-width="2.5" marker-end="url(#dr)"/>

  <rect x="740" y="326" width="105" height="72" rx="10" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
  <text x="792" y="360" font-size="20" font-weight="800" fill="#DC2626" text-anchor="middle">🐛</text>
  <text x="792" y="384" font-size="12" font-weight="700" fill="#DC2626" text-anchor="middle">환경 버그</text>

  <text x="55" y="428" font-size="13" fill="#555555">· <tspan font-weight="700" fill="#DC2626">CRLF 지옥</tspan> — 셸 스크립트 첫 줄에 보이지 않는 \r이 붙어 리눅스에서 "command not found"</text>
  <text x="55" y="450" font-size="13" fill="#555555">· <tspan font-weight="700" fill="#DC2626">대소문자</tspan> — Windows는 Header.js = header.js로 취급, 리눅스는 다른 파일 → 배포 후에만 터지는 import 오류</text>
  <text x="55" y="472" font-size="13" fill="#555555">· <tspan font-weight="700" fill="#DC2626">경로·권한</tspan> — path 구분자(\ vs /), 260자 경로 길이 제한, chmod 실행권한 개념 부재</text>
  <text x="55" y="494" font-size="13" fill="#555555">· <tspan font-weight="700" fill="#00AA6C">WSL2를 쓰면 대부분 해소</tspan> — 다만 "윈도우 위에 리눅스를 하나 더 얹는" 이중 구조가 된다</text>
</svg>
