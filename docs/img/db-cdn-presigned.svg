<svg width="800" height="480" viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <style>
    .title { font-size: 15px; font-weight: 700; fill: #002C5F; }
    .section-title { font-size: 12.5px; font-weight: 700; fill: #002C5F; }
    .small { font-size: 9.5px; fill: #555555; }
    .mono { font-family: 'Consolas', 'Courier New', monospace; }
  </style>

  <rect width="800" height="480" fill="#F2EDE4"/>
  <text x="400" y="26" text-anchor="middle" class="title">CDN과 Presigned URL — "저장"과 "전달"은 다른 문제다</text>

  <!-- ===== TOP: CDN ===== -->
  <rect x="30" y="42" width="740" height="240" fill="#FFFFFF" stroke="#D5CFBF" stroke-width="1" rx="8"/>
  <text x="46" y="64" class="section-title">CDN (Content Delivery Network) — 전 세계 엣지 서버에 미리 복사해 두기</text>

  <!-- origin -->
  <rect x="60" y="90" width="120" height="70" fill="#003F8A" rx="6"/>
  <text x="120" y="112" text-anchor="middle" font-size="10" fill="#FFF" font-weight="700">원본 (S3)</text>
  <text x="120" y="128" text-anchor="middle" font-size="8.5" fill="#E8EEF7">미국 버지니아</text>
  <text x="120" y="146" text-anchor="middle" font-size="8.5" fill="#E8EEF7">Origin Server</text>

  <!-- edge servers -->
  <rect x="290" y="76" width="92" height="46" fill="#00AA6C" rx="6"/>
  <text x="336" y="94" text-anchor="middle" font-size="9" fill="#FFF" font-weight="700">서울 엣지</text>
  <text x="336" y="110" text-anchor="middle" font-size="7.5" fill="#E6F7F1">복사본 보유 ✓</text>

  <rect x="290" y="132" width="92" height="42" fill="#1A5CB5" rx="6"/>
  <text x="336" y="149" text-anchor="middle" font-size="9" fill="#FFF" font-weight="700">도쿄 엣지</text>
  <text x="336" y="164" text-anchor="middle" font-size="7.5" fill="#E8EEF7">복사본 보유 ✓</text>

  <rect x="290" y="184" width="92" height="42" fill="#1A5CB5" rx="6"/>
  <text x="336" y="201" text-anchor="middle" font-size="9" fill="#FFF" font-weight="700">런던 엣지</text>
  <text x="336" y="216" text-anchor="middle" font-size="7.5" fill="#E8EEF7">복사본 보유 ✓</text>

  <rect x="290" y="236" width="92" height="34" fill="#5B8DD9" rx="6"/>
  <text x="336" y="257" text-anchor="middle" font-size="8.5" fill="#FFF" font-weight="700">상파울루 … 등</text>

  <!-- copy arrows origin -> edges -->
  <line x1="182" y1="108" x2="286" y2="98" stroke="#8A8A8A" stroke-width="1.3" stroke-dasharray="4,3"/>
  <line x1="182" y1="122" x2="286" y2="150" stroke="#8A8A8A" stroke-width="1.3" stroke-dasharray="4,3"/>
  <line x1="182" y1="136" x2="286" y2="202" stroke="#8A8A8A" stroke-width="1.3" stroke-dasharray="4,3"/>
  <text x="226" y="90" font-size="8.5" fill="#8A8A8A">미리 복사 (캐싱)</text>

  <!-- user -->
  <rect x="530" y="80" width="110" height="52" fill="#1A1A1A" rx="6"/>
  <text x="585" y="101" text-anchor="middle" font-size="10" fill="#FFF" font-weight="700">한국 사용자</text>
  <text x="585" y="118" text-anchor="middle" font-size="8.5" fill="#D5CFBF">이미지 요청</text>

  <!-- fast path: user <-> Seoul edge -->
  <path d="M 528 100 Q 460 96 386 98" fill="none" stroke="#00AA6C" stroke-width="3"/>
  <polygon points="386,98 396,93 396,103" fill="#00AA6C"/>
  <rect x="420" y="58" width="96" height="20" fill="#E6F7F1" stroke="#00AA6C" rx="10"/>
  <text x="468" y="72" text-anchor="middle" font-size="9.5" fill="#065F46" font-weight="700">서울에서 ~10ms ⚡</text>

  <!-- slow path: user to origin (crossed out) -->
  <path d="M 585 134 Q 500 250 184 165" fill="none" stroke="#DC2626" stroke-width="2" stroke-dasharray="7,4"/>
  <rect x="430" y="218" width="188" height="20" fill="#FEE2E2" stroke="#DC2626" rx="10"/>
  <text x="524" y="232" text-anchor="middle" font-size="9.5" fill="#DC2626" font-weight="700">태평양 왕복 ~200ms — 이 경로를 차단</text>

  <!-- analogy -->
  <rect x="655" y="150" width="106" height="120" fill="#FAF7F2" stroke="#D5CFBF" rx="6"/>
  <text x="708" y="170" text-anchor="middle" font-size="9" fill="#002C5F" font-weight="700">🧺 비유</text>
  <text x="708" y="190" text-anchor="middle" font-size="8" fill="#555">자주 팔리는 물건을</text>
  <text x="708" y="203" text-anchor="middle" font-size="8" fill="#555">계산대 옆 바구니에</text>
  <text x="708" y="216" text-anchor="middle" font-size="8" fill="#555">꺼내 놓는 것(캐싱)을</text>
  <text x="708" y="229" text-anchor="middle" font-size="8" fill="#555">전 세계 매장마다</text>
  <text x="708" y="242" text-anchor="middle" font-size="8" fill="#555">해두는 것 = CDN</text>
  <text x="708" y="260" text-anchor="middle" font-size="8" fill="#B45309" font-weight="700">지연시간(Latency) ↓</text>

  <!-- ===== BOTTOM: access control / presigned ===== -->
  <rect x="30" y="298" width="740" height="150" fill="#FFFFFF" stroke="#D5CFBF" stroke-width="1" rx="8"/>
  <text x="46" y="320" class="section-title">파일 접근 권한 — Public · Private · Presigned URL</text>

  <!-- public -->
  <rect x="46" y="334" width="222" height="98" fill="#E6F7F1" stroke="#00AA6C" stroke-width="1" rx="6"/>
  <text x="157" y="354" text-anchor="middle" font-size="10.5" fill="#065F46" font-weight="700">🌐 Public</text>
  <text x="157" y="374" text-anchor="middle" font-size="9" fill="#555">URL만 알면 누구나 접근 가능</text>
  <text x="157" y="392" text-anchor="middle" font-size="9" fill="#555">예: SNS 프로필 사진,</text>
  <text x="157" y="406" text-anchor="middle" font-size="9" fill="#555">공개 게시물 이미지, 로고</text>

  <!-- private -->
  <rect x="284" y="334" width="222" height="98" fill="#FEE2E2" stroke="#DC2626" stroke-width="1" rx="6"/>
  <text x="395" y="354" text-anchor="middle" font-size="10.5" fill="#DC2626" font-weight="700">🔒 Private</text>
  <text x="395" y="374" text-anchor="middle" font-size="9" fill="#555">URL을 알아도 접근 불가</text>
  <text x="395" y="392" text-anchor="middle" font-size="9" fill="#555">예: 개인 사진, 결제 영수증,</text>
  <text x="395" y="406" text-anchor="middle" font-size="9" fill="#555">회사 기밀 문서</text>

  <!-- presigned -->
  <rect x="522" y="334" width="232" height="98" fill="#FEF3E2" stroke="#E8962A" stroke-width="1.5" rx="6"/>
  <text x="638" y="354" text-anchor="middle" font-size="10.5" fill="#B45309" font-weight="700">🎟 Presigned URL (임시 서명)</text>
  <text x="638" y="372" text-anchor="middle" font-size="8.5" fill="#555">서버가 "이 사람은 권한 있음"이라고</text>
  <text x="638" y="385" text-anchor="middle" font-size="8.5" fill="#555">서명한 <tspan font-weight="700" fill="#B45309">시간제한 임시 URL</tspan> 발급</text>
  <text x="638" y="403" text-anchor="middle" font-size="8" fill="#8A8A8A" class="mono">...profile.jpg?expires=600&amp;sig=a1b2</text>
  <text x="638" y="420" text-anchor="middle" font-size="8.5" fill="#DC2626" font-weight="600">10분 뒤 만료 — 영화표처럼 그 시간에만 유효</text>

  <!-- bottom line -->
  <text x="400" y="468" text-anchor="middle" font-size="11" fill="#002C5F" font-weight="700">현대 스토리지 = 저장(S3) + 전달(CDN) + 접근 제어(권한·서명)가 하나의 시스템으로 설계된다</text>
</svg>
