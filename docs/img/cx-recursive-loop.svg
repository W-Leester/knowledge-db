<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="ra3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#003F8A"/>
    </marker>
    <marker id="rp3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B21A8"/>
    </marker>
    <marker id="rg3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#00AA6C"/>
    </marker>
  </defs>
  <rect width="900" height="640" fill="#FAF7F2"/>
  <text x="450" y="34" font-size="20" font-weight="800" fill="#002C5F" text-anchor="middle">재귀 루프 — 안쪽은 작업물을, 바깥은 루프 자체를 개선한다</text>

  <!-- 하네스 스택 -->
  <rect x="40" y="80" width="230" height="270" rx="14" fill="#FFFFFF" stroke="#1A5CB5" stroke-width="2.5"/>
  <text x="155" y="110" font-size="15" font-weight="800" fill="#002C5F" text-anchor="middle">🧰 하네스 v N</text>
  <rect x="60" y="126" width="190" height="38" rx="8" fill="#E8EEF7"/>
  <text x="155" y="150" font-size="12" font-weight="700" fill="#002C5F" text-anchor="middle">CLAUDE.md (지시)</text>
  <rect x="60" y="172" width="190" height="38" rx="8" fill="#FEF3E2"/>
  <text x="155" y="196" font-size="12" font-weight="700" fill="#B45309" text-anchor="middle">Skills (절차)</text>
  <rect x="60" y="218" width="190" height="38" rx="8" fill="#F3E8FF"/>
  <text x="155" y="242" font-size="12" font-weight="700" fill="#6B21A8" text-anchor="middle">Auto Memory (기억)</text>
  <rect x="60" y="264" width="190" height="38" rx="8" fill="#E6F7F1"/>
  <text x="155" y="288" font-size="12" font-weight="700" fill="#065F46" text-anchor="middle">verify 스크립트 (검증)</text>
  <text x="155" y="330" font-size="11" fill="#8A8A8A" text-anchor="middle">전부 git으로 버전 관리 = 안전망</text>

  <!-- 안쪽 루프 -->
  <rect x="330" y="80" width="240" height="270" rx="14" fill="#FFFFFF" stroke="#00AA6C" stroke-width="2.5"/>
  <text x="450" y="110" font-size="15" font-weight="800" fill="#065F46" text-anchor="middle">⚡ 안쪽 루프 — 작업</text>
  <rect x="375" y="130" width="150" height="40" rx="9" fill="#E8EEF7" stroke="#1A5CB5" stroke-width="1.5"/>
  <text x="450" y="156" font-size="12.5" font-weight="700" fill="#002C5F" text-anchor="middle">📋 계획</text>
  <rect x="375" y="192" width="150" height="40" rx="9" fill="#FEF3E2" stroke="#E8962A" stroke-width="1.5"/>
  <text x="450" y="218" font-size="12.5" font-weight="700" fill="#B45309" text-anchor="middle">⚙️ 실행</text>
  <rect x="375" y="254" width="150" height="40" rx="9" fill="#E6F7F1" stroke="#00AA6C" stroke-width="1.5"/>
  <text x="450" y="280" font-size="12.5" font-weight="700" fill="#065F46" text-anchor="middle">🔍 검증</text>
  <line x1="450" y1="170" x2="450" y2="188" stroke="#003F8A" stroke-width="2.2" marker-end="url(#ra3)"/>
  <line x1="450" y1="232" x2="450" y2="250" stroke="#003F8A" stroke-width="2.2" marker-end="url(#ra3)"/>
  <path d="M 375 274 C 348 274 348 150 371 150" fill="none" stroke="#8A8A8A" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ra3)"/>
  <text x="450" y="330" font-size="11.5" font-weight="700" fill="#065F46" text-anchor="middle">분 단위로 돈다 · 산출물 = 작업물</text>

  <line x1="270" y1="200" x2="326" y2="200" stroke="#003F8A" stroke-width="2.5" marker-end="url(#ra3)"/>
  <text x="298" y="188" font-size="11" fill="#003F8A" text-anchor="middle" font-weight="700">행동을 결정</text>

  <!-- 회고 -->
  <rect x="630" y="80" width="240" height="100" rx="12" fill="#F3E8FF" stroke="#6B21A8" stroke-width="2.5"/>
  <text x="750" y="108" font-size="14.5" font-weight="800" fill="#6B21A8" text-anchor="middle">🪞 회고 (세션 말 · 주간)</text>
  <text x="750" y="132" font-size="11.5" fill="#555555" text-anchor="middle">작업 기록에서 반복된 실수·</text>
  <text x="750" y="150" font-size="11.5" fill="#555555" text-anchor="middle">비효율·자주 쓴 절차를 발굴</text>
  <text x="750" y="170" font-size="10.5" fill="#8A8A8A" text-anchor="middle">"무엇이 3번 이상 반복됐나?"</text>

  <line x1="570" y1="150" x2="626" y2="130" stroke="#6B21A8" stroke-width="2.5" marker-end="url(#rp3)"/>
  <text x="600" y="122" font-size="11" fill="#6B21A8" font-weight="700" text-anchor="middle">작업 기록</text>

  <!-- 수정안 -->
  <rect x="630" y="204" width="240" height="86" rx="12" fill="#FFFFFF" stroke="#6B21A8" stroke-width="2"/>
  <text x="750" y="232" font-size="14" font-weight="800" fill="#6B21A8" text-anchor="middle">📝 하네스 수정안 (diff)</text>
  <text x="750" y="256" font-size="11.5" fill="#555555" text-anchor="middle">"CLAUDE.md에 규칙 추가" ·</text>
  <text x="750" y="274" font-size="11.5" fill="#555555" text-anchor="middle">"이 절차를 스킬로 승격" · "검증 보강"</text>
  <line x1="750" y1="180" x2="750" y2="200" stroke="#6B21A8" stroke-width="2.5" marker-end="url(#rp3)"/>

  <!-- 게이트 -->
  <rect x="630" y="314" width="240" height="96" rx="12" fill="#FEF3E2" stroke="#E8962A" stroke-width="2.5"/>
  <text x="750" y="342" font-size="14.5" font-weight="800" fill="#B45309" text-anchor="middle">🚦 채택 게이트</text>
  <text x="750" y="366" font-size="11.5" fill="#555555" text-anchor="middle">사람 승인 (승인형) 또는</text>
  <text x="750" y="384" font-size="11.5" fill="#555555" text-anchor="middle">지표 비교 — 나아졌을 때만 (측정형)</text>
  <line x1="750" y1="290" x2="750" y2="310" stroke="#6B21A8" stroke-width="2.5" marker-end="url(#rp3)"/>

  <!-- 바깥 루프 귀환 -->
  <path d="M 630 380 C 300 420 155 410 155 354" fill="none" stroke="#00AA6C" stroke-width="3.5" marker-end="url(#rg3)"/>
  <text x="390" y="428" font-size="13.5" font-weight="800" fill="#065F46" text-anchor="middle">✅ 채택 → 하네스 v N+1 — 바깥 루프 (일·주 단위) · 다음 작업은 개선된 하네스 위에서</text>

  <!-- 함정 밴드 -->
  <rect x="30" y="464" width="840" height="152" rx="14" fill="#0D1B2E"/>
  <text x="62" y="494" font-size="14.5" font-weight="800" fill="#FFF">⚠️ 재귀의 3대 함정 — 바깥 루프는 강력한 만큼 오염도 복리로 퍼진다</text>
  <rect x="62" y="510" width="245" height="90" rx="10" fill="rgba(255,255,255,.08)"/>
  <text x="184" y="536" font-size="12.5" font-weight="800" fill="#E8962A" text-anchor="middle">평가자 부재</text>
  <text x="184" y="558" font-size="10.5" fill="#C7D5EA" text-anchor="middle">자기 회고만 믿으면 잘못된</text>
  <text x="184" y="574" font-size="10.5" fill="#C7D5EA" text-anchor="middle">교훈이 자기강화된다</text>
  <text x="184" y="592" font-size="10.5" font-weight="700" fill="#7FD1A8" text-anchor="middle">→ 외부 지표·테스트로 판정</text>
  <rect x="327" y="510" width="245" height="90" rx="10" fill="rgba(255,255,255,.08)"/>
  <text x="449" y="536" font-size="12.5" font-weight="800" fill="#E8962A" text-anchor="middle">하네스 오염</text>
  <text x="449" y="558" font-size="10.5" fill="#C7D5EA" text-anchor="middle">나쁜 규칙 하나가 이후</text>
  <text x="449" y="574" font-size="10.5" fill="#C7D5EA" text-anchor="middle">모든 세션을 오염시킨다</text>
  <text x="449" y="592" font-size="10.5" font-weight="700" fill="#7FD1A8" text-anchor="middle">→ 승인 게이트 + git revert</text>
  <rect x="592" y="510" width="245" height="90" rx="10" fill="rgba(255,255,255,.08)"/>
  <text x="714" y="536" font-size="12.5" font-weight="800" fill="#E8962A" text-anchor="middle">지표 왜곡 (Goodhart)</text>
  <text x="714" y="558" font-size="10.5" fill="#C7D5EA" text-anchor="middle">"테스트 통과율 최적화"가</text>
  <text x="714" y="574" font-size="10.5" fill="#C7D5EA" text-anchor="middle">테스트 약화로 진화할 수 있다</text>
  <text x="714" y="592" font-size="10.5" font-weight="700" fill="#7FD1A8" text-anchor="middle">→ 지표 다양화 + 사람 감사</text>
</svg>
