<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="cca" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#003F8A"/>
    </marker>
  </defs>
  <rect width="900" height="620" fill="#FAF7F2"/>
  <text x="450" y="34" font-size="20" font-weight="800" fill="#002C5F" text-anchor="middle">컨텍스트 관리 — 세 겹의 방어선 (작은 창에서 긴 작업을 잇는 법)</text>
  <text x="450" y="58" font-size="13" fill="#8A8A8A" text-anchor="middle">싼 것부터 무거운 것 순 — 로컬 LLM 하네스에 가장 이식 가치가 높은 부분</text>

  <!-- 토큰 게이지 -->
  <text x="60" y="92" font-size="13" font-weight="800" fill="#002C5F">📏 컨텍스트 창 = 유효창 − 출력예약(~20K) − 버퍼(~13K)</text>
  <rect x="60" y="102" width="780" height="34" rx="8" fill="#E6F7F1" stroke="#00AA6C" stroke-width="1.5"/>
  <rect x="60" y="102" width="500" height="34" rx="8" fill="#A7E3CC"/>
  <rect x="560" y="102" width="180" height="34" fill="#FEF3E2"/>
  <rect x="740" y="102" width="100" height="34" rx="8" fill="#FEE2E2"/>
  <text x="310" y="124" font-size="11.5" font-weight="700" fill="#065F46" text-anchor="middle">대화·작업 (안전)</text>
  <text x="650" y="124" font-size="11" font-weight="700" fill="#B45309" text-anchor="middle">경고·압축 발화</text>
  <text x="790" y="124" font-size="11" font-weight="700" fill="#DC2626" text-anchor="middle">차단</text>

  <!-- 1단계 microcompact -->
  <rect x="30" y="158" width="840" height="118" rx="14" fill="#E8EEF7" stroke="#1A5CB5" stroke-width="2.5"/>
  <text x="52" y="186" font-size="15" font-weight="800" fill="#002C5F">① Microcompact — LLM 호출 없음 (가장 쌈, 매 요청 전)</text>
  <text x="52" y="212" font-size="12.5" fill="#555555">오래된 <strong>도구 결과(tool_result)만</strong> 잘라낸다 → <tspan font-family="'JetBrains Mono', monospace" font-size="11">[Old tool result cleared]</tspan>. 사용자·어시스턴트 텍스트는 절대 안 건드림.</text>
  <text x="52" y="234" font-size="12.5" fill="#555555">대상은 재현 가능한 도구만(Read·Bash·Grep·Web… 화이트리스트) — "파일은 다시 읽으면 되니까 버려도 안전".</text>
  <text x="52" y="258" font-size="11.5" font-weight="700" fill="#1A5CB5">→ 로컬 이식: 최근 N개만 남기고 옛 tool_result를 치환. 요약 비용 0으로 큰 절감.</text>

  <!-- 2단계 full compact -->
  <rect x="30" y="288" width="840" height="150" rx="14" fill="#FEF3E2" stroke="#E8962A" stroke-width="2.5"/>
  <text x="52" y="316" font-size="15" font-weight="800" fill="#B45309">② Full Compaction — 별도 LLM 호출로 대화 전체 요약 (임계치 도달 시)</text>
  <text x="52" y="342" font-size="12.5" fill="#555555">9섹션 구조화 요약 강제: 요청·의도 / 기술개념 / 파일·코드 / 오류·수정 / <strong>모든 사용자 메시지</strong> / 대기 작업 / 현재 작업 /</text>
  <text x="52" y="362" font-size="12.5" fill="#555555"><strong>다음 단계(직전 작업을 그대로 인용)</strong> — "의도 드리프트" 방지가 핵심 설계.</text>
  <text x="52" y="386" font-size="12.5" fill="#555555">·〈analysis〉스크래치패드에 먼저 쓰고〈summary〉만 남김  ·원본 트랜스크립트는 디스크에 남기고 <strong>경로를 첨부</strong>(필요시 다시 읽게)</text>
  <text x="52" y="406" font-size="12.5" fill="#555555">·압축 직후 <strong>최근 읽은 파일 top-N 재주입</strong>(파일당 토큰 cap) — 모델이 다시 읽느라 턴 낭비하는 것 방지</text>
  <text x="52" y="428" font-size="11.5" font-weight="700" fill="#B45309">→ 로컬 이식: 이 프롬프트 구조와 "원본 경로 첨부 + 최근 파일 재주입"이 가장 베낄 가치 높음.</text>

  <!-- 3단계 memory -->
  <rect x="30" y="450" width="840" height="118" rx="14" fill="#F3E8FF" stroke="#6B21A8" stroke-width="2.5"/>
  <text x="52" y="478" font-size="15" font-weight="800" fill="#6B21A8">③ 영속 메모리 (memdir) — 세션을 넘는 저장 (컨텍스트 밖으로 외부화)</text>
  <text x="52" y="504" font-size="12.5" fill="#555555">매 작업 끝에 background fork가 "미래에 유용한 사실"만 추출해 파일로. <strong>MEMORY.md(인덱스)만 항상 로드</strong>, 토픽 파일은 필요시 회상.</text>
  <text x="52" y="524" font-size="12.5" fill="#555555">4타입(user·feedback·project·reference) · "코드에서 유도 가능한 건 저장 안 함" · 드리프트 방어(파일 존재를 실제로 재확인).</text>
  <text x="52" y="548" font-size="11.5" font-weight="700" fill="#6B21A8">→ 로컬 이식: 작은 창일수록 필수 — 전체 이력을 담는 대신 "인덱스 + 주문형 회상". 이 문서함의 Auto Memory가 바로 이것.</text>

  <!-- 하단 -->
  <text x="450" y="596" font-size="12.5" font-weight="700" fill="#8A8A8A" text-anchor="middle">에스컬레이션: microcompact(도구결과 clear) → full summary → 그래도 넘으면 오래된 라운드부터 잘라 재시도 · 연속 실패 N회면 서킷 브레이커</text>
  <text x="450" y="616" font-size="11" fill="#8A8A8A" text-anchor="middle">※ 토큰 추정은 로컬 토크나이저 또는 char/4 + 보수 패딩(과대추정 편향) — 압축이 늦어 창을 넘기는 것보다 일찍 도는 게 안전</text>
</svg>
