<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="sa2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B21A8"/>
    </marker>
    <marker id="sg2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#00AA6C"/>
    </marker>
  </defs>
  <rect width="900" height="520" fill="#FAF7F2"/>
  <text x="450" y="34" font-size="20" font-weight="800" fill="#002C5F" text-anchor="middle">서브에이전트 — "딴 방에서 일 시키고 결론만 받는다"</text>

  <!-- 메인 대화 -->
  <rect x="30" y="66" width="330" height="330" rx="14" fill="#FFFFFF" stroke="#1A5CB5" stroke-width="2.5"/>
  <text x="195" y="96" font-size="15.5" font-weight="800" fill="#002C5F" text-anchor="middle">💬 메인 대화 (내 컨텍스트)</text>
  <rect x="52" y="112" width="286" height="40" rx="8" fill="#E8EEF7"/>
  <text x="195" y="137" font-size="12" fill="#555555" text-anchor="middle">사용자: "이 주제 리서치해줘"</text>
  <rect x="52" y="160" width="286" height="40" rx="8" fill="#E8EEF7"/>
  <text x="195" y="185" font-size="12" fill="#555555" text-anchor="middle">Claude: 리서치 에이전트에게 위임 →</text>
  <rect x="52" y="208" width="286" height="52" rx="8" fill="#E6F7F1" stroke="#00AA6C" stroke-width="1.5"/>
  <text x="195" y="230" font-size="12" font-weight="700" fill="#065F46" text-anchor="middle">← 요약 보고서 (딱 이만큼만 돌아옴)</text>
  <text x="195" y="250" font-size="10.5" fill="#8A8A8A" text-anchor="middle">출처 5곳 종합 · 핵심 3가지 · 결론</text>
  <rect x="52" y="268" width="286" height="40" rx="8" fill="#E8EEF7"/>
  <text x="195" y="293" font-size="12" fill="#555555" text-anchor="middle">대화 계속… (창이 깨끗하게 유지됨)</text>
  <text x="195" y="340" font-size="12.5" font-weight="700" fill="#1A5CB5" text-anchor="middle">✨ 부산물이 쌓이지 않는다</text>
  <text x="195" y="362" font-size="11" fill="#8A8A8A" text-anchor="middle">긴 세션에서도 작업 공간이 넓게 유지</text>

  <!-- 서브에이전트 방 -->
  <rect x="540" y="66" width="330" height="330" rx="14" fill="#F3E8FF" stroke="#6B21A8" stroke-width="2.5" stroke-dasharray="8 5"/>
  <text x="705" y="96" font-size="15.5" font-weight="800" fill="#6B21A8" text-anchor="middle">🚪 서브에이전트의 방 (독립 컨텍스트)</text>
  <rect x="562" y="112" width="286" height="30" rx="7" fill="#FFFFFF"/>
  <text x="705" y="132" font-size="11" fill="#555555" text-anchor="middle">웹 검색 12회 · 페이지 40개 열람</text>
  <rect x="562" y="150" width="286" height="30" rx="7" fill="#FFFFFF"/>
  <text x="705" y="170" font-size="11" fill="#555555" text-anchor="middle">문서 원문 수만 토큰 적재…</text>
  <rect x="562" y="188" width="286" height="30" rx="7" fill="#FFFFFF"/>
  <text x="705" y="208" font-size="11" fill="#555555" text-anchor="middle">상충 정보 비교 · 재검색 · 검증</text>
  <rect x="562" y="226" width="286" height="30" rx="7" fill="#FFFFFF"/>
  <text x="705" y="246" font-size="11" fill="#555555" text-anchor="middle">…(이 방에서만 쌓이고 버려짐)</text>

  <rect x="562" y="272" width="286" height="106" rx="10" fill="#FFFFFF" stroke="#6B21A8" stroke-width="1.5"/>
  <text x="578" y="296" font-size="12" font-weight="800" fill="#6B21A8">📄 정의 파일 (.claude/agents/research.md)</text>
  <text x="578" y="318" font-size="11" fill="#555555" font-family="'JetBrains Mono', monospace">tools: [WebSearch, WebFetch, Read]</text>
  <text x="578" y="336" font-size="11" fill="#555555" font-family="'JetBrains Mono', monospace">model: haiku   # 싼 모델로 위임 가능</text>
  <text x="578" y="358" font-size="10.5" fill="#8A8A8A">도구 화이트리스트 = 권한 최소화 (보안)</text>

  <!-- 화살표 -->
  <line x1="360" y1="180" x2="536" y2="150" stroke="#6B21A8" stroke-width="2.5" marker-end="url(#sa2)"/>
  <text x="448" y="150" font-size="12.5" font-weight="700" fill="#6B21A8" text-anchor="middle">과제 위임</text>
  <line x1="536" y1="250" x2="360" y2="232" stroke="#00AA6C" stroke-width="2.5" marker-end="url(#sg2)"/>
  <text x="448" y="262" font-size="12.5" font-weight="700" fill="#065F46" text-anchor="middle">요약만 반환</text>

  <!-- 병렬 -->
  <rect x="30" y="420" width="840" height="80" rx="14" fill="#FFFFFF" stroke="#B5AFA5" stroke-width="2"/>
  <text x="52" y="448" font-size="14" font-weight="800" fill="#002C5F">⚡ 병렬 위임 — 독립적인 작업이면 여러 방을 동시에 돌린다</text>
  <rect x="52" y="460" width="180" height="28" rx="8" fill="#F3E8FF" stroke="#6B21A8" stroke-width="1.5"/>
  <text x="142" y="479" font-size="11.5" fill="#6B21A8" text-anchor="middle" font-weight="700">🔍 리서치 A</text>
  <rect x="248" y="460" width="180" height="28" rx="8" fill="#F3E8FF" stroke="#6B21A8" stroke-width="1.5"/>
  <text x="338" y="479" font-size="11.5" fill="#6B21A8" text-anchor="middle" font-weight="700">🔒 보안 리뷰 B</text>
  <rect x="444" y="460" width="180" height="28" rx="8" fill="#F3E8FF" stroke="#6B21A8" stroke-width="1.5"/>
  <text x="534" y="479" font-size="11.5" fill="#6B21A8" text-anchor="middle" font-weight="700">🧪 테스트 작성 C</text>
  <text x="720" y="479" font-size="12" font-weight="700" fill="#065F46">→ 결과 셋을 모아 종합</text>
</svg>
