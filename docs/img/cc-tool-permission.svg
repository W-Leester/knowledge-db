<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="tpa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#003F8A"/>
    </marker>
    <marker id="tpr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#DC2626"/>
    </marker>
  </defs>
  <rect width="900" height="620" fill="#FAF7F2"/>
  <text x="450" y="34" font-size="20" font-weight="800" fill="#002C5F" text-anchor="middle">도구 하나의 해부 + 권한 게이트 파이프라인</text>

  <!-- 도구 해부 (왼쪽) -->
  <rect x="30" y="62" width="300" height="510" rx="14" fill="#FFFFFF" stroke="#E8962A" stroke-width="2.5"/>
  <text x="180" y="90" font-size="15" font-weight="800" fill="#B45309" text-anchor="middle">🔧 Tool 하나의 구조</text>

  <rect x="50" y="104" width="260" height="150" rx="10" fill="#FEF3E2"/>
  <text x="180" y="128" font-size="12.5" font-weight="800" fill="#B45309" text-anchor="middle">모델이 보는 것 (노출)</text>
  <text x="66" y="152" font-size="11" fill="#555555">· name — 도구 이름</text>
  <text x="66" y="174" font-size="11" fill="#555555">· inputSchema — Zod/JSON Schema</text>
  <text x="66" y="196" font-size="11" fill="#555555">· description() — 동적 설명</text>
  <text x="66" y="218" font-size="11" fill="#555555">  (언제·어떻게 쓸지 = 프롬프트)</text>
  <text x="66" y="240" font-size="11" fill="#555555">· searchHint — 지연검색용</text>

  <rect x="50" y="266" width="260" height="94" rx="10" fill="#E6F7F1"/>
  <text x="180" y="290" font-size="12.5" font-weight="800" fill="#065F46" text-anchor="middle">호스트만 보는 것 (실행)</text>
  <text x="66" y="314" font-size="11" fill="#555555">· call(args, ctx) → Result</text>
  <text x="66" y="336" font-size="11" fill="#555555">· mapToolResult → tool_result 블록</text>
  <text x="66" y="352" font-size="10.5" fill="#8A8A8A">실제 셸·파일·API 작업이 여기</text>

  <rect x="50" y="372" width="260" height="128" rx="10" fill="#FEE2E2"/>
  <text x="180" y="396" font-size="12.5" font-weight="800" fill="#DC2626" text-anchor="middle">정책 서술 (안전 게이트가 참조)</text>
  <text x="66" y="420" font-size="11" fill="#555555">· isReadOnly() — 기본 false</text>
  <text x="66" y="442" font-size="11" fill="#555555">· isDestructive() — 기본 false</text>
  <text x="66" y="464" font-size="11" fill="#555555">· isConcurrencySafe() — 병렬 가능?</text>
  <text x="66" y="486" font-size="11" fill="#555555">· checkPermissions() — 도구별 판정</text>

  <text x="180" y="524" font-size="11.5" font-weight="700" fill="#B45309" text-anchor="middle">buildTool()이 빠진 것에</text>
  <text x="180" y="542" font-size="11.5" font-weight="700" fill="#B45309" text-anchor="middle">fail-closed 기본값 주입</text>
  <text x="180" y="562" font-size="10.5" fill="#8A8A8A" text-anchor="middle">"모르면 쓰기·위험으로 가정"</text>

  <!-- 권한 파이프라인 (오른쪽) -->
  <rect x="360" y="62" width="510" height="510" rx="14" fill="#FFFFFF" stroke="#1A5CB5" stroke-width="2.5"/>
  <text x="615" y="90" font-size="15" font-weight="800" fill="#002C5F" text-anchor="middle">🚦 실행 전 권한 게이트 (순서 = 우선순위)</text>

  <g font-size="11.5">
    <rect x="384" y="104" width="462" height="34" rx="7" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
    <text x="400" y="126" fill="#DC2626" font-weight="800">① deny 룰 — 무엇보다 우선, bypass로도 못 뚫음 → 거부</text>

    <rect x="384" y="146" width="462" height="34" rx="7" fill="#FEF3E2"/>
    <text x="400" y="168" fill="#B45309" font-weight="700">② ask 룰 — 이 도구/명령은 항상 물어봄</text>

    <rect x="384" y="188" width="462" height="34" rx="7" fill="#E8EEF7"/>
    <text x="400" y="210" fill="#002C5F" font-weight="700">③ tool.checkPermissions() — 도구별 로직 (Bash 서브커맨드 등)</text>

    <rect x="384" y="230" width="462" height="42" rx="7" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
    <text x="400" y="250" fill="#DC2626" font-weight="800">④ safetyCheck — "bypass 면역"</text>
    <text x="400" y="266" fill="#555555">.git/ · .claude/ · 셸 설정 등 민감 경로는 무조건 확인</text>

    <rect x="384" y="280" width="462" height="34" rx="7" fill="#E6F7F1"/>
    <text x="400" y="302" fill="#065F46" font-weight="700">⑤ 권한 모드 — bypass면 여기서 허용 / allow 룰이면 허용</text>

    <rect x="384" y="322" width="462" height="34" rx="7" fill="#F3E8FF"/>
    <text x="400" y="344" fill="#6B21A8" font-weight="700">⑥ 남으면 → 사용자에게 물음 (또는 auto: AI 분류기)</text>
  </g>

  <line x1="615" y1="138" x2="615" y2="144" stroke="#003F8A" stroke-width="2" marker-end="url(#tpa)"/>
  <line x1="615" y1="180" x2="615" y2="186" stroke="#003F8A" stroke-width="2" marker-end="url(#tpa)"/>
  <line x1="615" y1="222" x2="615" y2="228" stroke="#003F8A" stroke-width="2" marker-end="url(#tpa)"/>
  <line x1="615" y1="272" x2="615" y2="278" stroke="#003F8A" stroke-width="2" marker-end="url(#tpa)"/>
  <line x1="615" y1="314" x2="615" y2="320" stroke="#003F8A" stroke-width="2" marker-end="url(#tpa)"/>

  <!-- 훅 -->
  <rect x="384" y="372" width="462" height="76" rx="10" fill="#FEF3E2" stroke="#E8962A" stroke-width="1.5"/>
  <text x="400" y="396" font-size="12.5" font-weight="800" fill="#B45309">🪝 PreToolUse 훅 (③ 앞에 끼어듦)</text>
  <text x="400" y="418" font-size="11" fill="#555555">외부 정책이 allow·deny·입력변형 가능. 단 —</text>
  <text x="400" y="438" font-size="11" font-weight="700" fill="#DC2626">deny 룰·safetyCheck는 훅으로도 못 완화 (fail-closed)</text>

  <!-- 모드 -->
  <rect x="384" y="458" width="462" height="100" rx="10" fill="#E8EEF7" stroke="#1A5CB5" stroke-width="1.5"/>
  <text x="400" y="482" font-size="12.5" font-weight="800" fill="#002C5F">권한 모드</text>
  <text x="400" y="504" font-size="11" fill="#555555">default(물음) · acceptEdits(작업폴더 편집 자동) ·</text>
  <text x="400" y="524" font-size="11" fill="#555555">plan(실행금지) · bypass(전부 허용, 단 면역 예외) · auto(AI 분류기)</text>
  <text x="400" y="546" font-size="11" fill="#8A8A8A">헤드리스/백그라운드 → 프롬프트 불가 → auto-deny</text>

  <text x="450" y="596" font-size="12" font-weight="700" fill="#8A8A8A" text-anchor="middle">로컬 하네스 핵심: deny 룰 + 경로 safetyCheck + 모드 스위치 — "안 하면 사고인 것"은 훅이 아니라 룰로 못 뚫게</text>
</svg>
