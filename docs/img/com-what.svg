<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="ca" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#003F8A"/>
    </marker>
  </defs>
  <rect width="900" height="500" fill="#FAF7F2"/>
  <text x="450" y="34" font-size="20" font-weight="800" fill="#002C5F" text-anchor="middle">COM의 핵심 — "인터페이스라는 약속"만 알면 서로 호출한다</text>
  <text x="450" y="58" font-size="13" fill="#8A8A8A" text-anchor="middle">내부 구현·언어·컴파일러가 뭐든 상관없다 — 노출된 함수 목록(인터페이스)만 지키면 된다</text>

  <!-- 클라이언트 -->
  <rect x="40" y="96" width="220" height="200" rx="14" fill="#E8EEF7" stroke="#1A5CB5" stroke-width="2.5"/>
  <text x="150" y="128" font-size="15.5" font-weight="800" fill="#002C5F" text-anchor="middle">📞 클라이언트</text>
  <text x="150" y="150" font-size="12" fill="#555555" text-anchor="middle">(내 프로그램)</text>
  <text x="150" y="184" font-size="12.5" fill="#555555" text-anchor="middle">파이썬·파워셸·C#…</text>
  <text x="150" y="210" font-size="12.5" fill="#555555" text-anchor="middle">"엑셀아, 이 셀에</text>
  <text x="150" y="230" font-size="12.5" fill="#555555" text-anchor="middle">값을 넣어줘"</text>
  <text x="150" y="266" font-size="11" fill="#8A8A8A" text-anchor="middle">상대가 뭘로 만들어졌는지</text>
  <text x="150" y="284" font-size="11" fill="#8A8A8A" text-anchor="middle">알 필요가 없다</text>

  <!-- 인터페이스 계약 -->
  <rect x="340" y="86" width="220" height="330" rx="14" fill="#FEF3E2" stroke="#E8962A" stroke-width="3"/>
  <text x="450" y="116" font-size="15" font-weight="800" fill="#B45309" text-anchor="middle">📜 인터페이스 (계약)</text>
  <text x="450" y="136" font-size="11" fill="#8A8A8A" text-anchor="middle">"이런 함수를 제공한다"는 약속</text>

  <rect x="362" y="152" width="176" height="70" rx="9" fill="#FFFFFF" stroke="#E8962A" stroke-width="1.5"/>
  <text x="450" y="176" font-size="12.5" font-weight="800" fill="#B45309" text-anchor="middle">IUnknown (기본)</text>
  <text x="450" y="196" font-size="10.5" fill="#555555" text-anchor="middle">QueryInterface — 다른 인터페이스 요청</text>
  <text x="450" y="212" font-size="10.5" fill="#555555" text-anchor="middle">AddRef / Release — 참조 세기(수명)</text>

  <rect x="362" y="234" width="176" height="52" rx="9" fill="#FFFFFF" stroke="#E8962A" stroke-width="1.5"/>
  <text x="450" y="256" font-size="12.5" font-weight="700" fill="#B45309" text-anchor="middle">기능별 인터페이스</text>
  <text x="450" y="274" font-size="10.5" fill="#555555" text-anchor="middle">예: Range.Value, Worksheet…</text>

  <rect x="362" y="298" width="176" height="52" rx="9" fill="#FFFFFF" stroke="#E8962A" stroke-width="1.5"/>
  <text x="450" y="320" font-size="12.5" font-weight="700" fill="#B45309" text-anchor="middle">IID (인터페이스 ID)</text>
  <text x="450" y="338" font-size="10.5" fill="#555555" text-anchor="middle">GUID로 전역 고유 식별</text>

  <text x="450" y="378" font-size="11.5" font-weight="700" fill="#B45309" text-anchor="middle">계약만 지키면 양쪽 다</text>
  <text x="450" y="396" font-size="11.5" font-weight="700" fill="#B45309" text-anchor="middle">자유롭게 바뀔 수 있다</text>

  <!-- 컴포넌트 -->
  <rect x="640" y="96" width="220" height="200" rx="14" fill="#E6F7F1" stroke="#00AA6C" stroke-width="2.5"/>
  <text x="750" y="128" font-size="15.5" font-weight="800" fill="#065F46" text-anchor="middle">⚙️ 컴포넌트</text>
  <text x="750" y="150" font-size="12" fill="#555555" text-anchor="middle">(예: Excel.Application)</text>
  <text x="750" y="184" font-size="12.5" fill="#555555" text-anchor="middle">C++로 짜인 거대한</text>
  <text x="750" y="204" font-size="12.5" fill="#555555" text-anchor="middle">엑셀 엔진 전체</text>
  <text x="750" y="238" font-size="11" fill="#8A8A8A" text-anchor="middle">🔒 내부 구현은 완전히 숨김</text>
  <text x="750" y="256" font-size="11" fill="#8A8A8A" text-anchor="middle">(클라이언트는 못 본다)</text>
  <text x="750" y="282" font-size="11" fill="#8A8A8A" text-anchor="middle">인터페이스로만 노출</text>

  <line x1="260" y1="196" x2="336" y2="196" stroke="#003F8A" stroke-width="2.5" marker-end="url(#ca)"/>
  <text x="298" y="184" font-size="10.5" fill="#003F8A" font-weight="700" text-anchor="middle">호출</text>
  <line x1="564" y1="196" x2="636" y2="196" stroke="#003F8A" stroke-width="2.5" marker-end="url(#ca)"/>
  <text x="600" y="184" font-size="10.5" fill="#003F8A" font-weight="700" text-anchor="middle">구현</text>

  <!-- 하단 -->
  <rect x="40" y="436" width="820" height="48" rx="12" fill="#E8EEF7"/>
  <text x="450" y="465" font-size="13.5" font-weight="700" fill="#002C5F" text-anchor="middle">네트워크 문서의 REST가 "HTTP만 지키면 언어 무관하게 대화"였듯 — COM은 그걸 한 PC 안, 바이너리 레벨에서 한다</text>
</svg>
