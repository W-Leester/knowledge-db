<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="ha" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#003F8A"/>
    </marker>
  </defs>
  <rect width="900" height="560" fill="#FAF7F2"/>
  <text x="450" y="34" font-size="20" font-weight="800" fill="#002C5F" text-anchor="middle">COM은 어떻게 컴포넌트를 찾아 실행하나 — 4단계</text>

  <!-- 흐름 4단계 -->
  <rect x="30" y="66" width="200" height="96" rx="12" fill="#E8EEF7" stroke="#1A5CB5" stroke-width="2"/>
  <text x="130" y="94" font-size="13.5" font-weight="800" fill="#002C5F" text-anchor="middle">① 이름으로 요청</text>
  <text x="130" y="118" font-size="11" fill="#555555" text-anchor="middle" font-family="'JetBrains Mono', monospace">"Excel.Application"</text>
  <text x="130" y="138" font-size="11" fill="#555555" text-anchor="middle">= ProgID (사람이 읽는 이름)</text>
  <text x="130" y="155" font-size="10.5" fill="#8A8A8A" text-anchor="middle">CoCreateInstance 호출</text>

  <rect x="250" y="66" width="200" height="96" rx="12" fill="#FEF3E2" stroke="#E8962A" stroke-width="2"/>
  <text x="350" y="94" font-size="13.5" font-weight="800" fill="#B45309" text-anchor="middle">② 레지스트리 조회</text>
  <text x="350" y="118" font-size="11" fill="#555555" text-anchor="middle">ProgID → CLSID(GUID)</text>
  <text x="350" y="138" font-size="11" fill="#555555" text-anchor="middle">→ 이 GUID를 만드는</text>
  <text x="350" y="155" font-size="11" fill="#555555" text-anchor="middle">파일이 어디 있나 검색</text>

  <rect x="470" y="66" width="200" height="96" rx="12" fill="#E6F7F1" stroke="#00AA6C" stroke-width="2"/>
  <text x="570" y="94" font-size="13.5" font-weight="800" fill="#065F46" text-anchor="middle">③ 서버 로드·실행</text>
  <text x="570" y="118" font-size="11" fill="#555555" text-anchor="middle">DLL을 내 프로세스에 올리거나</text>
  <text x="570" y="138" font-size="11" fill="#555555" text-anchor="middle">EXE를 별도 프로세스로 실행</text>
  <text x="570" y="155" font-size="10.5" fill="#8A8A8A" text-anchor="middle">(엑셀.exe가 뜬다)</text>

  <rect x="690" y="66" width="180" height="96" rx="12" fill="#F3E8FF" stroke="#6B21A8" stroke-width="2"/>
  <text x="780" y="94" font-size="13.5" font-weight="800" fill="#6B21A8" text-anchor="middle">④ 인터페이스 반환</text>
  <text x="780" y="118" font-size="11" fill="#555555" text-anchor="middle">객체를 가리키는</text>
  <text x="780" y="138" font-size="11" fill="#555555" text-anchor="middle">포인터를 돌려줌</text>
  <text x="780" y="155" font-size="10.5" fill="#8A8A8A" text-anchor="middle">→ 이제 함수 호출 가능</text>

  <line x1="230" y1="114" x2="246" y2="114" stroke="#003F8A" stroke-width="2.5" marker-end="url(#ha)"/>
  <line x1="450" y1="114" x2="466" y2="114" stroke="#003F8A" stroke-width="2.5" marker-end="url(#ha)"/>
  <line x1="670" y1="114" x2="686" y2="114" stroke="#003F8A" stroke-width="2.5" marker-end="url(#ha)"/>

  <!-- 두 서버 유형 -->
  <text x="450" y="204" font-size="15.5" font-weight="800" fill="#002C5F" text-anchor="middle">서버는 두 종류 — 어디서 도느냐가 다르다</text>

  <rect x="60" y="224" width="370" height="150" rx="14" fill="#FFFFFF" stroke="#1A5CB5" stroke-width="2.5"/>
  <text x="245" y="252" font-size="14" font-weight="800" fill="#002C5F" text-anchor="middle">🧩 In-Process (DLL)</text>
  <text x="245" y="276" font-size="11.5" fill="#555555" text-anchor="middle">컴포넌트가 내 프로그램과 같은</text>
  <text x="245" y="294" font-size="11.5" fill="#555555" text-anchor="middle">메모리 공간에서 돈다</text>
  <rect x="90" y="308" width="310" height="46" rx="9" fill="#E8EEF7"/>
  <text x="245" y="330" font-size="11.5" fill="#002C5F" text-anchor="middle" font-weight="700">내 프로세스 ┃ [내 코드] ↔ [DLL 컴포넌트]</text>
  <text x="245" y="348" font-size="10" fill="#8A8A8A" text-anchor="middle">빠름 · 직접 호출 · 같이 죽고 산다</text>

  <rect x="470" y="224" width="370" height="150" rx="14" fill="#FFFFFF" stroke="#00AA6C" stroke-width="2.5"/>
  <text x="655" y="252" font-size="14" font-weight="800" fill="#065F46" text-anchor="middle">🖥 Out-of-Process (EXE)</text>
  <text x="655" y="276" font-size="11.5" fill="#555555" text-anchor="middle">컴포넌트가 별도 프로세스 —</text>
  <text x="655" y="294" font-size="11.5" fill="#555555" text-anchor="middle">엑셀.exe처럼 독립 실행 (자동화 대부분)</text>
  <rect x="500" y="308" width="310" height="46" rx="9" fill="#E6F7F1"/>
  <text x="655" y="326" font-size="11" fill="#065F46" text-anchor="middle" font-weight="700">[내 프로세스] ↔ 프록시/스텁 ↔ [엑셀.exe]</text>
  <text x="655" y="344" font-size="10" fill="#8A8A8A" text-anchor="middle">느림 · "마샬링"으로 경계를 넘어 전달</text>

  <!-- 마샬링/아파트먼트 -->
  <rect x="30" y="398" width="410" height="140" rx="14" fill="#FEF3E2" stroke="#E8962A" stroke-width="2"/>
  <text x="52" y="426" font-size="14" font-weight="800" fill="#B45309">📦 마샬링(Marshaling)</text>
  <text x="52" y="450" font-size="11.5" fill="#555555">프로세스·스레드 경계를 넘을 때, 함수 호출과</text>
  <text x="52" y="470" font-size="11.5" fill="#555555">인자를 "포장해서 배송"하는 자동 대행 계층.</text>
  <text x="52" y="494" font-size="11.5" fill="#555555">네트워크 문서의 "직렬화 후 전송"과 같은 발상 —</text>
  <text x="52" y="514" font-size="11.5" fill="#555555">덕분에 내 코드는 로컬 호출처럼 쓸 수 있다.</text>

  <rect x="460" y="398" width="410" height="140" rx="14" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
  <text x="482" y="426" font-size="14" font-weight="800" fill="#DC2626">🧵 아파트먼트(STA/MTA) — 스레드 함정</text>
  <text x="482" y="450" font-size="11.5" fill="#555555">엑셀 같은 자동화 객체는 대개 STA(단일 스레드)라,</text>
  <text x="482" y="470" font-size="11.5" fill="#555555">다른 스레드에서 함부로 호출하면 깨진다.</text>
  <text x="482" y="494" font-size="11.5" fill="#555555">멀티스레드 앱에서 COM 자동화를 쓸 땐 CoInitialize</text>
  <text x="482" y="514" font-size="11.5" fill="#555555">호출과 스레드 모델을 반드시 신경 써야 한다.</text>
</svg>
