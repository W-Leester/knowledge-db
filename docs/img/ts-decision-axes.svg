<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
  <rect width="900" height="540" fill="#FAF7F2"/>
  <text x="450" y="34" font-size="20" font-weight="800" fill="#002C5F" text-anchor="middle">스택 선택은 성능만이 아니다 — 5개의 저울</text>
  <text x="450" y="58" font-size="13" fill="#8A8A8A" text-anchor="middle">"빠른 언어가 항상 정답"이 아닌 이유 — 먼저 "병목이 어디냐"를 묻는다</text>

  <!-- 5축 카드 -->
  <rect x="30" y="80" width="405" height="120" rx="12" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
  <text x="52" y="108" font-size="14.5" font-weight="800" fill="#DC2626">⚡ 실행 성능</text>
  <text x="52" y="132" font-size="11.5" fill="#555555">얼마나 빨리 도는가 · 메모리를 얼마나 아끼는가</text>
  <text x="52" y="154" font-size="11.5" fill="#555555">C·C++·Rust·Zig가 압도 — <strong>단, 이게 병목일 때만 의미</strong></text>
  <text x="52" y="178" font-size="11" fill="#8A8A8A">대기(네트워크·모델)가 병목이면 이 축은 거의 무의미</text>

  <rect x="465" y="80" width="405" height="120" rx="12" fill="#E6F7F1" stroke="#00AA6C" stroke-width="2"/>
  <text x="487" y="108" font-size="14.5" font-weight="800" fill="#065F46">🚀 개발 속도</text>
  <text x="487" y="132" font-size="11.5" fill="#555555">기능을 얼마나 빨리 만들고 고치는가 · 반복(iteration)</text>
  <text x="487" y="154" font-size="11.5" fill="#555555">Python·JS/TS가 강함 — 컴파일 대기 없이 즉시 실행</text>
  <text x="487" y="178" font-size="11" fill="#8A8A8A">매주 바뀌는 제품에선 이게 진짜 경쟁력</text>

  <rect x="30" y="212" width="405" height="120" rx="12" fill="#E8EEF7" stroke="#1A5CB5" stroke-width="2"/>
  <text x="52" y="240" font-size="14.5" font-weight="800" fill="#002C5F">🛡 안전성</text>
  <text x="52" y="264" font-size="11.5" fill="#555555">버그를 얼마나 미리 막는가 · 메모리 안전</text>
  <text x="52" y="286" font-size="11.5" fill="#555555">Rust(컴파일이 막음) · GC 언어(JS·Python·Go, 메모리버그 없음)</text>
  <text x="52" y="310" font-size="11" fill="#8A8A8A">C·C++은 빠르지만 메모리 버그 위험이 큼</text>

  <rect x="465" y="212" width="405" height="120" rx="12" fill="#FEF3E2" stroke="#E8962A" stroke-width="2"/>
  <text x="487" y="240" font-size="14.5" font-weight="800" fill="#B45309">📦 생태계</text>
  <text x="487" y="264" font-size="11.5" fill="#555555">필요한 라이브러리가 얼마나 있는가 · 성숙도</text>
  <text x="487" y="286" font-size="11.5" fill="#555555">Python(AI·데이터) · JS/TS(웹·도구)가 압도적으로 풍부</text>
  <text x="487" y="310" font-size="11" fill="#8A8A8A">"바퀴를 다시 발명" 안 해도 되는 정도</text>

  <rect x="248" y="344" width="405" height="120" rx="12" fill="#F3E8FF" stroke="#6B21A8" stroke-width="2"/>
  <text x="270" y="372" font-size="14.5" font-weight="800" fill="#6B21A8">👥 인력·채용</text>
  <text x="270" y="396" font-size="11.5" fill="#555555">그 언어를 쓸 사람이 얼마나 많은가</text>
  <text x="270" y="418" font-size="11.5" fill="#555555">JS/TS·Python 개발자가 가장 많음 → 팀 키우기 쉬움</text>
  <text x="270" y="442" font-size="11" fill="#8A8A8A">Rust·C++ 시스템 개발자는 적고 비쌈</text>

  <!-- 하단 -->
  <rect x="30" y="480" width="840" height="44" rx="10" fill="#0D1B2E"/>
  <text x="450" y="507" font-size="13.5" font-weight="800" fill="#FFF" text-anchor="middle">첫 질문은 "무엇이 가장 빠른가?"가 아니라 "이 프로그램의 병목이 어디인가?" — 그 답이 저울의 무게를 정한다</text>
</svg>
