<svg width="800" height="470" viewBox="0 0 800 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <style>
    .title { font-size: 15px; font-weight: 700; fill: #002C5F; }
    .section-title { font-size: 12.5px; font-weight: 700; fill: #002C5F; }
    .small { font-size: 9.5px; fill: #555555; }
    .mono { font-family: 'Consolas', 'Courier New', monospace; }
  </style>

  <rect width="800" height="470" fill="#F2EDE4"/>
  <text x="400" y="26" text-anchor="middle" class="title">서버 직접 저장 vs 객체 스토리지 (S3) — 파일 저장을 서버에서 떼어내다</text>

  <!-- ===== LEFT: server storage ===== -->
  <rect x="30" y="45" width="360" height="360" fill="#FFFFFF" stroke="#D5CFBF" stroke-width="1" rx="8"/>
  <text x="210" y="68" text-anchor="middle" class="section-title">초창기 — 서버에 직접 저장</text>

  <!-- server box -->
  <rect x="60" y="84" width="130" height="150" fill="#002C5F" rx="6"/>
  <text x="125" y="104" text-anchor="middle" font-size="10.5" fill="#FFF" font-weight="700">웹 서버</text>
  <rect x="72" y="114" width="106" height="66" fill="#FFFFFF" opacity="0.94" rx="4"/>
  <text x="80" y="129" font-size="8.5" fill="#B45309" class="mono">📁 /uploads/</text>
  <text x="90" y="143" font-size="8" fill="#555" class="mono">users/123.jpg</text>
  <text x="90" y="156" font-size="8" fill="#555" class="mono">posts/456.png</text>
  <text x="90" y="169" font-size="8" fill="#555" class="mono">docs/789.pdf</text>
  <rect x="72" y="188" width="106" height="36" fill="#E8EEF7" rx="4"/>
  <text x="125" y="203" text-anchor="middle" font-size="8" fill="#002C5F" font-weight="700">앱 코드 + 파일 저장을</text>
  <text x="125" y="216" text-anchor="middle" font-size="8" fill="#002C5F" font-weight="700">한 컴퓨터가 동시에</text>

  <!-- DB stores path -->
  <rect x="230" y="120" width="135" height="60" fill="#003F8A" rx="6"/>
  <text x="297" y="140" text-anchor="middle" font-size="9.5" fill="#FFF" font-weight="700">DB에는 경로 저장</text>
  <rect x="240" y="148" width="115" height="22" fill="#FFF" opacity="0.94" rx="3"/>
  <text x="297" y="163" text-anchor="middle" font-size="7.2" fill="#555" class="mono">"/uploads/users/123.jpg"</text>
  <line x1="190" y1="150" x2="228" y2="150" stroke="#8A8A8A" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 3 problems -->
  <rect x="50" y="252" width="320" height="42" fill="#FEE2E2" stroke="#DC2626" stroke-width="1" rx="5"/>
  <text x="62" y="269" font-size="10" fill="#DC2626" font-weight="700">① 서버가 죽으면 파일도 함께 증발</text>
  <text x="62" y="285" font-size="9" fill="#555555">디스크 고장 = 백업 없으면 복구 불가</text>

  <rect x="50" y="300" width="320" height="42" fill="#FEE2E2" stroke="#DC2626" stroke-width="1" rx="5"/>
  <text x="62" y="317" font-size="10" fill="#DC2626" font-weight="700">② 확장 불가 — 서버 A에 올린 파일을 서버 B가 못 찾음</text>
  <text x="62" y="333" font-size="9" fill="#555555">서버를 늘리는 순간 "어느 서버에 어느 파일?" 지옥</text>

  <rect x="50" y="348" width="320" height="42" fill="#FEE2E2" stroke="#DC2626" stroke-width="1" rx="5"/>
  <text x="62" y="365" font-size="10" fill="#DC2626" font-weight="700">③ 트래픽 폭주 시 파일 전송이 서버를 마비시킴</text>
  <text x="62" y="381" font-size="9" fill="#555555">수천 명이 동시 요청 → 본업(앱 로직)을 못 함</text>

  <!-- ===== RIGHT: S3 object storage ===== -->
  <rect x="410" y="45" width="360" height="360" fill="#FFFFFF" stroke="#00AA6C" stroke-width="2" rx="8"/>
  <text x="590" y="68" text-anchor="middle" class="section-title">2006년 Amazon S3 — 객체 스토리지</text>

  <!-- bucket -->
  <rect x="430" y="82" width="200" height="160" fill="#FEF3E2" stroke="#E8962A" stroke-width="2" rx="8"/>
  <text x="530" y="102" text-anchor="middle" font-size="10.5" fill="#B45309" font-weight="700">🪣 버킷 (Bucket) = 창고</text>

  <!-- objects -->
  <rect x="444" y="112" width="172" height="26" fill="#FFFFFF" stroke="#D5CFBF" rx="4"/>
  <text x="452" y="123" font-size="7.5" fill="#002C5F" class="mono" font-weight="700">key: users/123/profile.jpg</text>
  <text x="452" y="133" font-size="7" fill="#8A8A8A">객체(Object) = 박스 · 키 = 박스 이름</text>

  <rect x="444" y="144" width="172" height="26" fill="#FFFFFF" stroke="#D5CFBF" rx="4"/>
  <text x="452" y="155" font-size="7.5" fill="#002C5F" class="mono" font-weight="700">key: posts/456/photo.png</text>
  <text x="452" y="165" font-size="7" fill="#8A8A8A">슬래시(/)는 폴더가 아니라 이름의 일부</text>

  <rect x="444" y="176" width="172" height="26" fill="#FFFFFF" stroke="#D5CFBF" rx="4"/>
  <text x="452" y="187" font-size="7.5" fill="#002C5F" class="mono" font-weight="700">key: videos/789/clip.mp4</text>
  <text x="452" y="197" font-size="7" fill="#8A8A8A">경로 탐색 없이 키로 바로 접근</text>

  <text x="530" y="226" text-anchor="middle" font-size="8.5" fill="#B45309">폴더 계층 구조가 없다 → 수천 대 분산이 쉽다</text>

  <!-- replication -->
  <rect x="648" y="90" width="108" height="112" fill="#E8EEF7" rx="6"/>
  <text x="702" y="108" text-anchor="middle" font-size="9" fill="#002C5F" font-weight="700">자동 복제</text>
  <rect x="662" y="118" width="80" height="20" fill="#1A5CB5" rx="3"/>
  <rect x="662" y="143" width="80" height="20" fill="#1A5CB5" rx="3"/>
  <rect x="662" y="168" width="80" height="20" fill="#1A5CB5" rx="3"/>
  <text x="702" y="132" text-anchor="middle" font-size="7.5" fill="#FFF">서버 1 — 복사본</text>
  <text x="702" y="157" text-anchor="middle" font-size="7.5" fill="#FFF">서버 2 — 복사본</text>
  <text x="702" y="182" text-anchor="middle" font-size="7.5" fill="#FFF">서버 3 — 복사본</text>
  <line x1="632" y1="146" x2="646" y2="146" stroke="#00AA6C" stroke-width="2"/>
  <polygon points="650,146 642,142 642,150" fill="#00AA6C"/>

  <!-- URL issuance -->
  <rect x="430" y="256" width="326" height="46" fill="#E6F7F1" stroke="#00AA6C" stroke-width="1" rx="6"/>
  <text x="442" y="274" font-size="10" fill="#065F46" font-weight="700">파일을 던지면 → 접근용 URL이 나온다. 끝.</text>
  <text x="442" y="292" font-size="8" fill="#555" class="mono">https://bucket.s3.amazonaws.com/users/123/profile.jpg</text>

  <!-- durability -->
  <rect x="430" y="312" width="158" height="80" fill="#FAF7F2" stroke="#D5CFBF" rx="6"/>
  <text x="509" y="333" text-anchor="middle" font-size="9.5" fill="#002C5F" font-weight="700">내구성 (Durability)</text>
  <text x="509" y="354" text-anchor="middle" font-size="13" fill="#00AA6C" font-weight="800" class="mono">99.999999999%</text>
  <text x="509" y="371" text-anchor="middle" font-size="8.5" fill="#555">9가 11개 — 사실상</text>
  <text x="509" y="384" text-anchor="middle" font-size="8.5" fill="#555">파일이 사라질 일이 없음</text>

  <rect x="598" y="312" width="158" height="80" fill="#FAF7F2" stroke="#D5CFBF" rx="6"/>
  <text x="677" y="333" text-anchor="middle" font-size="9.5" fill="#002C5F" font-weight="700">용량 (Capacity)</text>
  <text x="677" y="354" text-anchor="middle" font-size="13" fill="#00AA6C" font-weight="800" class="mono">사실상 무제한</text>
  <text x="677" y="371" text-anchor="middle" font-size="8.5" fill="#555">파일이 아무리 늘어도</text>
  <text x="677" y="384" text-anchor="middle" font-size="8.5" fill="#555">자동으로 확장</text>

  <!-- bottom -->
  <rect x="30" y="420" width="740" height="34" fill="#002C5F" rx="6"/>
  <text x="400" y="437" text-anchor="middle" font-size="11.5" fill="#FFFFFF" font-weight="700">발상의 전환: 파일을 "경로(폴더 구조)"가 아니라 "객체(버킷+키)"로 본다</text>
  <text x="400" y="450" text-anchor="middle" font-size="9.5" fill="#E8EEF7">이 단순화가 무제한 분산 저장을 가능하게 했고, 현대 웹 서비스 스토리지의 표준이 되었다</text>
</svg>
