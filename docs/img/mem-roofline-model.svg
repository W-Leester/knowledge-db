<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <style>
    .axis-label { font-size: 12px; fill: #555555; }
    .title { font-size: 15px; font-weight: 700; fill: #002C5F; }
    .annotation { font-size: 11px; fill: #1A1A1A; }
    .region-label { font-size: 13px; font-weight: 600; }
    .point-label { font-size: 11px; fill: #1A1A1A; }
    .grid { stroke: #D5CFBF; stroke-width: 0.5; }
  </style>

  <!-- Background -->
  <rect width="800" height="450" fill="#F2EDE4"/>

  <!-- Chart area background -->
  <rect x="80" y="30" width="580" height="340" fill="#FFFFFF" stroke="#D5CFBF" stroke-width="1" rx="4"/>

  <!-- Title -->
  <text x="370" y="22" text-anchor="middle" class="title">Roofline 모델 — AI 워크로드 성능 분석</text>

  <!-- Grid lines (log scale positions) -->
  <!-- Vertical grid: x positions for 0.1,1,10,100,1000 mapped to 80-660 -->
  <!-- log(0.1)=-1, log(1000)=3, range=4, width=580 -->
  <!-- x = 80 + (log10(v)+1)/4 * 580 -->
  <!-- 0.1: 80, 1: 225, 10: 370, 100: 515, 1000: 660 -->
  <line x1="225" y1="30" x2="225" y2="370" class="grid"/>
  <line x1="370" y1="30" x2="370" y2="370" class="grid"/>
  <line x1="515" y1="30" x2="515" y2="370" class="grid"/>

  <!-- Horizontal grid: y positions for 1e10,1e11,1e12,1e13 mapped to 370-30 -->
  <!-- log(1e10)=10, log(1e13)=13, range=3, height=340 -->
  <!-- y = 370 - (log10(v)-10)/3 * 340 -->
  <!-- 1e10: 370, 1e11: 257, 1e12: 143, 1e13: 30 -->
  <line x1="80" y1="257" x2="660" y2="257" class="grid"/>
  <line x1="80" y1="143" x2="660" y2="143" class="grid"/>

  <!-- Memory Bound region (left of ridge) — red tint -->
  <!-- Ridge point: where memory bandwidth line meets peak compute -->
  <!-- Peak compute: 1e13 FLOP/s → y=30 -->
  <!-- Memory BW line: slope=BW, passing through ridge -->
  <!-- Ridge: arithmetic intensity = Peak_compute / BW -->
  <!-- Let's say BW=2TB/s=2e12, Peak=1e13, ridge=1e13/2e12=5 FLOP/Byte -->
  <!-- Ridge x = 80 + (log10(5)+1)/4*580 = 80 + (0.699+1)/4*580 = 80+246.4=326 -->
  <!-- Memory line: from (0.1, BW*0.1=2e11) to ridge (5, 1e13) -->
  <!-- Point (0.1): y=370-(log10(2e11)-10)/3*340=370-(11.301-10)/3*340=370-147.5=222.5 -->
  <!-- Point (5,1e13): y=30 -->
  <polygon points="80,370 326,30 80,30" fill="#DC2626" opacity="0.08"/>
  <!-- Compute Bound region (right of ridge) -->
  <polygon points="326,30 660,30 660,370 326,370" fill="#00AA6C" opacity="0.06"/>

  <!-- Region labels -->
  <text x="160" y="160" text-anchor="middle" class="region-label" fill="#DC2626" opacity="0.8">Memory</text>
  <text x="160" y="178" text-anchor="middle" class="region-label" fill="#DC2626" opacity="0.8">Bound</text>
  <text x="160" y="196" text-anchor="middle" class="region-label" fill="#DC2626" opacity="0.8">영역</text>

  <text x="500" y="100" text-anchor="middle" class="region-label" fill="#00AA6C" opacity="0.9">Compute</text>
  <text x="500" y="118" text-anchor="middle" class="region-label" fill="#00AA6C" opacity="0.9">Bound</text>
  <text x="500" y="136" text-anchor="middle" class="region-label" fill="#00AA6C" opacity="0.9">영역</text>

  <!-- Memory bandwidth ceiling line (diagonal) -->
  <!-- from (0.1, 2e11) to (5, 1e13) -->
  <!-- x1=80, y1=222.5 → x2=326, y2=30 -->
  <line x1="80" y1="223" x2="326" y2="30" stroke="#003F8A" stroke-width="2.5" stroke-dasharray="none"/>

  <!-- Peak compute ceiling (horizontal at y=30) -->
  <line x1="326" y1="30" x2="660" y2="30" stroke="#003F8A" stroke-width="2.5"/>

  <!-- Roofline label -->
  <text x="155" y="105" transform="rotate(-52,155,105)" font-size="11" fill="#003F8A" font-weight="600">Memory BW Ceiling</text>
  <text x="480" y="24" text-anchor="middle" font-size="11" fill="#003F8A" font-weight="600">Peak Compute Ceiling (1e13 FLOP/s)</text>

  <!-- Ridge point -->
  <circle cx="326" cy="30" r="5" fill="#E8962A" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="326" y1="30" x2="326" y2="370" stroke="#E8962A" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="328" y="390" font-size="11" fill="#E8962A" font-weight="700" text-anchor="middle">Ridge Point</text>
  <text x="328" y="404" font-size="10" fill="#E8962A" text-anchor="middle">(~5 FLOP/Byte)</text>

  <!-- Workload points -->
  <!-- LLM Inference batch=1: very low intensity ~0.15 FLOP/Byte -->
  <!-- x = 80+(log10(0.15)+1)/4*580 = 80+(−0.824+1)/4*580 = 80+25.6=105.6 -->
  <!-- y = 370−(log10(1.5e11)−10)/3*340 = 370−(11.176−10)/3*340 = 370−133=237 -->
  <circle cx="106" cy="237" r="7" fill="#DC2626" stroke="#FFFFFF" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.5s" fill="freeze"/>
  </circle>
  <text x="110" y="230" class="point-label" fill="#DC2626" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.5s" fill="freeze"/>
    LLM 추론
  </text>
  <text x="110" y="243" class="point-label" fill="#DC2626" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.5s" fill="freeze"/>
    (단일 배치)
  </text>

  <!-- LLM Training: intensity ~5-10, x~345 -->
  <!-- x = 80+(log10(7)+1)/4*580 = 80+(0.845+1)/4*580=80+268=348 -->
  <!-- y = 370-(log10(2e12)-10)/3*340=370-(12.301-10)/3*340=370-261=109 -->
  <circle cx="348" cy="109" r="7" fill="#E8962A" stroke="#FFFFFF" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.5s" fill="freeze"/>
  </circle>
  <text x="355" y="104" class="point-label" fill="#E8962A" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.5s" fill="freeze"/>
    LLM 학습
  </text>

  <!-- CNN Training: intensity ~50-100, x~530 -->
  <!-- x = 80+(log10(60)+1)/4*580 = 80+(1.778+1)/4*580=80+403=483 -->
  <!-- y = 370-(log10(5e12)-10)/3*340=370-(12.699-10)/3*340=370-306=64 -->
  <circle cx="483" cy="64" r="7" fill="#00AA6C" stroke="#FFFFFF" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.9s" dur="0.5s" fill="freeze"/>
  </circle>
  <text x="490" y="59" class="point-label" fill="#00AA6C" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.9s" dur="0.5s" fill="freeze"/>
    CNN 학습
  </text>

  <!-- Axes -->
  <!-- X axis -->
  <line x1="80" y1="370" x2="665" y2="370" stroke="#1A1A1A" stroke-width="1.5"/>
  <polygon points="665,366 673,370 665,374" fill="#1A1A1A"/>
  <!-- X ticks and labels -->
  <text x="80" y="388" text-anchor="middle" class="axis-label">0.1</text>
  <text x="225" y="388" text-anchor="middle" class="axis-label">1</text>
  <text x="370" y="388" text-anchor="middle" class="axis-label">10</text>
  <text x="515" y="388" text-anchor="middle" class="axis-label">100</text>
  <text x="660" y="388" text-anchor="middle" class="axis-label">1000</text>
  <line x1="80" y1="368" x2="80" y2="374" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="225" y1="368" x2="225" y2="374" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="370" y1="368" x2="370" y2="374" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="515" y1="368" x2="515" y2="374" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="660" y1="368" x2="660" y2="374" stroke="#1A1A1A" stroke-width="1"/>
  <text x="375" y="418" text-anchor="middle" font-size="12" fill="#1A1A1A" font-weight="600">연산 강도 (Arithmetic Intensity) [FLOP/Byte]</text>

  <!-- Y axis -->
  <line x1="80" y1="370" x2="80" y2="25" stroke="#1A1A1A" stroke-width="1.5"/>
  <polygon points="76,25 80,17 84,25" fill="#1A1A1A"/>
  <!-- Y ticks -->
  <text x="72" y="374" text-anchor="end" class="axis-label">10¹⁰</text>
  <text x="72" y="261" text-anchor="end" class="axis-label">10¹¹</text>
  <text x="72" y="147" text-anchor="end" class="axis-label">10¹²</text>
  <text x="72" y="34" text-anchor="end" class="axis-label">10¹³</text>
  <line x1="78" y1="370" x2="82" y2="370" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="78" y1="257" x2="82" y2="257" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="78" y1="143" x2="82" y2="143" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="78" y1="30" x2="82" y2="30" stroke="#1A1A1A" stroke-width="1"/>
  <text x="18" y="210" text-anchor="middle" font-size="12" fill="#1A1A1A" font-weight="600" transform="rotate(-90,18,210)">성능 (FLOP/s)</text>

  <!-- Key annotation box -->
  <rect x="88" y="290" width="490" height="38" fill="#002C5F" rx="5" opacity="0.92"/>
  <text x="333" y="307" text-anchor="middle" font-size="11.5" fill="#FFFFFF" font-weight="600">
    대부분의 LLM 추론은 Memory Bound → FLOPS보다 대역폭이 중요
  </text>
  <text x="333" y="322" text-anchor="middle" font-size="10.5" fill="#E8EEF7">
    단일 배치 추론 시 Arithmetic Intensity ≈ 0.1~1 FLOP/Byte (Ridge Point 훨씬 좌측)
  </text>

  <!-- Legend -->
  <rect x="590" y="290" width="160" height="70" fill="#FFFFFF" stroke="#D5CFBF" stroke-width="1" rx="4"/>
  <circle cx="605" cy="308" r="5" fill="#DC2626"/>
  <text x="614" y="312" font-size="11" fill="#1A1A1A">LLM 추론 (단일 배치)</text>
  <circle cx="605" cy="328" r="5" fill="#E8962A"/>
  <text x="614" y="332" font-size="11" fill="#1A1A1A">LLM 학습</text>
  <circle cx="605" cy="348" r="5" fill="#00AA6C"/>
  <text x="614" y="352" font-size="11" fill="#1A1A1A">CNN 학습</text>
</svg>
