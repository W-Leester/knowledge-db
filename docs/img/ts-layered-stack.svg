<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="tla" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#003F8A"/>
    </marker>
  </defs>
  <rect width="900" height="500" fill="#FAF7F2"/>
  <text x="450" y="34" font-size="20" font-weight="800" fill="#002C5F" text-anchor="middle">실무의 진짜 모습 — 한 언어가 아니라 "층으로 역할 분담"</text>
  <text x="450" y="58" font-size="13" fill="#8A8A8A" text-anchor="middle">"C++이 빠른데 왜 TS를?"의 답 — 밑단과 윗단이 원하는 게 다르다</text>

  <!-- 윗층: UI/앱 -->
  <rect x="120" y="86" width="660" height="76" rx="12" fill="#E8EEF7" stroke="#1A5CB5" stroke-width="2"/>
  <text x="450" y="114" font-size="14.5" font-weight="800" fill="#002C5F" text-anchor="middle">🖥 UI · 앱 계층 — 자주 바뀜, 사람이 봄</text>
  <text x="450" y="138" font-size="12" fill="#555555" text-anchor="middle">JavaScript/TypeScript · React — 개발 속도·생태계·인력이 중요 (성능은 병목 아님)</text>
  <text x="450" y="155" font-size="10.5" fill="#8A8A8A" text-anchor="middle">Claude Code의 .tsx 파일들이 여기</text>

  <!-- 중간층: 오케스트레이션 -->
  <rect x="120" y="182" width="660" height="76" rx="12" fill="#FEF3E2" stroke="#E8962A" stroke-width="2.5"/>
  <text x="450" y="210" font-size="14.5" font-weight="800" fill="#B45309" text-anchor="middle">⚙️ 오케스트레이션 계층 — 기능을 빠르게 조립</text>
  <text x="450" y="234" font-size="12" fill="#555555" text-anchor="middle">TypeScript(Claude Code) · Python(로컬 하네스) — "밑단을 부르고 흐름을 관리"</text>
  <text x="450" y="251" font-size="10.5" fill="#8A8A8A" text-anchor="middle">여기가 매주 바뀌므로 빠른 개발 언어가 유리</text>

  <!-- 밑층: 성능 코어 -->
  <rect x="120" y="278" width="660" height="90" rx="12" fill="#FEE2E2" stroke="#DC2626" stroke-width="2.5"/>
  <text x="450" y="306" font-size="14.5" font-weight="800" fill="#DC2626" text-anchor="middle">🔩 성능 코어 계층 — 진짜 병목, 밀리초·메모리 전쟁</text>
  <text x="450" y="330" font-size="12" fill="#555555" text-anchor="middle">C++ (llama.cpp 추론엔진) · Rust · Zig · CUDA — 여기선 저수준 언어가 정답</text>
  <text x="450" y="350" font-size="11" fill="#B45309" text-anchor="middle" font-weight="700">Bun 자체도 내부는 Zig · 파이썬 AI 라이브러리 밑단도 C/C++</text>

  <line x1="450" y1="162" x2="450" y2="180" stroke="#003F8A" stroke-width="2.5" marker-end="url(#tla)"/>
  <line x1="450" y1="258" x2="450" y2="276" stroke="#003F8A" stroke-width="2.5" marker-end="url(#tla)"/>
  <text x="800" y="128" font-size="11" fill="#8A8A8A">느슨</text>
  <text x="800" y="320" font-size="11" fill="#8A8A8A">치열</text>
  <text x="98" y="128" font-size="10.5" fill="#8A8A8A" text-anchor="end" transform="rotate(-90 98 128)">병목 아님</text>
  <text x="98" y="323" font-size="10.5" fill="#DC2626" text-anchor="end" transform="rotate(-90 98 323)">병목</text>

  <!-- 하단 결론 -->
  <rect x="30" y="392" width="840" height="88" rx="14" fill="#0D1B2E"/>
  <text x="60" y="420" font-size="14.5" font-weight="800" fill="#FFF">🔑 그래서 "언어 하나로 다"가 아니라 "층마다 맞는 언어"</text>
  <text x="60" y="446" font-size="12" fill="#C7D5EA">· 성능이 병목인 밑단 = C++/Rust/Zig · 기능을 빠르게 조립하는 윗단 = TS/Python — 업계 표준 분업</text>
  <text x="60" y="468" font-size="12" font-weight="700" fill="#7FD1A8">· 내가 만들 로컬 LLM 하네스도 똑같다: 추론은 llama.cpp(C++), 하네스는 편한 언어 — 「Claude Code 내부」 §11 그대로</text>
</svg>
