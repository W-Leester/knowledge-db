<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="tc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#003F8A"/>
    </marker>
  </defs>
  <rect width="900" height="520" fill="#FAF7F2"/>
  <text x="450" y="34" font-size="20" font-weight="800" fill="#002C5F" text-anchor="middle">피지컬 AI의 "세 대의 컴퓨터" — 학습 · 시뮬레이션 · 추론</text>
  <text x="450" y="58" font-size="13" fill="#8A8A8A" text-anchor="middle">NVIDIA 젠슨 황이 정리한 프레임 — 이 셋이 순환하며 로봇을 똑똑하게 만든다</text>

  <!-- ① 학습 -->
  <rect x="40" y="90" width="240" height="150" rx="14" fill="#002C5F"/>
  <text x="160" y="124" font-size="16" font-weight="800" fill="#FFF" text-anchor="middle">① 학습 컴퓨터</text>
  <text x="160" y="148" font-size="12" fill="#C7D5EA" text-anchor="middle">데이터센터 GPU (DGX 등)</text>
  <text x="160" y="176" font-size="12.5" fill="#7FD1A8" text-anchor="middle">거대한 데이터로 로봇 두뇌</text>
  <text x="160" y="196" font-size="12.5" fill="#7FD1A8" text-anchor="middle">(파운데이션 모델)를 훈련</text>
  <text x="160" y="222" font-size="11" fill="#8A9BB5" text-anchor="middle">AI 하드웨어 문서의 그 GPU들</text>

  <!-- ② 시뮬 -->
  <rect x="330" y="90" width="240" height="150" rx="14" fill="#065F46"/>
  <text x="450" y="124" font-size="16" font-weight="800" fill="#FFF" text-anchor="middle">② 시뮬레이션 컴퓨터</text>
  <text x="450" y="148" font-size="12" fill="#A7E3CC" text-anchor="middle">Omniverse · Isaac Sim · Cosmos</text>
  <text x="450" y="176" font-size="12.5" fill="#FFF" text-anchor="middle">가상 세계에서 수백만 번</text>
  <text x="450" y="196" font-size="12.5" fill="#FFF" text-anchor="middle">시행착오 (현실은 너무 느리고 위험)</text>
  <text x="450" y="222" font-size="11" fill="#C7EBD9" text-anchor="middle">"피지컬 AI의 심장" — 데이터 공장</text>

  <!-- ③ 추론 -->
  <rect x="620" y="90" width="240" height="150" rx="14" fill="#6B21A8"/>
  <text x="740" y="124" font-size="16" font-weight="800" fill="#FFF" text-anchor="middle">③ 추론 컴퓨터</text>
  <text x="740" y="148" font-size="12" fill="#E9D5FF" text-anchor="middle">엣지 (Jetson Thor 등) — 로봇 몸속</text>
  <text x="740" y="176" font-size="12.5" fill="#FFF" text-anchor="middle">훈련된 두뇌를 로봇 위에서</text>
  <text x="740" y="196" font-size="12.5" fill="#FFF" text-anchor="middle">실시간 실행 (배터리·발열 제약)</text>
  <text x="740" y="222" font-size="11" fill="#E9D5FF" text-anchor="middle">전력 효율이 곧 실사용 성능</text>

  <!-- 순환 화살표 -->
  <line x1="284" y1="140" x2="326" y2="140" stroke="#003F8A" stroke-width="2.5" marker-end="url(#tc)"/>
  <text x="305" y="128" font-size="10.5" fill="#003F8A" font-weight="700" text-anchor="middle">모델</text>
  <line x1="574" y1="140" x2="616" y2="140" stroke="#003F8A" stroke-width="2.5" marker-end="url(#tc)"/>
  <text x="595" y="128" font-size="10.5" fill="#003F8A" font-weight="700" text-anchor="middle">배포</text>

  <!-- 하단 피드백 루프 -->
  <path d="M 740 244 C 740 300 160 300 160 246" fill="none" stroke="#E8962A" stroke-width="3" stroke-dasharray="7 5" marker-end="url(#tc)"/>
  <rect x="330" y="278" width="240" height="40" rx="20" fill="#FEF3E2" stroke="#E8962A" stroke-width="1.5"/>
  <text x="450" y="303" font-size="12.5" font-weight="800" fill="#B45309" text-anchor="middle">🔄 현실에서 모은 데이터 → 다시 학습·시뮬로</text>

  <!-- 데이터 3원천 -->
  <text x="450" y="356" font-size="15" font-weight="800" fill="#002C5F" text-anchor="middle">로봇을 가르치는 3가지 데이터 원천</text>
  <rect x="60" y="374" width="250" height="118" rx="12" fill="#FFFFFF" stroke="#1A5CB5" stroke-width="2"/>
  <text x="185" y="402" font-size="13.5" font-weight="800" fill="#002C5F" text-anchor="middle">🌐 인터넷 영상</text>
  <text x="185" y="424" font-size="11.5" fill="#555555" text-anchor="middle">유튜브 등 방대한 물리 상식</text>
  <text x="185" y="444" font-size="11.5" fill="#555555" text-anchor="middle">(사람이 사물 다루는 법)</text>
  <text x="185" y="470" font-size="10.5" fill="#8A8A8A" text-anchor="middle">양 많음 · 라벨 없음 · 몸이 다름</text>

  <rect x="325" y="374" width="250" height="118" rx="12" fill="#FFFFFF" stroke="#00AA6C" stroke-width="2"/>
  <text x="450" y="402" font-size="13.5" font-weight="800" fill="#065F46" text-anchor="middle">🕹 원격조종(텔레오퍼레이션)</text>
  <text x="450" y="424" font-size="11.5" fill="#555555" text-anchor="middle">사람이 로봇을 직접 조종해</text>
  <text x="450" y="444" font-size="11.5" fill="#555555" text-anchor="middle">"정답 시연"을 수집</text>
  <text x="450" y="470" font-size="10.5" fill="#8A8A8A" text-anchor="middle">질 높음 · 비쌈 · 개인도 가능(§6)</text>

  <rect x="590" y="374" width="250" height="118" rx="12" fill="#FFFFFF" stroke="#6B21A8" stroke-width="2"/>
  <text x="715" y="402" font-size="13.5" font-weight="800" fill="#6B21A8" text-anchor="middle">🎮 시뮬레이션</text>
  <text x="715" y="424" font-size="11.5" fill="#555555" text-anchor="middle">가상 세계에서 무한 생성</text>
  <text x="715" y="444" font-size="11.5" fill="#555555" text-anchor="middle">(+ 월드 모델이 영상까지 합성)</text>
  <text x="715" y="470" font-size="10.5" fill="#8A8A8A" text-anchor="middle">무한·안전 · 현실과의 간극이 숙제</text>
</svg>
