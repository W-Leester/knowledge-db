<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="va" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#003F8A"/>
    </marker>
  </defs>
  <rect width="900" height="520" fill="#FAF7F2"/>
  <text x="450" y="34" font-size="20" font-weight="800" fill="#002C5F" text-anchor="middle">VLA 모델 — 보고(Vision), 듣고(Language), 움직인다(Action)</text>
  <text x="450" y="58" font-size="13" fill="#8A8A8A" text-anchor="middle">로봇의 두뇌: 최신 파운데이션 모델의 "이중 시스템" 구조 (GR00T 등)</text>

  <!-- 입력 -->
  <rect x="40" y="92" width="150" height="240" rx="14" fill="#E8EEF7" stroke="#1A5CB5" stroke-width="2"/>
  <text x="115" y="120" font-size="14" font-weight="800" fill="#002C5F" text-anchor="middle">입력</text>
  <rect x="60" y="138" width="110" height="56" rx="9" fill="#FFFFFF" stroke="#1A5CB5" stroke-width="1.5"/>
  <text x="115" y="162" font-size="12.5" font-weight="700" fill="#002C5F" text-anchor="middle">👁 Vision</text>
  <text x="115" y="180" font-size="10.5" fill="#555555" text-anchor="middle">카메라 영상</text>
  <rect x="60" y="204" width="110" height="56" rx="9" fill="#FFFFFF" stroke="#1A5CB5" stroke-width="1.5"/>
  <text x="115" y="228" font-size="12.5" font-weight="700" fill="#002C5F" text-anchor="middle">💬 Language</text>
  <text x="115" y="246" font-size="10.5" fill="#555555" text-anchor="middle">"컵을 치워줘"</text>
  <rect x="60" y="270" width="110" height="48" rx="9" fill="#FFFFFF" stroke="#1A5CB5" stroke-width="1.5"/>
  <text x="115" y="291" font-size="12" font-weight="700" fill="#002C5F" text-anchor="middle">🦿 상태</text>
  <text x="115" y="308" font-size="10.5" fill="#555555" text-anchor="middle">관절 각도 등</text>

  <!-- System 2 -->
  <rect x="230" y="92" width="300" height="110" rx="14" fill="#FEF3E2" stroke="#E8962A" stroke-width="2.5"/>
  <text x="380" y="120" font-size="14.5" font-weight="800" fill="#B45309" text-anchor="middle">🧠 시스템 2 — "생각하는 뇌" (느림)</text>
  <text x="380" y="144" font-size="11.5" fill="#555555" text-anchor="middle">Vision-Language 모델 (VLM 백본)</text>
  <text x="380" y="164" font-size="11.5" fill="#555555" text-anchor="middle">장면을 이해하고 명령을 해석해 "계획"을 세움</text>
  <text x="380" y="186" font-size="11" fill="#8A8A8A" text-anchor="middle">사람의 신중한 사고 · 수 Hz</text>

  <!-- System 1 -->
  <rect x="230" y="222" width="300" height="110" rx="14" fill="#E6F7F1" stroke="#00AA6C" stroke-width="2.5"/>
  <text x="380" y="250" font-size="14.5" font-weight="800" fill="#065F46" text-anchor="middle">⚡ 시스템 1 — "반사하는 몸" (빠름)</text>
  <text x="380" y="274" font-size="11.5" fill="#555555" text-anchor="middle">디퓨전 트랜스포머 (Diffusion Policy)</text>
  <text x="380" y="294" font-size="11.5" fill="#555555" text-anchor="middle">계획을 부드러운 관절 동작으로 실시간 변환</text>
  <text x="380" y="316" font-size="11" fill="#8A8A8A" text-anchor="middle">사람의 운동 반사 · 수십~수백 Hz</text>

  <!-- 출력 -->
  <rect x="570" y="152" width="150" height="120" rx="14" fill="#F3E8FF" stroke="#6B21A8" stroke-width="2"/>
  <text x="645" y="182" font-size="14" font-weight="800" fill="#6B21A8" text-anchor="middle">출력</text>
  <text x="645" y="210" font-size="12.5" font-weight="700" fill="#6B21A8" text-anchor="middle">🦾 Action</text>
  <text x="645" y="232" font-size="11" fill="#555555" text-anchor="middle">관절별 목표 각도·</text>
  <text x="645" y="250" font-size="11" fill="#555555" text-anchor="middle">토크 명령 시퀀스</text>

  <!-- 로봇 -->
  <rect x="760" y="152" width="110" height="120" rx="14" fill="#002C5F"/>
  <text x="815" y="200" font-size="26" text-anchor="middle">🤖</text>
  <text x="815" y="232" font-size="11.5" font-weight="700" fill="#FFF" text-anchor="middle">로봇 몸체</text>
  <text x="815" y="250" font-size="10" fill="#8A9BB5" text-anchor="middle">모터가 실행</text>

  <line x1="190" y1="212" x2="226" y2="147" stroke="#003F8A" stroke-width="2.2" marker-end="url(#va)"/>
  <line x1="190" y1="240" x2="226" y2="270" stroke="#003F8A" stroke-width="2.2" marker-end="url(#va)"/>
  <line x1="380" y1="202" x2="380" y2="220" stroke="#E8962A" stroke-width="2.5" marker-end="url(#va)"/>
  <text x="446" y="216" font-size="10.5" fill="#B45309" font-weight="700">계획 전달</text>
  <line x1="530" y1="277" x2="566" y2="230" stroke="#003F8A" stroke-width="2.2" marker-end="url(#va)"/>
  <line x1="720" y1="212" x2="756" y2="212" stroke="#003F8A" stroke-width="2.2" marker-end="url(#va)"/>

  <!-- 하단 설명 -->
  <rect x="40" y="358" width="820" height="138" rx="14" fill="#0D1B2E"/>
  <text x="62" y="388" font-size="14.5" font-weight="800" fill="#FFF">💡 왜 둘로 나누나 — LLM 문서의 "빠른 사고/느린 사고"가 로봇에서 물리적 필연이 된다</text>
  <text x="62" y="416" font-size="12.5" fill="#C7D5EA">· 장면 이해는 무겁고 느려도 되지만(수 Hz), 넘어지지 않으려면 운동 제어는 초당 수백 번 돌아야 한다</text>
  <text x="62" y="440" font-size="12.5" fill="#C7D5EA">· 그래서 무거운 VLM(시스템2)과 가벼운 액션 생성기(시스템1)를 분리 — 각자의 속도로 돈다</text>
  <text x="62" y="464" font-size="12.5" font-weight="700" fill="#7FD1A8">· 「로컬 LLM 에이전트」의 에이전트 루프와 같은 골격 — 단, 도구가 "함수 호출"이 아니라 "관절 토크"다</text>
  <text x="62" y="486" font-size="11.5" fill="#8A9BB5">※ 구조는 대표적 예(GR00T 계열)를 단순화한 것 — 모델마다 세부는 다르다</text>
</svg>
