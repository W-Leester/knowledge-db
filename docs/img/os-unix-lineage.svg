<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="ua" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#003F8A"/>
    </marker>
    <marker id="ug" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#00AA6C"/>
    </marker>
  </defs>
  <rect width="900" height="520" fill="#FAF7F2"/>
  <text x="450" y="36" font-size="20" font-weight="800" fill="#002C5F" text-anchor="middle">운영체제의 두 혈통 — 왜 개발자는 "같은 핏줄"을 원하는가</text>

  <!-- Unix 뿌리 -->
  <rect x="40" y="64" width="200" height="56" rx="12" fill="#002C5F"/>
  <text x="140" y="90" font-size="16" font-weight="800" fill="#FFF" text-anchor="middle">Unix (1969)</text>
  <text x="140" y="110" font-size="12" fill="#8A9BB5" text-anchor="middle">벨 연구소 · 설계 철학의 원점</text>

  <!-- BSD -->
  <rect x="40" y="160" width="200" height="52" rx="10" fill="#E8EEF7" stroke="#1A5CB5" stroke-width="2"/>
  <text x="140" y="184" font-size="14.5" font-weight="800" fill="#002C5F" text-anchor="middle">BSD 계열</text>
  <text x="140" y="203" font-size="12" fill="#555555" text-anchor="middle">버클리 대학 파생</text>

  <!-- POSIX 표준 -->
  <rect x="300" y="150" width="180" height="72" rx="12" fill="#FEF3E2" stroke="#E8962A" stroke-width="2.5"/>
  <text x="390" y="176" font-size="15" font-weight="800" fill="#B45309" text-anchor="middle">📜 POSIX 표준</text>
  <text x="390" y="196" font-size="11.5" fill="#555555" text-anchor="middle">"Unix라면 이 명령·이 API는</text>
  <text x="390" y="213" font-size="11.5" fill="#555555" text-anchor="middle">이렇게 동작해야 한다"</text>

  <!-- Linux -->
  <rect x="540" y="160" width="200" height="52" rx="10" fill="#E6F7F1" stroke="#00AA6C" stroke-width="2"/>
  <text x="640" y="184" font-size="14.5" font-weight="800" fill="#065F46" text-anchor="middle">Linux (1991)</text>
  <text x="640" y="203" font-size="12" fill="#555555" text-anchor="middle">Unix 철학의 재구현</text>

  <line x1="140" y1="120" x2="140" y2="156" stroke="#003F8A" stroke-width="2.5" marker-end="url(#ua)"/>
  <line x1="240" y1="186" x2="296" y2="186" stroke="#E8962A" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="480" y1="186" x2="536" y2="186" stroke="#E8962A" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- macOS -->
  <rect x="40" y="256" width="200" height="70" rx="12" fill="#1A5CB5"/>
  <text x="140" y="282" font-size="16" font-weight="800" fill="#FFF" text-anchor="middle">🍎 macOS</text>
  <text x="140" y="303" font-size="11.5" fill="#D6E3F5" text-anchor="middle">Darwin 커널 (BSD 기반)</text>
  <text x="140" y="320" font-size="11.5" fill="#7FD1A8" text-anchor="middle">✔ 정식 UNIX 인증</text>

  <!-- Linux 서버 -->
  <rect x="540" y="256" width="200" height="70" rx="12" fill="#065F46"/>
  <text x="640" y="282" font-size="16" font-weight="800" fill="#FFF" text-anchor="middle">🖥 Linux 서버</text>
  <text x="640" y="303" font-size="11.5" fill="#A7E3CC" text-anchor="middle">AWS·GCP·Docker 컨테이너</text>
  <text x="640" y="320" font-size="11.5" fill="#A7E3CC" text-anchor="middle">= 실제 배포되는 곳</text>

  <line x1="140" y1="212" x2="140" y2="252" stroke="#003F8A" stroke-width="2.5" marker-end="url(#ua)"/>
  <line x1="640" y1="212" x2="640" y2="252" stroke="#00AA6C" stroke-width="2.5" marker-end="url(#ug)"/>

  <!-- 사촌 관계 강조 -->
  <line x1="240" y1="291" x2="536" y2="291" stroke="#00AA6C" stroke-width="3" stroke-dasharray="8 5"/>
  <rect x="300" y="270" width="180" height="42" rx="21" fill="#00AA6C"/>
  <text x="390" y="296" font-size="14.5" font-weight="800" fill="#FFF" text-anchor="middle">🤝 사촌 — 문법이 같다</text>

  <!-- Windows 별도 계보 -->
  <rect x="40" y="366" width="200" height="56" rx="12" fill="#8A8A8A"/>
  <text x="140" y="392" font-size="15" font-weight="800" fill="#FFF" text-anchor="middle">🪟 Windows NT</text>
  <text x="140" y="412" font-size="11.5" fill="#EDEAE4" text-anchor="middle">독립 계보 (VMS 영향)</text>

  <rect x="270" y="360" width="590" height="68" rx="12" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
  <text x="290" y="386" font-size="14" font-weight="800" fill="#DC2626">다른 핏줄 = 다른 문법</text>
  <text x="290" y="408" font-size="12.5" fill="#555555">경로 C:\Users\… (역슬래시) · 줄바꿈 CRLF · 권한 모델·프로세스 개념 상이 · 셸 문법 다름</text>
  <line x1="240" y1="394" x2="266" y2="394" stroke="#DC2626" stroke-width="2.5" marker-end="url(#ua)"/>

  <!-- 하단 결론 -->
  <rect x="40" y="452" width="820" height="44" rx="12" fill="#E8EEF7"/>
  <text x="450" y="480" font-size="15" font-weight="700" fill="#002C5F" text-anchor="middle">개발 PC와 배포 서버가 같은 혈통이면 — 배운 명령·짠 스크립트·설치 방법이 양쪽에서 그대로 통한다</text>
</svg>
