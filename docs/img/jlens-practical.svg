<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="jp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#003F8A"/>
    </marker>
  </defs>
  <rect width="900" height="580" fill="#FAF7F2"/>
  <text x="450" y="34" font-size="20" font-weight="800" fill="#002C5F" text-anchor="middle">로컬에서 J-lens 굴리기 — 파이프라인과 활용 갈래</text>

  <!-- 단계 1 -->
  <rect x="30" y="64" width="260" height="120" rx="14" fill="#FFFFFF" stroke="#1A5CB5" stroke-width="2.5"/>
  <text x="160" y="92" font-size="14.5" font-weight="800" fill="#002C5F" text-anchor="middle">① 모델 준비</text>
  <text x="160" y="116" font-size="12" fill="#555555" text-anchor="middle">HuggingFace + PyTorch로 로드</text>
  <text x="160" y="136" font-size="12" font-weight="700" fill="#065F46" text-anchor="middle">Qwen 공식 지원 · Llama 등 호환</text>
  <text x="160" y="160" font-size="11" fill="#DC2626" text-anchor="middle" font-weight="700">⚠ Ollama·GGUF 불가 (활성화 미노출)</text>

  <!-- 단계 2 -->
  <rect x="320" y="64" width="260" height="120" rx="14" fill="#FFFFFF" stroke="#E8962A" stroke-width="2.5"/>
  <text x="450" y="92" font-size="14.5" font-weight="800" fill="#B45309" text-anchor="middle">② 렌즈 확보</text>
  <text x="450" y="116" font-size="12" fill="#555555" text-anchor="middle">공개된 사전학습 렌즈 로드, 또는</text>
  <text x="450" y="136" font-size="12" fill="#555555" text-anchor="middle">직접 학습: jlens.fit(모델, 프롬프트)</text>
  <text x="450" y="160" font-size="11" fill="#8A8A8A" text-anchor="middle">프롬프트 100~1,000개면 사용 가능 품질</text>

  <!-- 단계 3 -->
  <rect x="610" y="64" width="260" height="120" rx="14" fill="#FFFFFF" stroke="#00AA6C" stroke-width="2.5"/>
  <text x="740" y="92" font-size="14.5" font-weight="800" fill="#065F46" text-anchor="middle">③ 성향 읽기</text>
  <text x="740" y="116" font-size="12" fill="#555555" text-anchor="middle">lens.apply(모델, 텍스트)</text>
  <text x="740" y="136" font-size="12" fill="#555555" text-anchor="middle">→ 계층별 "앞으로 말할 성향" 상위 단어</text>
  <text x="740" y="160" font-size="11" fill="#8A8A8A" text-anchor="middle">출력 전의 내부 상태를 사람 말로</text>

  <line x1="290" y1="124" x2="316" y2="124" stroke="#003F8A" stroke-width="2.5" marker-end="url(#jp)"/>
  <line x1="580" y1="124" x2="606" y2="124" stroke="#003F8A" stroke-width="2.5" marker-end="url(#jp)"/>

  <!-- 활용 4갈래 -->
  <text x="450" y="228" font-size="16" font-weight="800" fill="#002C5F" text-anchor="middle">읽어낸 "성향"으로 무엇을 하나 — 활용 4갈래</text>

  <rect x="30" y="248" width="420" height="120" rx="14" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
  <text x="52" y="278" font-size="14" font-weight="800" fill="#DC2626">🚦 안전 게이트 — 행동 전에 성향 검사</text>
  <text x="52" y="302" font-size="12" fill="#555555">에이전트가 위험 도구를 호출하기 직전, 내부 성향에</text>
  <text x="52" y="322" font-size="12" fill="#555555">위험 신호(삭제·유출 관련 개념)가 커져 있으면 차단·확인</text>
  <text x="52" y="348" font-size="11" fill="#8A8A8A">→ 훅(PreToolUse)의 "내면 검사" 버전 — 연구 단계 아이디어</text>

  <rect x="470" y="248" width="400" height="120" rx="14" fill="#F3E8FF" stroke="#6B21A8" stroke-width="2"/>
  <text x="492" y="278" font-size="14" font-weight="800" fill="#6B21A8">🎭 말–속마음 불일치 탐지</text>
  <text x="492" y="302" font-size="12" fill="#555555">출력("문제없습니다")과 내부 성향(오류·실패 관련 개념</text>
  <text x="492" y="322" font-size="12" fill="#555555">상승)이 어긋나는 순간을 포착 — 기만·아첨 연구의 도구</text>
  <text x="492" y="348" font-size="11" fill="#8A8A8A">→ CoT를 믿는 대신 내부 상태와 대조</text>

  <rect x="30" y="384" width="420" height="120" rx="14" fill="#E8EEF7" stroke="#1A5CB5" stroke-width="2"/>
  <text x="52" y="414" font-size="14" font-weight="800" fill="#003F8A">🔧 디버깅 · 조향(steering)</text>
  <text x="52" y="438" font-size="12" fill="#555555">"왜 자꾸 이 말투가 나오지?" — 어느 계층에서 그 성향이</text>
  <text x="52" y="458" font-size="12" fill="#555555">생기는지 추적. 역으로 J-space 방향을 밀어 성향을 조절</text>
  <text x="52" y="484" font-size="11" fill="#8A8A8A">→ 시스템 프롬프트보다 낮은 층위의 개입 실험</text>

  <rect x="470" y="384" width="400" height="120" rx="14" fill="#E6F7F1" stroke="#00AA6C" stroke-width="2"/>
  <text x="492" y="414" font-size="14" font-weight="800" fill="#065F46">📏 개입 효과 측정</text>
  <text x="492" y="438" font-size="12" fill="#555555">RAG 문서 주입 전후, 파인튜닝 전후, 시스템 프롬프트</text>
  <text x="492" y="458" font-size="12" fill="#555555">변경 전후 — 내부 성향이 실제로 바뀌었는지 정량 비교</text>
  <text x="492" y="484" font-size="11" fill="#8A8A8A">→ "느낌상 좋아졌다"를 측정 가능한 신호로</text>

  <!-- 하단 -->
  <rect x="30" y="522" width="840" height="42" rx="12" fill="#0D1B2E"/>
  <text x="450" y="549" font-size="13" font-weight="700" fill="#C7D5EA" text-anchor="middle">현실 조언: 추론 스택(Ollama)과 별도의 연구용 파이프라인(PyTorch)으로 — GPU 필요 · Claude 외 재현은 아직 검증 중</text>
</svg>
