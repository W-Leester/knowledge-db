<svg width="800" height="520" viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <style>
    .title { font-size: 15px; font-weight: 700; fill: #002C5F; }
    .card-title { font-size: 13px; font-weight: 700; fill: #FFFFFF; }
    .db-name { font-size: 10px; font-weight: 700; fill: #002C5F; }
    .label { font-size: 10px; fill: #1A1A1A; }
    .small { font-size: 9px; fill: #555555; }
    .mono { font-family: 'Consolas', 'Courier New', monospace; }
    .use { font-size: 9.5px; fill: #555555; }
  </style>

  <rect width="800" height="520" fill="#F2EDE4"/>
  <text x="400" y="28" text-anchor="middle" class="title">NoSQL 4대 데이터 모델 — 저장 구조가 곧 정체성이다</text>

  <!-- ═══════ 1. Key-Value (top-left) ═══════ -->
  <rect x="30" y="48" width="360" height="220" fill="#FFFFFF" stroke="#D5CFBF" stroke-width="1" rx="8"/>
  <rect x="30" y="48" width="360" height="32" fill="#002C5F" rx="8"/>
  <rect x="30" y="66" width="360" height="14" fill="#002C5F"/>
  <text x="44" y="69" class="card-title">① Key-Value 스토어</text>
  <text x="386" y="69" text-anchor="end" font-size="10" fill="#E8EEF7">Redis · DynamoDB · Memcached</text>

  <!-- key value rows -->
  <g class="mono">
    <rect x="50" y="95" width="130" height="26" fill="#E8EEF7" stroke="#5B8DD9" rx="4"/>
    <text x="58" y="112" font-size="10" fill="#002C5F" font-weight="700">"user:1001"</text>
    <line x1="180" y1="108" x2="205" y2="108" stroke="#8A8A8A" stroke-width="1.5"/>
    <polygon points="205,108 198,104 198,112" fill="#8A8A8A"/>
    <rect x="208" y="95" width="165" height="26" fill="#FAF7F2" stroke="#D5CFBF" rx="4"/>
    <text x="216" y="112" font-size="9.5" fill="#555555">{"name":"원영","vip":true}</text>

    <rect x="50" y="129" width="130" height="26" fill="#E8EEF7" stroke="#5B8DD9" rx="4"/>
    <text x="58" y="146" font-size="10" fill="#002C5F" font-weight="700">"session:ab12"</text>
    <line x1="180" y1="142" x2="205" y2="142" stroke="#8A8A8A" stroke-width="1.5"/>
    <polygon points="205,142 198,138 198,146" fill="#8A8A8A"/>
    <rect x="208" y="129" width="165" height="26" fill="#FAF7F2" stroke="#D5CFBF" rx="4"/>
    <text x="216" y="146" font-size="9.5" fill="#555555">"eyJhbGciOi..." (토큰)</text>

    <rect x="50" y="163" width="130" height="26" fill="#E8EEF7" stroke="#5B8DD9" rx="4"/>
    <text x="58" y="180" font-size="10" fill="#002C5F" font-weight="700">"rank:daily"</text>
    <line x1="180" y1="176" x2="205" y2="176" stroke="#8A8A8A" stroke-width="1.5"/>
    <polygon points="205,176 198,172 198,180" fill="#8A8A8A"/>
    <rect x="208" y="163" width="165" height="26" fill="#FAF7F2" stroke="#D5CFBF" rx="4"/>
    <text x="216" y="180" font-size="9.5" fill="#555555">SortedSet [A:98, B:95...]</text>
  </g>

  <text x="50" y="212" class="label" font-weight="700" fill="#002C5F">Key로만 조회 — O(1) 초고속</text>
  <text x="50" y="230" class="use">✓ 캐시 · 세션 · 실시간 랭킹 · 장바구니</text>
  <text x="50" y="247" class="use">✗ 값 내부 검색 불가, 복잡한 질의 불가</text>

  <!-- ═══════ 2. Document (top-right) ═══════ -->
  <rect x="410" y="48" width="360" height="220" fill="#FFFFFF" stroke="#D5CFBF" stroke-width="1" rx="8"/>
  <rect x="410" y="48" width="360" height="32" fill="#003F8A" rx="8"/>
  <rect x="410" y="66" width="360" height="14" fill="#003F8A"/>
  <text x="424" y="69" class="card-title">② Document 스토어</text>
  <text x="766" y="69" text-anchor="end" font-size="10" fill="#E8EEF7">MongoDB · CouchDB · Firestore</text>

  <!-- JSON document -->
  <rect x="430" y="92" width="200" height="140" fill="#FAF7F2" stroke="#D5CFBF" rx="6"/>
  <g class="mono" font-size="9.5">
    <text x="440" y="108" fill="#555555">{</text>
    <text x="450" y="122" fill="#B45309">"_id"</text><text x="478" y="122" fill="#555555">: "1001",</text>
    <text x="450" y="136" fill="#B45309">"name"</text><text x="486" y="136" fill="#555555">: "원영",</text>
    <text x="450" y="150" fill="#B45309">"orders"</text><text x="494" y="150" fill="#555555">: [</text>
    <text x="460" y="164" fill="#065F46">{"item":"키보드", "price":12},</text>
    <text x="460" y="178" fill="#065F46">{"item":"모니터", "price":35}</text>
    <text x="450" y="192" fill="#555555">],</text>
    <text x="450" y="206" fill="#B45309">"vip"</text><text x="475" y="206" fill="#555555">: true</text>
    <text x="440" y="220" fill="#555555">}</text>
  </g>

  <!-- annotation arrows -->
  <line x1="635" y1="150" x2="660" y2="150" stroke="#00AA6C" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="664" y="146" class="small" fill="#065F46" font-weight="700">중첩 구조로</text>
  <text x="664" y="158" class="small" fill="#065F46" font-weight="700">JOIN 없이 한 번에</text>

  <line x1="635" y1="120" x2="660" y2="120" stroke="#1A5CB5" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="664" y="112" class="small" fill="#1A5CB5" font-weight="700">문서마다 필드가</text>
  <text x="664" y="124" class="small" fill="#1A5CB5" font-weight="700">달라도 OK</text>
  <text x="664" y="136" class="small" fill="#1A5CB5">(스키마 유연)</text>

  <text x="430" y="247" class="use">✓ 상품 카탈로그 · CMS · 빠른 프로토타이핑  ✗ 문서 간 JOIN 약함, 데이터 중복</text>

  <!-- ═══════ 3. Column-Family (bottom-left) ═══════ -->
  <rect x="30" y="288" width="360" height="220" fill="#FFFFFF" stroke="#D5CFBF" stroke-width="1" rx="8"/>
  <rect x="30" y="288" width="360" height="32" fill="#1A5CB5" rx="8"/>
  <rect x="30" y="306" width="360" height="14" fill="#1A5CB5"/>
  <text x="44" y="309" class="card-title">③ Column-Family (와이드 컬럼)</text>
  <text x="386" y="309" text-anchor="end" font-size="10" fill="#E8EEF7">Cassandra · HBase · ScyllaDB</text>

  <!-- wide rows: row key + variable columns -->
  <text x="50" y="340" class="small" font-weight="700" fill="#002C5F">Row Key</text>
  <text x="160" y="340" class="small" font-weight="700" fill="#555555">→ 행마다 컬럼 수·종류가 다를 수 있음 (희소 구조)</text>

  <!-- row 1 -->
  <rect x="50" y="348" width="90" height="24" fill="#002C5F" rx="3"/>
  <text x="95" y="364" text-anchor="middle" font-size="9" fill="#FFF" font-weight="700">sensor:001</text>
  <rect x="144" y="348" width="70" height="24" fill="#E8EEF7" stroke="#5B8DD9" stroke-width="0.8"/>
  <text x="179" y="360" text-anchor="middle" font-size="7.5" fill="#555">09:00 → 21.5°</text>
  <text x="179" y="369" text-anchor="middle" font-size="7.5" fill="#8A8A8A">ts:col</text>
  <rect x="216" y="348" width="70" height="24" fill="#E8EEF7" stroke="#5B8DD9" stroke-width="0.8"/>
  <text x="251" y="360" text-anchor="middle" font-size="7.5" fill="#555">09:01 → 21.7°</text>
  <text x="251" y="369" text-anchor="middle" font-size="7.5" fill="#8A8A8A">ts:col</text>
  <rect x="288" y="348" width="70" height="24" fill="#E8EEF7" stroke="#5B8DD9" stroke-width="0.8"/>
  <text x="323" y="360" text-anchor="middle" font-size="7.5" fill="#555">09:02 → 21.9°</text>
  <text x="323" y="369" text-anchor="middle" font-size="7.5" fill="#8A8A8A">ts:col</text>
  <text x="365" y="364" font-size="10" fill="#8A8A8A">…</text>

  <!-- row 2 -->
  <rect x="50" y="378" width="90" height="24" fill="#002C5F" rx="3"/>
  <text x="95" y="394" text-anchor="middle" font-size="9" fill="#FFF" font-weight="700">sensor:002</text>
  <rect x="144" y="378" width="70" height="24" fill="#E8EEF7" stroke="#5B8DD9" stroke-width="0.8"/>
  <text x="179" y="390" text-anchor="middle" font-size="7.5" fill="#555">09:00 → 55%</text>
  <text x="179" y="399" text-anchor="middle" font-size="7.5" fill="#8A8A8A">습도</text>
  <rect x="216" y="378" width="70" height="24" fill="#E8EEF7" stroke="#5B8DD9" stroke-width="0.8"/>
  <text x="251" y="390" text-anchor="middle" font-size="7.5" fill="#555">09:05 → 57%</text>
  <text x="251" y="399" text-anchor="middle" font-size="7.5" fill="#8A8A8A">습도</text>
  <text x="295" y="394" font-size="10" fill="#8A8A8A">… (컬럼 2개뿐이어도 OK)</text>

  <!-- partition note -->
  <rect x="50" y="414" width="320" height="30" fill="#FEF3E2" stroke="#E8962A" stroke-width="1" rx="4"/>
  <text x="210" y="427" text-anchor="middle" font-size="9.5" fill="#B45309" font-weight="700">Row Key 해시로 노드에 자동 분산 → 수평 확장의 핵심</text>
  <text x="210" y="439" text-anchor="middle" font-size="9" fill="#555555">LSM-Tree 구조라 쓰기(Write)가 압도적으로 빠름</text>

  <text x="50" y="466" class="use">✓ IoT 센서 · 시계열 · 메시징 · 초당 수십만 쓰기</text>
  <text x="50" y="483" class="use">✗ JOIN 없음 · 즉석 쿼리 불가 → 쿼리를 미리 정해 설계</text>

  <!-- ═══════ 4. Graph (bottom-right) ═══════ -->
  <rect x="410" y="288" width="360" height="220" fill="#FFFFFF" stroke="#D5CFBF" stroke-width="1" rx="8"/>
  <rect x="410" y="288" width="360" height="32" fill="#00AA6C" rx="8"/>
  <rect x="410" y="306" width="360" height="14" fill="#00AA6C"/>
  <text x="424" y="309" class="card-title">④ Graph DB</text>
  <text x="766" y="309" text-anchor="end" font-size="10" fill="#E6F7F1">Neo4j · Neptune · ArangoDB</text>

  <!-- graph: nodes and relationships -->
  <!-- edges first -->
  <line x1="490" y1="370" x2="580" y2="345" stroke="#E8962A" stroke-width="2"/>
  <line x1="490" y1="370" x2="575" y2="415" stroke="#E8962A" stroke-width="2"/>
  <line x1="580" y1="345" x2="665" y2="380" stroke="#1A5CB5" stroke-width="2"/>
  <line x1="575" y1="415" x2="665" y2="380" stroke="#E8962A" stroke-width="2"/>
  <line x1="665" y1="380" x2="720" y2="330" stroke="#00AA6C" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- edge labels -->
  <text x="528" y="350" font-size="8.5" fill="#B45309" font-weight="700">FRIEND</text>
  <text x="515" y="404" font-size="8.5" fill="#B45309" font-weight="700">FRIEND</text>
  <text x="612" y="352" font-size="8.5" fill="#1A5CB5" font-weight="700">WORKS_AT</text>
  <text x="608" y="410" font-size="8.5" fill="#B45309" font-weight="700">FRIEND</text>
  <text x="700" y="348" font-size="8.5" fill="#065F46" font-weight="700">추천!</text>

  <!-- nodes -->
  <circle cx="490" cy="370" r="24" fill="#002C5F"/>
  <text x="490" y="374" text-anchor="middle" font-size="9.5" fill="#FFF" font-weight="700">원영</text>
  <circle cx="580" cy="345" r="20" fill="#1A5CB5"/>
  <text x="580" y="349" text-anchor="middle" font-size="9.5" fill="#FFF" font-weight="700">민수</text>
  <circle cx="575" cy="415" r="20" fill="#1A5CB5"/>
  <text x="575" y="419" text-anchor="middle" font-size="9.5" fill="#FFF" font-weight="700">지은</text>
  <circle cx="665" cy="380" r="20" fill="#5B8DD9"/>
  <text x="665" y="384" text-anchor="middle" font-size="9.5" fill="#FFF" font-weight="700">철수</text>
  <circle cx="720" cy="330" r="18" fill="#00AA6C"/>
  <text x="720" y="334" text-anchor="middle" font-size="8.5" fill="#FFF" font-weight="700">회사</text>

  <text x="430" y="340" class="small" fill="#002C5F" font-weight="700">노드(정점) + 관계(간선) 자체를 저장</text>

  <rect x="430" y="440" width="320" height="26" fill="#E6F7F1" stroke="#00AA6C" stroke-width="1" rx="4"/>
  <text x="590" y="457" text-anchor="middle" font-size="9.5" fill="#065F46" font-weight="700">노드가 이웃의 물리 포인터를 직접 보유 → 관계 탐색이 JOIN보다 수십 배 빠름</text>

  <text x="430" y="484" class="use">✓ 친구 추천 · 사기 탐지 · 지식 그래프  ✗ 대량 집계·스캔에는 부적합</text>
</svg>
