<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <style>
    .title { font-size: 15px; font-weight: 700; fill: #002C5F; }
    .section-title { font-size: 12.5px; font-weight: 700; fill: #002C5F; }
    .small { font-size: 9.5px; fill: #555555; }
    .mod-title { font-size: 10.5px; font-weight: 700; fill: #FFFFFF; }
  </style>

  <rect width="800" height="500" fill="#F2EDE4"/>
  <text x="400" y="26" text-anchor="middle" class="title">조립의 시대에서 통합의 시대로 — Supabase가 각광받는 이유</text>

  <!-- ===== LEFT: traditional assembly ===== -->
  <rect x="30" y="44" width="360" height="330" fill="#FFFFFF" stroke="#D5CFBF" stroke-width="1" rx="8"/>
  <text x="210" y="67" text-anchor="middle" class="section-title">기존 — 서비스를 하나씩 조립 (AWS·GCP 시대)</text>

  <!-- separate boxes -->
  <rect x="52" y="82" width="150" height="56" fill="#003F8A" rx="6"/>
  <text x="127" y="104" text-anchor="middle" class="mod-title">DB (RDS 등)</text>
  <text x="127" y="121" text-anchor="middle" font-size="8" fill="#E8EEF7">따로 생성·설정</text>

  <rect x="218" y="82" width="150" height="56" fill="#1A5CB5" rx="6"/>
  <text x="293" y="104" text-anchor="middle" class="mod-title">스토리지 (S3)</text>
  <text x="293" y="121" text-anchor="middle" font-size="8" fill="#E8EEF7">따로 생성·설정</text>

  <rect x="52" y="152" width="150" height="56" fill="#5B8DD9" rx="6"/>
  <text x="127" y="174" text-anchor="middle" class="mod-title">인증 (직접 구현)</text>
  <text x="127" y="191" text-anchor="middle" font-size="8" fill="#E8EEF7">JWT·소셜로그인 코딩</text>

  <rect x="218" y="152" width="150" height="56" fill="#8A8A8A" rx="6"/>
  <text x="293" y="174" text-anchor="middle" class="mod-title">API 서버 (직접 개발)</text>
  <text x="293" y="191" text-anchor="middle" font-size="8" fill="#F0EDE8">CRUD 엔드포인트 코딩</text>

  <!-- glue code lines -->
  <line x1="127" y1="140" x2="127" y2="150" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="293" y1="140" x2="293" y2="150" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="204" y1="110" x2="216" y2="110" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="204" y1="180" x2="216" y2="180" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="160" y1="140" x2="260 " y2="152" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="260" y1="140" x2="160" y2="152" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="3,2"/>

  <rect x="52" y="222" width="316" height="34" fill="#FEE2E2" stroke="#DC2626" stroke-width="1" rx="5"/>
  <text x="210" y="236" text-anchor="middle" font-size="9.5" fill="#DC2626" font-weight="700">점선 = 서로 연결하는 코드를 전부 직접 작성</text>
  <text x="210" y="250" text-anchor="middle" font-size="8.5" fill="#555">권한 관리도 서비스마다 제각각 — 초보자에겐 세팅 자체가 장벽</text>

  <rect x="52" y="266" width="316" height="94" fill="#FAF7F2" stroke="#D5CFBF" rx="6"/>
  <text x="210" y="286" text-anchor="middle" font-size="10" fill="#002C5F" font-weight="700">시대 배경 (2010s 후반~)</text>
  <text x="66" y="306" font-size="9" fill="#555">· React 보편화 → 프런트엔드 개발자 폭증</text>
  <text x="66" y="322" font-size="9" fill="#555">· 이들도 서비스를 만들려면 결국 DB·인증·API가 필요</text>
  <text x="66" y="338" font-size="9" fill="#555">· 스타트업: 아이디어를 시장에 내보는 속도가 생명</text>
  <text x="66" y="354" font-size="9" fill="#B45309" font-weight="700">→ "DB보다 제품 개발 속도가 더 중요해졌다"</text>

  <!-- arrow between -->
  <line x1="394" y1="200" x2="418" y2="200" stroke="#002C5F" stroke-width="3"/>
  <polygon points="424,200 413,194 413,206" fill="#002C5F"/>

  <!-- ===== RIGHT: Supabase integrated ===== -->
  <rect x="430" y="44" width="340" height="330" fill="#FFFFFF" stroke="#00AA6C" stroke-width="2" rx="8"/>
  <text x="600" y="67" text-anchor="middle" class="section-title">Supabase (2020~) — 처음부터 하나로 연결</text>

  <!-- container -->
  <rect x="448" y="80" width="304" height="250" fill="#E6F7F1" stroke="#00AA6C" stroke-width="1" rx="10"/>

  <rect x="462" y="92" width="276" height="40" fill="#003F8A" rx="6"/>
  <text x="474" y="109" class="mod-title">① PostgreSQL 데이터베이스</text>
  <text x="474" y="124" font-size="8" fill="#E8EEF7">"제대로 된 SQL" — JOIN·관계 설계 전부 가능</text>

  <rect x="462" y="138" width="276" height="40" fill="#1A5CB5" rx="6"/>
  <text x="474" y="155" class="mod-title">② 인증 (Auth)</text>
  <text x="474" y="170" font-size="8" fill="#E8EEF7">이메일·구글·GitHub 소셜 로그인을 몇 줄 코드로</text>

  <rect x="462" y="184" width="276" height="40" fill="#E8962A" rx="6"/>
  <text x="474" y="201" class="mod-title">③ 스토리지 (S3 구조 기반)</text>
  <text x="474" y="216" font-size="8" fill="#FEF3E2">파일 → URL 발급 + DB 사용자 정보와 RLS 권한 연동</text>

  <rect x="462" y="230" width="276" height="40" fill="#00AA6C" rx="6"/>
  <text x="474" y="247" class="mod-title">④ API 자동 생성</text>
  <text x="474" y="262" font-size="8" fill="#E6F7F1">테이블을 만들면 CRUD API가 즉시 생성 — 백엔드 코드 불필요</text>

  <rect x="462" y="276" width="276" height="40" fill="#6B21A8" rx="6"/>
  <text x="474" y="293" class="mod-title">⑤ 실시간 (Realtime)</text>
  <text x="474" y="308" font-size="8" fill="#F3E8FF">DB 변경이 연결된 화면에 즉시 반영 — 채팅·알림에 최적</text>

  <text x="600" y="348" text-anchor="middle" font-size="10" fill="#065F46" font-weight="700">다섯 모듈이 같은 플랫폼 안에서 권한까지 서로 연결됨</text>
  <text x="600" y="364" text-anchor="middle" font-size="9" fill="#555">오픈소스 — 코드 전체 공개, 셀프 호스팅 가능</text>

  <!-- ===== Bottom: Firebase vs Supabase strip ===== -->
  <rect x="30" y="388" width="740" height="66" fill="#FFFFFF" stroke="#D5CFBF" stroke-width="1" rx="8"/>
  <text x="46" y="408" font-size="11" fill="#002C5F" font-weight="700">선배 Firebase(구글)와의 차이</text>
  <g font-size="9.5">
    <text x="60" y="428" fill="#8A8A8A" font-weight="700">Firebase:</text>
    <text x="122" y="428" fill="#555">NoSQL 기반 · 복잡한 관계·쿼리 어려움 · 구글 독점(정책 변경 시 종속)</text>
    <text x="60" y="446" fill="#065F46" font-weight="700">Supabase:</text>
    <text x="128" y="446" fill="#555">PostgreSQL 기반 · SQL·JOIN 자유 · 오픈소스 — <tspan font-weight="700" fill="#002C5F">"Firebase처럼 편하게, 제대로 된 SQL로"</tspan></text>
  </g>

  <text x="400" y="482" text-anchor="middle" font-size="11" fill="#002C5F" font-weight="700">DB + 스토리지 + 인증이 한 도구에 묶인 것 — 이것이 바이브 코딩에서 AI가 Supabase를 추천하는 이유다</text>
</svg>
